<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects – Picasso Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1a1d2e;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #00629B 0%, #004a76 60%, #003355 100%);
      padding: 48px 32px 44px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -40%; right: -10%;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(255,205,0,.14), transparent 70%);
      border-radius: 50%;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -30%; left: 8%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
      border-radius: 50%;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .hero-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      color: #FFCD00; margin-bottom: 12px;
    }
    .hero-label svg { width: 14px; height: 14px; stroke: #FFCD00; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -.03em; margin-bottom: 8px; }
    .hero p { font-size: .92rem; color: rgba(255,255,255,.7); max-width: 500px; }

    /* ── Grid ── */
    .wrapper { max-width: 1100px; margin: 0 auto; padding: 36px 24px 56px; }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    /* ── Card ── */
    .project-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform .25s cubic-bezier(.34,1.26,.64,1), box-shadow .25s ease, border-color .2s;
      position: relative;
    }
    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,.12);
      border-color: rgba(0,0,0,.11);
    }

    /* Colored top accent bar */
    .card-accent-bar {
      height: 3px;
      width: 100%;
      flex-shrink: 0;
    }

    /* Thumbnail */
    .card-thumb {
      width: 100%;
      height: 210px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Canvas fills the thumbnail */
    .card-thumb canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Bottom fade — blends thumbnail into white card body */
    .card-thumb::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 22px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,.55) 55%, rgba(255,255,255,.97) 100%);
      pointer-events: none; z-index: 2;
    }

    /* Decorative corner-bracket overlay */
    .thumb-deco {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 3;
      opacity: .55;
      transition: opacity .3s;
    }
    .project-card:hover .thumb-deco { opacity: .85; }

    /* Scanline that sweeps on hover */
    .thumb-scan {
      position: absolute; top: -2px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.55) 40%, rgba(255,255,255,.55) 60%, transparent);
      pointer-events: none; z-index: 4;
      opacity: 0;
      transition: none;
    }
    .project-card:hover .thumb-scan {
      animation: scan-sweep .65s ease-in-out forwards;
    }
    @keyframes scan-sweep {
      0%   { top: -2px;  opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: .6; }
      100% { top: calc(100% + 2px); opacity: 0; }
    }

    /* Live badge */
    .live-pill {
      position: absolute; top: 12px; right: 12px; z-index: 3;
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(10,12,24,.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff; font-size: .65rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #22d46b;
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

    /* Card body */
    .card-body {
      padding: 18px 22px 20px;
      flex: 1; display: flex; flex-direction: column;
    }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-category {
      font-size: .68rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px;
    }
    .card-domain {
      font-size: .72rem; color: #9399b0;
      display: flex; align-items: center; gap: 3px;
    }
    .card-domain svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .card-name {
      font-size: 1.25rem; font-weight: 800; color: #0e1120;
      letter-spacing: -.02em; line-height: 1.2;
      margin-bottom: 8px;
      transition: color .15s;
    }
    .project-card:hover .card-name { color: var(--accent); }

    .card-desc {
      font-size: .875rem; color: #5c6280; line-height: 1.7;
      flex: 1; margin-bottom: 16px;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: .63rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 5px;
      background: #f0f2f9; color: #6470a0;
    }
    .card-launch {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .8rem; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
      padding: 7px 14px; border-radius: 8px;
      color: #fff;
      transition: opacity .15s, transform .15s;
    }
    .card-launch svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .project-card:hover .card-launch { opacity: .88; }
    .project-card:hover .card-launch svg { transform: translateX(3px); }

    /* ── iframe viewer ── */
    #iframe-view {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      flex-direction: column;
    }
    #iframe-view.active { display: flex; }

    .iframe-bar {
      height: 52px; min-height: 52px;
      background: #fff;
      border-bottom: 1px solid #e6e8f0;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .bar-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .82rem; font-weight: 600; color: #4a5280;
      background: none; border: none; cursor: pointer; font-family: inherit;
      padding: 7px 10px; border-radius: 8px;
      transition: background .15s, color .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .bar-back:hover { background: #f0f2f9; color: #00629B; }
    .bar-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .bar-sep { width: 1px; height: 22px; background: #e0e2ec; flex-shrink: 0; }

    .bar-url {
      flex: 1;
      background: #f4f6fb; border: 1px solid #e0e2ec;
      border-radius: 8px; padding: 6px 12px;
      font-size: .8rem; color: #5c6280; font-family: inherit;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      min-width: 0;
    }
    .bar-url-lock { color: #22c55e; flex-shrink: 0; }
    .bar-url-lock svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .bar-url-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .bar-ext {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .78rem; font-weight: 600; color: #fff;
      background: #00629B; border: none; cursor: pointer; font-family: inherit;
      padding: 7px 14px; border-radius: 8px;
      text-decoration: none; transition: background .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .bar-ext:hover { background: #005082; }
    .bar-ext svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .iframe-body { flex: 1; position: relative; background: #fff; }
    #project-iframe { width: 100%; height: 100%; border: none; display: block; }

    .iframe-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      background: #fff;
      transition: opacity .25s;
    }
    .iframe-overlay.hide { opacity: 0; pointer-events: none; }
    .spin-ring {
      width: 38px; height: 38px;
      border: 3px solid #e0e2ec; border-top-color: #00629B;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { font-size: .88rem; color: #8690a8; font-weight: 500; }

    .iframe-blocked-msg {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 32px;
    }
    .iframe-blocked-msg.show { display: flex; }
    .blocked-icon { font-size: 2.8rem; line-height: 1; }
    .blocked-title { font-size: 1.05rem; font-weight: 700; color: #1a1d2e; }
    .blocked-desc { font-size: .85rem; color: #8690a8; max-width: 300px; line-height: 1.6; }
    .blocked-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .85rem; font-weight: 700; color: #fff;
      background: #00629B; text-decoration: none;
      padding: 10px 22px; border-radius: 10px;
      transition: background .15s;
    }
    .blocked-cta:hover { background: #005082; }
    .blocked-cta svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    @media (max-width: 640px) {
      .hero { padding: 32px 20px 28px; }
      .hero h1 { font-size: 1.6rem; }
      .wrapper { padding: 22px 14px 40px; }
      .project-grid { grid-template-columns: 1fr; gap: 16px; }
      .card-thumb { height: 180px; }
      .bar-url { display: none; }
      .iframe-bar { padding: 0 10px; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="hero" id="hero-section">
  <div class="hero-inner">
    <div class="hero-label">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Picasso Lab
    </div>
    <h1>Projects &amp; Demos</h1>

<div class="wrapper" id="project-list">

<!-- iframe viewer -->
<div id="iframe-view">
  <div class="iframe-bar">
    <button class="bar-back" onclick="closeProject()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Projects
    </button>
    <div class="bar-sep"></div>
    <div class="bar-url">
      <span class="bar-url-lock"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
      <span class="bar-url-text" id="bar-url-text">—</span>
    </div>
    <a class="bar-ext" id="external-link" href="#" target="_blank" rel="noopener">

      <div id="loading-inner">

    </div>
    <iframe id="project-iframe" title="Project preview"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

<script>

const PROJECTS = [
  {
    id: 'qubrio',
    name: "Qubrio",
    url: "https://qubrio.picasso-lab.com/",
    category: "Quantum Computing",
    accent: "#7c3aed",
    accentBg: "rgba(124,58,237,.10)",
    desc: "A multi-agent LLM compiler for neutral atom quantum computers. Specialized agents handle qubit placement, atom routing, and schedule optimization — achieving 4.7× hardware runtime reduction over state-of-the-art baselines.",
    tags: ["Quantum Compilation", "Multi-Agent", "LLM"],
    bracketColor: "rgba(167,139,250,.7)",
  },
  {
    id: 'tritongym',
    name: "TritonGym",
    url: "https://tritongym.picasso-lab.com",
    category: "LLM Benchmark",
    accent: "#059669",
    accentBg: "rgba(5,150,105,.10)",
    desc: "An ICML 2026 benchmark evaluating LLMs on generating optimized Triton GPU kernels via agentic workflows. 164 operators, four agent strategies, and a live leaderboard ranking models by correctness and kernel performance.",
    tags: ["Triton", "LLM", "Benchmark", "ICML 2026"],
    bracketColor: "rgba(52,211,153,.7)",
  },
  {
    id: 'tritondft',
    name: "TritonDFT",
    url: "https://tritondft.com/",
    category: "AI for Science",
    accent: "#0284c7",
    accentBg: "rgba(2,132,199,.10)",
    desc: "A multi-agent AI system automating Density Functional Theory (DFT) calculations in materials science. Four specialized agents — Planner, Executor, Analyzer, Refiner — reduce per-step time from hours to seconds.",
    tags: ["DFT", "Materials Science", "Multi-Agent"],
    bracketColor: "rgba(56,189,248,.7)",
  },
  {
    id: 'chipmate',
    name: "ChipMate",
    url: "https://chipmate.picasso-lab.com",
    category: "Chip Design",
    accent: "#d97706",
    accentBg: "rgba(217,119,6,.10)",
    desc: "A self-trained multi-agent framework for RTL (Verilog) code generation. Two agents cross-verify outputs via waveform comparison — outperforming DeepSeek V3 despite being 20–180× smaller.",
    tags: ["RTL", "Verilog", "Multi-Agent", "EDA"],
    bracketColor: "rgba(251,191,36,.7)",
  },
];

/* ─── Canvas helper functions ─────────────────────────────────────── */

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function cGlow(ctx, x, y, r, fill, glow, blur) {
  ctx.save();
  ctx.shadowColor = glow;
  ctx.shadowBlur  = blur;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.restore();
}

function cLine(ctx, x1, y1, x2, y2, color, lw, alpha, blur) {
  ctx.save();
  ctx.globalAlpha  = alpha;
  ctx.shadowColor  = color;
  ctx.shadowBlur   = blur;
  ctx.strokeStyle  = color;
  ctx.lineWidth    = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
}

/* ─── Qubrio: Neutral atom quantum computer array ─────────────────── */

function drawQubrio(ctx, W, H, t) {
  // Background: deep purple radial gradient
  const bg = ctx.createRadialGradient(W*0.5, H*0.45, 0, W*0.5, H*0.5, Math.max(W,H)*0.75);
  bg.addColorStop(0, '#1a0840');
  bg.addColorStop(1, '#050012');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const COLS = 9, ROWS = 4;
  const padX = W * 0.08, padY = H * 0.13;
  const stepX = (W - padX * 2) / (COLS - 1);
  const stepY = (H - padY * 2) / (ROWS - 1);

  // Atom positions
  const atoms = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      atoms.push({ x: padX + c * stepX, y: padY + r * stepY, r, c, idx: r * COLS + c });
    }
  }

  // Lattice lines
  const latticeAlpha = 0.10 + 0.07 * Math.sin(t * 0.02);
  ctx.save();
  ctx.strokeStyle = `rgba(110,60,220,${latticeAlpha})`;
  ctx.lineWidth = 0.8;
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath();
    for (let c = 0; c < COLS; c++) {
      const a = atoms[r * COLS + c];
      c === 0 ? ctx.moveTo(a.x, a.y) : ctx.lineTo(a.x, a.y);
    }
    ctx.stroke();
  }
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath();
    for (let r = 0; r < ROWS; r++) {
      const a = atoms[r * COLS + c];
      r === 0 ? ctx.moveTo(a.x, a.y) : ctx.lineTo(a.x, a.y);
    }
    ctx.stroke();
  }
  ctx.restore();

  // Excited atoms (4, changes every 70 frames)
  const excitedSeed = Math.floor(t / 70);
  const excitedSet = new Set();
  let rng = excitedSeed * 1234567 + 9;
  while (excitedSet.size < 4) {
    rng = (rng * 1664525 + 1013904223) & 0x7fffffff;
    excitedSet.add(rng % atoms.length);
  }

  // Routing path (5 atoms, changes every 100 frames)
  const routeSeed = Math.floor(t / 100);
  let rrng = routeSeed * 987654 + 3;
  const routePath = [];
  const routeUsed = new Set();
  while (routePath.length < 5) {
    rrng = (rrng * 1664525 + 1013904223) & 0x7fffffff;
    const idx = rrng % atoms.length;
    if (!routeUsed.has(idx)) { routeUsed.add(idx); routePath.push(idx); }
  }

  // Draw routing path
  const routePhase = (t % 100) / 100;
  ctx.save();
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur  = 8;
  ctx.strokeStyle = 'rgba(0,229,255,0.55)';
  ctx.lineWidth   = 1.2;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  routePath.forEach((idx, i) => {
    const a = atoms[idx];
    i === 0 ? ctx.moveTo(a.x, a.y) : ctx.lineTo(a.x, a.y);
  });
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Animated dot traveling route
  if (routePath.length >= 2) {
    const totalSegs = routePath.length - 1;
    const travelPos  = routePhase * totalSegs;
    const segIdx     = Math.min(Math.floor(travelPos), totalSegs - 1);
    const segFrac    = travelPos - segIdx;
    const aA = atoms[routePath[segIdx]];
    const aB = atoms[routePath[segIdx + 1]];
    const dx = aB.x - aA.x, dy = aB.y - aA.y;
    const dotX = aA.x + dx * segFrac, dotY = aA.y + dy * segFrac;
    cGlow(ctx, dotX, dotY, 3, '#ffffff', '#00e5ff', 14);
  }

  // Draw atoms
  atoms.forEach((a, i) => {
    const wobX = Math.sin(t * 0.022 + i * 0.37) * 0.85;
    const wobY = Math.cos(t * 0.018 + i * 0.53) * 0.85;
    const ax = a.x + wobX, ay = a.y + wobY;

    if (excitedSet.has(i)) {
      // Excited (Rydberg) state: orange/red glow
      const ringFrac = ((t + i * 12) % 55) / 55;
      const ringR    = 3.5 + ringFrac * 11;
      const ringA    = 0.6 * (1 - ringFrac);
      ctx.save();
      ctx.beginPath();
      ctx.arc(ax, ay, ringR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,100,30,${ringA})`;
      ctx.lineWidth = 1.2;
      ctx.shadowColor = '#ff6020';
      ctx.shadowBlur  = 10;
      ctx.stroke();
      ctx.restore();
      cGlow(ctx, ax, ay, 3.8, '#ffb347', '#ff6020', 16);
      cGlow(ctx, ax, ay, 1.8, '#ffffff', '#ffcc00', 6);
    } else {
      // Ground state: purple glow
      cGlow(ctx, ax, ay, 4, 'rgba(160,100,255,0.35)', '#7c3aed', 12);
      cGlow(ctx, ax, ay, 2.2, '#c4b5fd', '#9b59ff', 8);
      cGlow(ctx, ax, ay, 0.9, '#ffffff', '#ffffff', 3);
    }
  });

  // HUD text
  ctx.save();
  ctx.font = '600 7px monospace';
  ctx.fillStyle = 'rgba(180,140,255,0.75)';
  ctx.fillText('ATOM_ARRAY  9\u00d74', padX, H - 9);
  ctx.fillStyle = 'rgba(0,220,240,0.75)';
  const speedupLabel = 'SPEEDUP \u25b2 4.7\u00d7';
  const sw = ctx.measureText(speedupLabel).width;
  ctx.fillText(speedupLabel, W - padX - sw, H - 9);
  ctx.restore();
}

/* ─── TritonGym: LLM benchmark bar chart ──────────────────────────── */

function drawTritonGym(ctx, W, H, t) {
  // Background
  ctx.fillStyle = '#010c06';
  ctx.fillRect(0, 0, W, H);

  // Faint horizontal grid lines
  ctx.save();
  ctx.strokeStyle = 'rgba(5,150,105,0.10)';
  ctx.lineWidth = 0.7;
  for (let i = 1; i <= 4; i++) {
    const y = H * 0.72 - (H * 0.52) * (i / 4);
    ctx.beginPath();
    ctx.moveTo(W * 0.04, y);
    ctx.lineTo(W * 0.96, y);
    ctx.stroke();
  }
  ctx.restore();

  // Models data
  const models = [
    { name: 'GPT-4o',     score: 0.71, colors: ['#f59e0b', '#fbbf24'] },
    { name: 'Gemini',     score: 0.68, colors: ['#6366f1', '#818cf8'] },
    { name: 'Llama',      score: 0.63, colors: ['#ec4899', '#f472b6'] },
    { name: 'DeepSeek',   score: 0.74, colors: ['#14b8a6', '#2dd4bf'] },
    { name: 'Qwen',       score: 0.67, colors: ['#f97316', '#fb923c'] },
    { name: 'Claude',     score: 0.76, colors: ['#a78bfa', '#c4b5fd'] },
    { name: 'TritonGym\u2736', score: 0.91, colors: ['#059669', '#34d399'], special: true },
  ];

  const n      = models.length;
  const margin = W * 0.04;
  const totalW = W - margin * 2;
  const barW   = totalW / n * 0.52;
  const gapW   = totalW / n;
  const baseY  = H * 0.72;
  const maxBarH = H * 0.52;

  models.forEach((m, i) => {
    const breathe = m.score + Math.sin(t * 0.018 + i * 0.9) * 0.025;
    const barH    = maxBarH * breathe;
    const bx      = margin + i * gapW + (gapW - barW) / 2;
    const by      = baseY - barH;

    // Bar gradient
    const grad = ctx.createLinearGradient(bx, baseY, bx, by);
    grad.addColorStop(0, m.colors[0] + '99');
    grad.addColorStop(1, m.colors[1]);

    ctx.save();
    ctx.shadowColor = m.colors[1];
    ctx.shadowBlur  = m.special ? 22 : 10;
    ctx.beginPath();
    roundRect(ctx, bx, by, barW, barH, 3);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Gold cap for TritonGym
    if (m.special) {
      ctx.save();
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur  = 14;
      ctx.fillStyle   = '#FFD700';
      ctx.beginPath();
      roundRect(ctx, bx - 1, by - 2.5, barW + 2, 4, 2);
      ctx.fill();
      ctx.restore();
    }

    // Model name label below bar
    ctx.save();
    ctx.font = m.special ? '700 6.5px monospace' : '500 6px monospace';
    ctx.fillStyle = m.special ? '#34d399' : 'rgba(200,230,210,0.65)';
    ctx.textAlign = 'center';
    ctx.fillText(m.name, bx + barW / 2, baseY + 11);
    ctx.restore();
  });

  // Baseline axis
  ctx.save();
  ctx.strokeStyle = 'rgba(52,211,153,0.30)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(margin, baseY);
  ctx.lineTo(W - margin, baseY);
  ctx.stroke();
  ctx.restore();

  // ICML label
  ctx.save();
  ctx.font = '600 7px monospace';
  ctx.fillStyle = 'rgba(52,211,153,0.70)';
  ctx.fillText('ICML 2026  \u00b7  164 OPS', margin, 16);
  ctx.restore();
}

/* ─── TritonDFT: Multi-agent DFT system ───────────────────────────── */

function drawTritonDFT(ctx, W, H, t) {
  // Background: navy gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#021828');
  bg.addColorStop(1, '#030d1c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Faint hexagonal grid background
  ctx.save();
  ctx.strokeStyle = 'rgba(0,180,220,0.05)';
  ctx.lineWidth = 0.8;
  const hexSize = 22;
  const hexH    = hexSize * Math.sqrt(3);
  for (let row = -1; row < H / hexH + 2; row++) {
    for (let col = -1; col < W / (hexSize * 1.5) + 2; col++) {
      const cx = col * hexSize * 1.5;
      const cy = row * hexH + (col % 2 === 0 ? 0 : hexH / 2);
      ctx.beginPath();
      for (let k = 0; k < 6; k++) {
        const ang = (Math.PI / 3) * k - Math.PI / 6;
        const px = cx + hexSize * Math.cos(ang);
        const py = cy + hexSize * Math.sin(ang);
        k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();

  const cx = W * 0.5, cy = H * 0.50;
  const cloudR = 32 + Math.sin(t * 0.025) * 4;

  // Central electron cloud: layered translucent circles
  const cloudLayers = [
    { frac: 2.2, r: 255, g: 255, b: 255, a: 10 },
    { frac: 1.6, r: 10,  g: 240, b: 216, a: 18 },
    { frac: 1.1, r: 32,  g: 255, b: 238, a: 30 },
    { frac: 0.7, r: 128, g: 255, b: 255, a: 55 },
    { frac: 0.4, r: 200, g: 255, b: 255, a: 90 },
  ];

  const wobX = Math.sin(t * 0.019) * 2.5;
  const wobY = Math.cos(t * 0.015) * 2;

  cloudLayers.forEach(l => {
    ctx.save();
    ctx.shadowColor = `rgba(0,229,229,0.6)`;
    ctx.shadowBlur  = 18;
    ctx.beginPath();
    ctx.arc(cx + wobX * 0.3, cy + wobY * 0.3, cloudR * l.frac, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${l.r},${l.g},${l.b},${l.a / 255})`;
    ctx.fill();
    ctx.restore();
  });

  // 7 crystal lattice atoms in hexagonal arrangement
  const latticeR  = 14;
  const latAtoms  = [{ x: cx, y: cy }];
  for (let k = 0; k < 6; k++) {
    const ang = (Math.PI / 3) * k;
    latAtoms.push({ x: cx + latticeR * Math.cos(ang), y: cy + latticeR * Math.sin(ang) });
  }

  // Bond lines center to surrounding
  for (let k = 1; k < 7; k++) {
    cLine(ctx, latAtoms[0].x, latAtoms[0].y, latAtoms[k].x, latAtoms[k].y,
          'rgba(0,220,230,0.35)', 0.8, 1, 3);
  }

  latAtoms.forEach((a, i) => {
    cGlow(ctx, a.x, a.y, i === 0 ? 4.5 : 3, i === 0 ? '#80ffff' : '#40e0d0', '#00d4d4', 12);
    cGlow(ctx, a.x, a.y, i === 0 ? 2   : 1.5, '#ffffff', '#aaffff', 4);
  });

  // 4 orbiting agent nodes
  const agents = [
    { label: 'Planner',  color: '#FFCD00', baseAngle: Math.PI * 1.25 },
    { label: 'Executor', color: '#10b981', baseAngle: Math.PI * 1.75 },
    { label: 'Analyzer', color: '#3b82f6', baseAngle: Math.PI * 0.75 },
    { label: 'Refiner',  color: '#a855f7', baseAngle: Math.PI * 0.25 },
  ];

  const orbitR = Math.min(W, H) * 0.35;

  agents.forEach((ag, i) => {
    const angle = ag.baseAngle + t * 0.003;
    const ax = cx + orbitR * Math.cos(angle);
    const ay = cy + orbitR * Math.sin(angle);

    // Connection line to center
    cLine(ctx, ax, ay, cx, cy, ag.color, 0.7, 0.20, 3);

    // 3 particles streaming toward center
    for (let p = 0; p < 3; p++) {
      const phase = ((t * 0.012 + i * 1.1 + p * 0.33) % 1);
      const px = ax + (cx - ax) * phase;
      const py = ay + (cy - ay) * phase;
      cGlow(ctx, px, py, 1.5, ag.color, ag.color, 8);
    }

    // Agent outer halo
    ctx.save();
    ctx.beginPath();
    ctx.arc(ax, ay, 9, 0, Math.PI * 2);
    ctx.fillStyle = hexToRgba(ag.color, 0.15);
    ctx.fill();
    ctx.restore();

    // Main glow
    cGlow(ctx, ax, ay, 5, ag.color, ag.color, 14);
    // Bright center
    cGlow(ctx, ax, ay, 2.5, '#ffffff', ag.color, 6);

    // Label — position outside agent
    ctx.save();
    ctx.font = '600 7.5px monospace';
    ctx.fillStyle = ag.color;
    ctx.textAlign = 'center';
    const labelDist = 16;
    const lx = ax + Math.cos(angle) * labelDist;
    const ly = ay + Math.sin(angle) * labelDist + 2.5;
    ctx.fillText(ag.label, lx, ly);
    ctx.restore();
  });
}

/* ─── ChipMate: RTL synthesis ─────────────────────────────────────── */

function drawChipMate(ctx, W, H, t) {
  // Background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0d0800');
  bg.addColorStop(1, '#001818');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const LW = W * 0.40; // left panel width

  // ── LEFT PANEL: Logic gates ──────────────────────────────────────
  const gates = [
    { type: 'AND', x: LW * 0.30, y: H * 0.25 },
    { type: 'OR',  x: LW * 0.30, y: H * 0.50 },
    { type: 'XOR', x: LW * 0.30, y: H * 0.75 },
    { type: 'NOT', x: LW * 0.65, y: H * 0.35 },
    { type: 'AND', x: LW * 0.65, y: H * 0.65 },
  ];

  function drawGate(type, gx, gy) {
    const gw = 18, gh = 13;
    ctx.save();
    ctx.strokeStyle = 'rgba(251,191,36,0.80)';
    ctx.lineWidth   = 1.3;
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur  = 5;
    ctx.fillStyle   = 'rgba(251,191,36,0.08)';

    if (type === 'AND') {
      ctx.beginPath();
      ctx.moveTo(gx - gw/2, gy - gh/2);
      ctx.lineTo(gx,        gy - gh/2);
      ctx.arc(gx, gy, gh/2, -Math.PI/2, Math.PI/2);
      ctx.lineTo(gx - gw/2, gy + gh/2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    } else if (type === 'OR') {
      ctx.beginPath();
      ctx.moveTo(gx - gw/2, gy - gh/2);
      ctx.quadraticCurveTo(gx - gw/4, gy, gx - gw/2, gy + gh/2);
      ctx.quadraticCurveTo(gx + gw/4, gy + gh/2, gx + gw/2, gy);
      ctx.quadraticCurveTo(gx + gw/4, gy - gh/2, gx - gw/2, gy - gh/2);
      ctx.fill(); ctx.stroke();
    } else if (type === 'XOR') {
      ctx.beginPath();
      ctx.moveTo(gx - gw/2, gy - gh/2);
      ctx.quadraticCurveTo(gx - gw/4, gy, gx - gw/2, gy + gh/2);
      ctx.quadraticCurveTo(gx + gw/4, gy + gh/2, gx + gw/2, gy);
      ctx.quadraticCurveTo(gx + gw/4, gy - gh/2, gx - gw/2, gy - gh/2);
      ctx.fill(); ctx.stroke();
      // Extra XOR curve
      ctx.beginPath();
      ctx.moveTo(gx - gw/2 - 4, gy - gh/2);
      ctx.quadraticCurveTo(gx - gw/4 - 4, gy, gx - gw/2 - 4, gy + gh/2);
      ctx.stroke();
    } else if (type === 'NOT') {
      ctx.beginPath();
      ctx.moveTo(gx - gw/2, gy - gh/2);
      ctx.lineTo(gx + gw/2 - 4, gy);
      ctx.lineTo(gx - gw/2, gy + gh/2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // Bubble
      ctx.beginPath();
      ctx.arc(gx + gw/2 - 1, gy, 3, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  gates.forEach(g => drawGate(g.type, g.x, g.y));

  // Input wires from left edge to each gate
  const amberWire = 'rgba(251,191,36,0.65)';
  gates.forEach((g, i) => {
    const startX = W * 0.02;
    const wireY  = g.y;
    cLine(ctx, startX, wireY, g.x - 9, wireY, amberWire, 0.9, 1, 4);

    // Animated pulse dot on input wire
    const phase = ((t * 0.016 + i * 0.4) % 1);
    const px = startX + (g.x - 9 - startX) * phase;
    cGlow(ctx, px, wireY, 2, '#fbbf24', '#f59e0b', 10);
  });

  // Output wires from gates toward center
  const centerX = W * 0.50, centerY = H * 0.50;
  gates.forEach((g, i) => {
    const endX = centerX - 14;
    const endY = centerY;
    cLine(ctx, g.x + 9, g.y, endX, endY, amberWire, 0.9, 0.55, 3);

    // Animated pulse on output wire
    const phase = ((t * 0.014 + i * 0.22 + 0.5) % 1);
    const px = (g.x + 9) + (endX - g.x - 9) * phase;
    const py = g.y + (endY - g.y) * phase;
    cGlow(ctx, px, py, 1.8, '#fcd34d', '#f59e0b', 8);
  });

  // CENTER: transformation arrow
  ctx.save();
  ctx.strokeStyle = 'rgba(255,200,0,0.30)';
  ctx.lineWidth   = 1.4;
  const arrowX = W * 0.48, arrowY = centerY;
  const aw = 18;
  for (let k = 0; k < 3; k++) {
    const lx = arrowX - 8 + k * 5;
    ctx.beginPath();
    ctx.moveTo(lx, arrowY - 4);
    ctx.lineTo(lx, arrowY + 4);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(arrowX + 4, arrowY);
  ctx.lineTo(arrowX + 4 + aw, arrowY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(arrowX + 4 + aw - 6, arrowY - 5);
  ctx.lineTo(arrowX + 4 + aw, arrowY);
  ctx.lineTo(arrowX + 4 + aw - 6, arrowY + 5);
  ctx.stroke();
  ctx.restore();

  // ── RIGHT PANEL: 7×5 chip grid ───────────────────────────────────
  const rightX = W * 0.60;
  const rightW = W * 0.96 - rightX;
  const gridCols = 7, gridRows = 5;
  const cellW = rightW / (gridCols + 0.5);
  const cellH = (H * 0.82) / (gridRows + 0.5);
  const gridOffX = rightX + cellW * 0.5;
  const gridOffY = H * 0.09;

  // Chip boundary
  ctx.save();
  ctx.strokeStyle = 'rgba(34,255,136,0.15)';
  ctx.lineWidth   = 1;
  ctx.shadowColor = '#22ff88';
  ctx.shadowBlur  = 8;
  ctx.beginPath();
  roundRect(ctx, rightX + 2, gridOffY - 5, rightW - 4, gridRows * cellH + 12, 4);
  ctx.stroke();
  ctx.restore();

  const scanRow = Math.floor((t * 0.018) % gridRows);
  const activePat = new Set();
  // Random-ish active pattern seeded by time epoch
  const epoch = Math.floor(t / 90);
  let arng = epoch * 7919 + 31;
  while (activePat.size < 8) {
    arng = (arng * 1664525 + 1013904223) & 0x7fffffff;
    activePat.add(arng % (gridCols * gridRows));
  }

  for (let row = 0; row < gridRows; row++) {
    for (let col = 0; col < gridCols; col++) {
      const dotX = gridOffX + col * cellW;
      const dotY = gridOffY + row * cellH + cellH * 0.5;
      const cellIdx = row * gridCols + col;
      const isActive = row === scanRow || activePat.has(cellIdx);

      if (isActive) {
        const flicker = 0.7 + 0.3 * Math.sin(t * 0.08 + cellIdx * 1.7);
        cGlow(ctx, dotX, dotY, 3.8 * flicker, '#22ff88', '#22ff88', 10);
      } else {
        cGlow(ctx, dotX, dotY, 2.8, '#22aa55', '#22aa55', 3);
      }
    }
  }

  // HUD text
  ctx.save();
  ctx.font = '600 7px monospace';
  ctx.fillStyle = 'rgba(251,191,36,0.75)';
  ctx.fillText('RTL \u2192 SYNTHESIS', W * 0.02, H - 9);
  ctx.fillStyle = 'rgba(34,255,136,0.75)';
  const chipLabel = 'LOGIC_BLOCKS: 35';
  const clw = ctx.measureText(chipLabel).width;
  ctx.fillText(chipLabel, W - W * 0.04 - clw, H - 9);
  ctx.restore();
}

/* ─── Canvas animation engine ─────────────────────────────────────── */

const drawFns = {
  qubrio:    drawQubrio,
  tritongym: drawTritonGym,
  tritondft: drawTritonDFT,
  chipmate:  drawChipMate,
};

const animState = {}; // { [id]: { raf, t, active } }

function initCanvas(p) {
  const canvas = document.getElementById('canvas-' + p.id);
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  const W    = rect.width  || 480;
  const H    = rect.height || 210;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  if (!animState[p.id]) animState[p.id] = { raf: null, t: 0, active: false };
  const state = animState[p.id];

  function tick() {
    state.t++;
    drawFns[p.id](ctx, W, H, state.t);
    state.raf = requestAnimationFrame(tick);
  }

  function start() {
    if (state.active) return;
    state.active = true;
    tick();
  }

  function stop() {
    state.active = false;
    if (state.raf) { cancelAnimationFrame(state.raf); state.raf = null; }
  }

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => e.isIntersecting ? start() : stop());
  }, { threshold: 0.1 });

  obs.observe(canvas);
}

/* ─── Card rendering ─────────────────────────────────────────────── */

function renderCards() {
  document.getElementById('project-grid').innerHTML = PROJECTS.map((p, i) => `
    <div class="project-card" style="--accent:${p.accent}" onclick="openProject(${i})">
      <div class="card-accent-bar" style="background:${p.accent}"></div>
      <div class="card-thumb">
        <canvas id="canvas-${p.id}"></canvas>
        <!-- Corner bracket decoration -->
        <svg class="thumb-deco" viewBox="0 0 480 210" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="${p.bracketColor}" stroke-width="1.5" fill="none" stroke-linecap="round">
            <path d="M14 30 L14 13 L30 13"/>
            <path d="M450 13 L466 13 L466 30"/>
            <path d="M14 180 L14 197 L30 197"/>
            <path d="M450 197 L466 197 L466 180"/>
          </g>
          <rect x="13" y="12" width="454" height="186" rx="1"
                stroke="${p.bracketColor}" stroke-width=".4" fill="none" stroke-dasharray="3 6"/>
        </svg>
        <div class="thumb-scan"></div>
        <div class="live-pill"><div class="live-dot"></div>Live</div>
      </div>
      <div class="card-body">
        <div class="card-head">
          <span class="card-category" style="color:${p.accent};background:${p.accentBg}">${p.category}</span>
          <span class="card-domain">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
            ${p.url.replace(/^https?:\/\//, '').replace(/\/$/, '')}
          </span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="card-launch" style="background:${p.accent}">
            Launch
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function initCanvases() {
  PROJECTS.forEach(p => initCanvas(p));
}

/* ─── iframe viewer ──────────────────────────────────────────────── */

function openProject(idx) {
  const p = PROJECTS[idx];
  const view      = document.getElementById('iframe-view');
  const iframe    = document.getElementById('project-iframe');
  const overlay   = document.getElementById('iframe-overlay');
  const blocked   = document.getElementById('iframe-blocked');
  const loadInner = document.getElementById('loading-inner');

  document.getElementById('bar-url-text').textContent = p.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
  document.getElementById('external-link').href = p.url;
  document.getElementById('blocked-link').href  = p.url;

  overlay.classList.remove('hide');
  blocked.classList.remove('show');
  loadInner.style.display = '';
  iframe.src = '';

  view.classList.add('active');
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('project-list').style.display = 'none';
  document.body.style.overflow = 'hidden';

  let done = false;
  const timer = setTimeout(() => { if (!done) showBlocked(); }, 11000);

  iframe.onload = () => {
    done = true;
    clearTimeout(timer);
    overlay.classList.add('hide');
  };
  iframe.src = p.url;
}

function showBlocked() {
  document.getElementById('loading-inner').style.display = 'none';
  document.getElementById('iframe-blocked').classList.add('show');
}

function closeProject() {
  document.getElementById('iframe-view').classList.remove('active');
  document.getElementById('project-iframe').src = '';
  document.getElementById('hero-section').style.display = '';
  document.getElementById('project-list').style.display = '';
  document.body.style.overflow = '';
}

/* ─── Boot ───────────────────────────────────────────────────────── */

renderCards();
// Wait one frame for layout, then size canvases
requestAnimationFrame(() => {
  requestAnimationFrame(initCanvases);
});
</script>
