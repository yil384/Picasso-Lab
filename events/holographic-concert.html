<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holographic Concert - 多梦症</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }

/* Scan lines overlay */
.scanlines {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,242,0.015) 0px,
        transparent 1px,
        transparent 3px
    );
}
.scanlines::after {
    content: '';
    position: absolute; left: 0; right: 0;
    height: 3px;
    background: rgba(0,255,242,0.06);
    animation: scanMove 4s linear infinite;
}
@keyframes scanMove {
    from { top: -3px; }
    to { top: 100%; }
}

/* Song info */
.song-info {
    position: fixed;
    bottom: 40px; left: 0; right: 0;
    text-align: center; z-index: 20;
    pointer-events: none;
}
.song-title {
    font-family: -apple-system, sans-serif;
    font-size: 36px; font-weight: 700;
    color: #fff;
    text-shadow: 0 0 30px rgba(0,255,242,0.8), 0 0 60px rgba(0,255,242,0.4);
    letter-spacing: 0.15em;
}
.song-artist {
    font-family: -apple-system, sans-serif;
    font-size: 16px; font-weight: 400;
    color: rgba(0,255,242,0.7);
    margin-top: 8px;
    text-shadow: 0 0 15px rgba(0,255,242,0.5);
    letter-spacing: 0.1em;
}

/* Loading */
.loading-text {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, sans-serif;
    font-size: 14px; color: rgba(0,255,242,0.5);
    letter-spacing: 0.1em;
}
.loading-text.hidden { display: none; }
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="song-info">
    <div class="song-title">多 梦 症</div>
    <div class="song-artist">L A Y M E N</div>
</div>
<div class="loading-text" id="loading">INITIALIZING HOLOGRAPHIC PROJECTION...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// Hide loading
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);

// ── Scene setup ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000008, 0.0015);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 8, 22);
camera.lookAt(0, 4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// ── Post-processing (Bloom) ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.8,   // strength
    0.4,   // radius
    0.2    // threshold
);
composer.addPass(bloom);

// ── Colors ──
const CYAN = new THREE.Color(0x00fff2);
const PINK = new THREE.Color(0xff69b4);
const GOLD = new THREE.Color(0xffcd00);
const WHITE = new THREE.Color(0xffffff);

// ── Holographic base disc ──
const discGroup = new THREE.Group();
scene.add(discGroup);

// Concentric rings
for (let i = 0; i < 6; i++) {
    const r = 6 - i * 0.8;
    const ringGeo = new THREE.RingGeometry(r - 0.04, r, 80);
    const ringMat = new THREE.MeshBasicMaterial({
        color: CYAN, transparent: true, opacity: 0.15 + i * 0.03, side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.01 * i;
    discGroup.add(ring);
}

// Disc surface glow
const discGlowGeo = new THREE.CircleGeometry(6, 64);
const discGlowMat = new THREE.MeshBasicMaterial({
    color: CYAN, transparent: true, opacity: 0.04, side: THREE.DoubleSide
});
const discGlow = new THREE.Mesh(discGlowGeo, discGlowMat);
discGlow.rotation.x = -Math.PI / 2;
discGroup.add(discGlow);

// Tick marks
const tickGroup = new THREE.Group();
for (let i = 0; i < 36; i++) {
    const angle = (i / 36) * Math.PI * 2;
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(Math.cos(angle) * 5.6, 0, Math.sin(angle) * 5.6),
        new THREE.Vector3(Math.cos(angle) * 6.2, 0, Math.sin(angle) * 6.2),
    ]);
    const mat = new THREE.LineBasicMaterial({ color: CYAN, transparent: true, opacity: 0.25 });
    tickGroup.add(new THREE.Line(geo, mat));
}
discGroup.add(tickGroup);

// ── Stage platform ──
const stageGeo = new THREE.BoxGeometry(8, 0.15, 4);
const stageMat = new THREE.MeshBasicMaterial({
    color: CYAN, transparent: true, opacity: 0.08, side: THREE.DoubleSide
});
const stage = new THREE.Mesh(stageGeo, stageMat);
stage.position.set(0, 1, 0);
scene.add(stage);

// Stage edge wireframe
const stageEdge = new THREE.LineSegments(
    new THREE.EdgesGeometry(stageGeo),
    new THREE.LineBasicMaterial({ color: CYAN, transparent: true, opacity: 0.35 })
);
stageEdge.position.copy(stage.position);
scene.add(stageEdge);

// ── Wireframe figures ──
function createFigure(x, z, hasGuitar) {
    const group = new THREE.Group();
    const mat = new THREE.LineBasicMaterial({ color: CYAN, transparent: true, opacity: 0.9 });

    // Head
    const headGeo = new THREE.SphereGeometry(0.35, 12, 8);
    const head = new THREE.LineSegments(new THREE.WireframeGeometry(headGeo), mat.clone());
    head.position.y = 4.2;
    group.add(head);

    // Body line
    const bodyPts = [new THREE.Vector3(0, 3.8, 0), new THREE.Vector3(0, 2.2, 0)];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(bodyPts), mat.clone()));

    // Legs
    const legL = [new THREE.Vector3(0, 2.2, 0), new THREE.Vector3(-0.4, 1.1, 0)];
    const legR = [new THREE.Vector3(0, 2.2, 0), new THREE.Vector3(0.4, 1.1, 0)];
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(legL), mat.clone()));
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(legR), mat.clone()));

    if (hasGuitar) {
        // Arms
        const armL = [new THREE.Vector3(0, 3.5, 0), new THREE.Vector3(-0.8, 2.8, 0.2)];
        const armR = [new THREE.Vector3(0, 3.5, 0), new THREE.Vector3(0.6, 2.6, 0.3)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(armL), mat.clone()));
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(armR), mat.clone()));
        // Guitar body
        const guitarGeo = new THREE.TorusGeometry(0.4, 0.15, 8, 12);
        const guitar = new THREE.LineSegments(new THREE.WireframeGeometry(guitarGeo), mat.clone());
        guitar.position.set(0.3, 2.7, 0.3);
        guitar.rotation.x = Math.PI / 2;
        group.add(guitar);
        // Neck
        const neck = [new THREE.Vector3(0.3, 2.7, 0.3), new THREE.Vector3(-0.8, 3.3, 0.2)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(neck), mat.clone()));
    } else {
        // Singer arms
        const armL = [new THREE.Vector3(0, 3.5, 0), new THREE.Vector3(-0.7, 2.8, 0)];
        const armR = [new THREE.Vector3(0, 3.5, 0), new THREE.Vector3(0.5, 3.7, 0.3)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(armL), mat.clone()));
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(armR), mat.clone()));
        // Mic
        const micGeo = new THREE.SphereGeometry(0.12, 6, 4);
        const mic = new THREE.LineSegments(new THREE.WireframeGeometry(micGeo), mat.clone());
        mic.position.set(0.5, 3.9, 0.3);
        group.add(mic);
        const micStick = [new THREE.Vector3(0.5, 3.7, 0.3), new THREE.Vector3(0.5, 3.9, 0.3)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(micStick), mat.clone()));
    }

    group.position.set(x, 0, z);
    group.userData = { hasGuitar, swayPhase: Math.random() * Math.PI * 2 };
    scene.add(group);
    return group;
}

const singer = createFigure(-0.5, 0, false);
const guitarist = createFigure(2.5, 0.5, true);

// ── Audience (particle system with lightsticks) ──
const AUDIENCE_COUNT = 500;
const audPositions = new Float32Array(AUDIENCE_COUNT * 3);
const audColors = new Float32Array(AUDIENCE_COUNT * 3);
const audSizes = new Float32Array(AUDIENCE_COUNT);
const stickColors = [CYAN, PINK, GOLD, WHITE, new THREE.Color(0x7b68ee), new THREE.Color(0xff4500)];

for (let i = 0; i < AUDIENCE_COUNT; i++) {
    // Semicircular seating arrangement
    const row = Math.floor(Math.random() * 10);
    const angle = -0.8 + Math.random() * 1.6; // spread
    const radius = 6 + row * 1.2;
    const x = Math.sin(angle) * radius;
    const z = -Math.cos(angle) * radius + 3;
    const y = 1.5 + row * 0.6 + Math.random() * 0.3;

    audPositions[i * 3] = x;
    audPositions[i * 3 + 1] = y;
    audPositions[i * 3 + 2] = z;

    const col = stickColors[Math.floor(Math.random() * stickColors.length)];
    audColors[i * 3] = col.r;
    audColors[i * 3 + 1] = col.g;
    audColors[i * 3 + 2] = col.b;

    audSizes[i] = 0.15 + Math.random() * 0.2;
}

const audGeo = new THREE.BufferGeometry();
audGeo.setAttribute('position', new THREE.BufferAttribute(audPositions, 3));
audGeo.setAttribute('color', new THREE.BufferAttribute(audColors, 3));
audGeo.setAttribute('size', new THREE.BufferAttribute(audSizes, 1));

const audMat = new THREE.PointsMaterial({
    size: 0.2, vertexColors: true, transparent: true, opacity: 0.7,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const audiencePoints = new THREE.Points(audGeo, audMat);
scene.add(audiencePoints);

// ── Floating particles ──
const PARTICLE_COUNT = 200;
const partPositions = new Float32Array(PARTICLE_COUNT * 3);
const partVelocities = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
    partPositions[i * 3] = (Math.random() - 0.5) * 20;
    partPositions[i * 3 + 1] = Math.random() * 15;
    partPositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
    partVelocities.push(0.005 + Math.random() * 0.02);
}

const partGeo = new THREE.BufferGeometry();
partGeo.setAttribute('position', new THREE.BufferAttribute(partPositions, 3));
const partMat = new THREE.PointsMaterial({
    size: 0.06, color: CYAN, transparent: true, opacity: 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false
});
const particleSystem = new THREE.Points(partGeo, partMat);
scene.add(particleSystem);

// ── Spotlights (Three.js spot lights for volumetric look) ──
const spotColors = [0x00fff2, 0xff69b4, 0xffcd00];
const spots = [];
for (let i = 0; i < 3; i++) {
    const light = new THREE.SpotLight(spotColors[i], 2, 30, Math.PI / 8, 0.5);
    light.position.set(-3 + i * 3, 14, -1);
    light.target.position.set(-1 + i * 1, 1, 0);
    scene.add(light);
    scene.add(light.target);
    spots.push(light);

    // Visible cone (simple line)
    const coneGeo = new THREE.ConeGeometry(1.5, 12, 4, 1, true);
    const coneMat = new THREE.MeshBasicMaterial({
        color: spotColors[i], transparent: true, opacity: 0.03, side: THREE.DoubleSide
    });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.set(-3 + i * 3, 8, -1);
    scene.add(cone);
}

// Ambient
scene.add(new THREE.AmbientLight(0x001520, 0.3));

// ── Audio setup ──
let analyser = null;
let dataArray = null;

// Get music source from URL parameter
const params = new URLSearchParams(location.search);
const musicUrl = params.get('music');
if (musicUrl) {
    const listener = new THREE.AudioListener();
    camera.add(listener);
    const audio = new THREE.Audio(listener);
    const audioLoader = new THREE.AudioLoader();
    audioLoader.load(musicUrl, (buffer) => {
        audio.setBuffer(buffer);
        audio.setLoop(true);
        audio.setVolume(0.8);
        audio.play();
        analyser = new THREE.AudioAnalyser(audio, 128);
        dataArray = analyser.data;
    }, undefined, (err) => {
        console.warn('Audio load failed, running without audio sync:', err);
    });
}

// ── Resize ──
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});

// ── Animate ──
const clock = new THREE.Clock();
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    time += dt;

    // Audio data
    let bass = 0, mid = 0;
    if (analyser) {
        analyser.getFrequencyData();
        for (let i = 0; i < 8; i++) bass += dataArray[i];
        bass /= 8 * 255;
        for (let i = 8; i < 32; i++) mid += dataArray[i];
        mid /= 24 * 255;
    } else {
        // Fake pulse when no audio
        bass = 0.3 + Math.sin(time * 2) * 0.15;
        mid = 0.2 + Math.sin(time * 3.5) * 0.1;
    }

    // Rotate disc
    discGroup.rotation.y += 0.005;
    tickGroup.rotation.y += 0.003;

    // Sway figures
    singer.rotation.z = Math.sin(time * 1.2 + singer.userData.swayPhase) * 0.04;
    guitarist.rotation.z = Math.sin(time * 1.5 + guitarist.userData.swayPhase) * 0.035;
    // Guitarist strumming arm bob
    guitarist.position.y = Math.sin(time * 3) * 0.05;

    // Audience lightstick flicker (modulate opacity)
    audMat.opacity = 0.4 + bass * 0.6;
    audMat.size = 0.15 + bass * 0.15;

    // Spotlight intensity pulsing with audio
    spots[0].intensity = 1 + bass * 4;
    spots[1].intensity = 0.8 + mid * 3;
    spots[2].intensity = 0.8 + bass * 3;

    // Bloom intensity pulses
    bloom.strength = 1.5 + bass * 1.5;

    // Float particles upward
    const pos = partGeo.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        pos[i * 3 + 1] += partVelocities[i];
        if (pos[i * 3 + 1] > 16) {
            pos[i * 3 + 1] = -1;
            pos[i * 3] = (Math.random() - 0.5) * 20;
            pos[i * 3 + 2] = (Math.random() - 0.5) * 20;
        }
    }
    partGeo.attributes.position.needsUpdate = true;

    // Slow camera orbit
    camera.position.x = Math.sin(time * 0.08) * 3;
    camera.position.z = 20 + Math.sin(time * 0.05) * 2;
    camera.lookAt(0, 4, 0);

    composer.render();
}

animate();
</script>
</body>
</html>
