<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Picasso Lab</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      .page {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .fallback {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 6px;
        color: #ffffff;
        background: #1a73e8;
        font: 14px/1.2 Arial, sans-serif;
        text-decoration: none;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      }

      .fallback:focus-visible {
        outline: 3px solid rgba(26, 115, 232, 0.35);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <iframe
        src="https://lab.picasso-lab.com/"
        title="Picasso Lab website"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="clipboard-read *; clipboard-write *; fullscreen *"
        allowfullscreen
      ></iframe>
    </main>
    <a class="fallback" href="https://lab.picasso-lab.com/" target="_blank" rel="noopener">
      打开 Picasso Lab
    </a>
  </body>
</html>
