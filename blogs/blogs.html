<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – Picasso Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: auto; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: #1a1d2e;
      line-height: 1.6;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
      padding: 36px 40px 60px;
    }

    .wrapper { max-width: 760px; margin: 0 auto; }

    /* ── Header ── */
    .blog-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #ebedf3;
    }
    .blog-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1d2e;
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .blog-header p {
      font-size: .88rem;
      color: #8690a8;
    }

    /* ── Blog card ── */
    .blog-card {
      display: block;
      padding: 24px 28px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid #ebedf3;
      background: #fff;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative;
      overflow: hidden;
    }
    .blog-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #667eea, #764ba2);
      opacity: 0;
      transition: opacity .2s;
    }
    .blog-card:hover {
      border-color: #d0d4e0;
      box-shadow: 0 6px 24px rgba(0,0,0,.07);
      transform: translateY(-1px);
    }
    .blog-card:hover::before { opacity: 1; }
    .blog-card:hover .card-title { color: #4f46e5; }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: .78rem;
      color: #8690a8;
    }
    .card-meta svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      vertical-align: -2px;
    }
    .card-source {
      display: inline-flex; align-items: center; gap: 3px;
      color: #4f46e5; font-weight: 500;
    }

    .card-title {
      font-size: 1.12rem;
      font-weight: 700;
      color: #1a1d2e;
      line-height: 1.4;
      margin-bottom: 8px;
      transition: color .15s;
    }

    .card-desc {
      font-size: .87rem;
      color: #5c6280;
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-authors {
      font-size: .8rem;
      color: #8690a8;
      font-style: italic;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: .68rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 4px;
      background: #f0f1f7;
      color: #5c6280;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .card-cta {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 14px;
      font-size: .82rem;
      font-weight: 600;
      color: #4f46e5;
    }
    .card-cta svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: transform .15s;
    }
    .blog-card:hover .card-cta svg { transform: translateX(3px); }

    @media (max-width: 600px) {
      body { padding: 24px 20px 40px; }
      .blog-header h1 { font-size: 1.3rem; }
      .card-title { font-size: 1rem; }
      .card-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="blog-header">
    <h1>Research Blog</h1>
    <p>Insights, tutorials, and deep dives from our research.</p>
  </div>
  <div id="blog-index"></div>
</div>

<script>
const POSTS = [
  {
    title: "GPU-Accelerated Automorphism Ensemble Decoding of Quantum LDPC Codes",
    url: "https://qec.codes/blog/autdec/",
    date: "Sep 16, 2025",
    source: "qec.codes",
    authors: "S. Koutsioumpas, J. Roffe",
    desc: "Showcasing automorphism ensemble decoding (AutDEC) for BP-OSD on NVIDIA A100 GPU — achieving >2x accuracy gains and 50% fewer decoder iterations for bivariate bicycle codes under realistic circuit-level noise.",
    tags: ["Decoding", "GPU", "Quantum LDPC"]
  }
];

function render() {
  document.getElementById('blog-index').innerHTML = POSTS.map(p => `
    <a class="blog-card" href="${p.url}" target="_blank" rel="noopener">
      <div class="card-meta">
        <span><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${p.date}</span>
        <span style="color:#d0d4e0">|</span>
        <span class="card-source"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${p.source}</span>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-footer">
        <div class="card-authors">${p.authors}</div>
        <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="card-cta">Read article <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </a>
  `).join('');
}
render();
</script>
</body>
</html>
