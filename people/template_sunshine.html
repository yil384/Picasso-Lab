  Cinematic god-rays avatar template
  Tunables:
  --avatar-size: circular avatar size
  --light-x/y: flare center, placed on the avatar's upper-left rim
-->

<style>
.sunshine-wrap {
  display: inline-block;
  cursor: pointer;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
}

.sunshine-stage {
  position: relative;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  overflow: visible;
  isolation: isolate;
}

.sunshine-godrays,
.sunshine-avatar-frame,
.sunshine-sunglasses,
.sunshine-face-light,
.sunshine-rim-light,
.sunshine-face-shadow,
.sunshine-visible-sun,
.sunshine-particles {
  position: absolute;
  pointer-events: none;
}

.sunshine-godrays {
  inset: 0;
  z-index: 6;
  width: 100%;
  height: 100%;
  overflow: visible;
  mix-blend-mode: screen;
  opacity: 0;
  transition: opacity 0.32s ease;
}

.sunshine-wrap.sun-on .sunshine-godrays {
  opacity: 1;
}

.sun-wash {
  opacity: 0;
}

.godray {
  fill: url(#rayGold);
  opacity: 0;
  transform-origin: var(--light-x, 77px) var(--light-y, 67px);
}

.sunburst {
  fill: url(#rayGold);
  opacity: 0;
  transform-origin: var(--light-x, 29px) var(--light-y, 29px);
}

.arc-ray {
  fill: url(#rayGold);
  opacity: 0;
  transform-origin: var(--light-x, 29px) var(--light-y, 29px);
}

.warm-ray {
  fill: url(#rayAmber);
  opacity: 0;
  transform-origin: var(--light-x, 29px) var(--light-y, 29px);
}

.heavy-ray {
  fill: url(#rayAmberHeavy);
  opacity: 0;
  transform-origin: var(--light-x, 29px) var(--light-y, 29px);
}

.ray-line {
  fill: none;
  stroke: url(#rayLine);
  stroke-width: var(--line-width, 1px);
  stroke-linecap: round;
  opacity: 0;
  transform-origin: var(--light-x, 29px) var(--light-y, 29px);
}

.sunshine-wrap.sun-on .sun-wash {
  animation: wash-breathe 5.6s ease-in-out infinite alternate;
}

.sunshine-wrap.sun-on .godray {
  animation: ray-drift var(--ray-speed, 5.2s) ease-in-out infinite alternate;
}

.sunshine-wrap.sun-on .sunburst {
  animation: burst-shimmer var(--burst-speed, 4.5s) ease-in-out infinite alternate;
}

.sunshine-wrap.sun-on .arc-ray {
  animation: arc-sweep var(--arc-speed, 6s) ease-in-out infinite alternate;
}

.sunshine-wrap.sun-on .warm-ray {
  animation: warm-ray-pulse var(--warm-speed, 5.8s) ease-in-out infinite alternate;
}

.sunshine-wrap.sun-on .heavy-ray {
  animation: heavy-ray-pulse var(--heavy-speed, 5.9s) ease-in-out infinite alternate;
}

.sunshine-wrap.sun-on .ray-line {
  animation: line-shimmer var(--line-speed, 5.6s) ease-in-out infinite alternate;
}

.sun-bloom,
.sun-core,
.sun-hot {
  opacity: 0;
  transform-origin: var(--light-x, 77px) var(--light-y, 67px);
}

.sunshine-wrap.sun-on .sun-bloom,
.sunshine-wrap.sun-on .sun-core,
.sunshine-wrap.sun-on .sun-hot {
  animation: sun-breathe 3.4s ease-in-out infinite alternate;
}

.sunshine-avatar-frame {
  left: 0;
  top: 0;
  z-index: 3;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition:
    transform 0.35s cubic-bezier(0.34,1.3,0.64,1),
    box-shadow 0.35s ease;
}

.sunshine-avatar {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  filter: none;
  transition: filter 0.35s ease, transform 0.35s cubic-bezier(0.34,1.3,0.64,1);
}

.sunshine-sunglasses {
  left: 42px;
  top: 75px;
  z-index: 8;
  width: 98px;
  height: 44px;
  overflow: visible;
  opacity: 0;
  transform: rotate(0.3deg) translateY(4px) scale(0.94);
  transform-origin: 50% 54%;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.32));
  transition:
    opacity 0.24s ease,
    transform 0.35s cubic-bezier(0.34,1.3,0.64,1),
    filter 0.35s ease;
}

.sunshine-wrap.sun-on .sunshine-sunglasses {
  opacity: 1;
  transform: rotate(0.3deg) translateY(0) scale(1);
}

.sunglasses-icon {

.sunglasses-bridge,

<script>
(function () {
  document.querySelectorAll('.sunshine-wrap').forEach((wrap) => {
    if (wrap.dataset.sunshineReady === '1') return;
    wrap.dataset.sunshineReady = '1';
    const particles = wrap.querySelector('.sunshine-particles');

    wrap.addEventListener('click', () => {
      clearTimeout(wrap._sunTimer);
      const on = wrap.classList.toggle('sun-on');
      if (on) {
        burst(particles);
      } else if (particles) {
        particles.innerHTML = '';
      }
    });
  });

  function burst(particles) {
    if (!particles) return;
    particles.innerHTML = '';
    const count = 12;
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('span');
      const angle = 0.05 + Math.random() * 0.86;
      const dist = 34 + Math.random() * 56;
      dot.className = 'sunshine-particle';
      dot.style.cssText = [
        `--dx:${(Math.cos(angle) * dist).toFixed(1)}px`,
        `--dy:${(Math.sin(angle) * dist).toFixed(1)}px`,
        `left:${23 + Math.random() * 18}%`,
        `top:${19 + Math.random() * 22}%`,
        `animation-delay:${(Math.random() * 0.10).toFixed(3)}s`
      ].join(';');
      particles.appendChild(dot);
      requestAnimationFrame(() => requestAnimationFrame(() => dot.classList.add('go')));
    }
    setTimeout(() => { particles.innerHTML = ''; }, 900);
  }
})();
</script>
