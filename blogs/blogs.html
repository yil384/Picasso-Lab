<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – Picasso Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: #1a1d2e;
      line-height: 1.6;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }

    .wrapper { max-width: 820px; margin: 0 auto; padding: 0 32px; }
    body.article-mode .wrapper { max-width: none; padding: 0; }

    /* ── Hero header ── */
    .blog-hero {
      background: linear-gradient(135deg, #00629B 0%, #004a76 60%, #003355 100%);
      padding: 48px 32px 44px;
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }
    .blog-hero::before {
      content: '';
      position: absolute;
      top: -40%; right: -10%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,205,0,.15), transparent 70%);
      border-radius: 50%;
    }
    .blog-hero::after {
      content: '';
      position: absolute;
      bottom: -30%; left: 10%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
      border-radius: 50%;
    }
    .blog-hero-inner {
      max-width: 820px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .blog-hero .label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #FFCD00;
      margin-bottom: 12px;
    }
    .blog-hero .label svg {
      width: 14px; height: 14px;
      stroke: #FFCD00; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .blog-hero h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .blog-hero p {
      font-size: .92rem;
      color: rgba(255,255,255,.7);
      max-width: 500px;
    }

    /* ── Blog card ── */
    .blog-card {
      display: block;
      padding: 28px 32px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid #e8eaf0;
      background: #fff;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color .2s, box-shadow .25s, transform .25s;
      position: relative;
    }
    .blog-card:hover {
      border-color: #c0c8d8;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }
    .blog-card:hover .card-title { color: #00629B; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-date {
      font-size: .78rem;
      color: #8690a8;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .card-date svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .card-source-pill {
      font-size: .72rem;
      font-weight: 600;
      color: #00629B;
      background: rgba(0,98,155,.08);
      padding: 3px 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-source-pill svg {
      width: 11px; height: 11px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #111;
      line-height: 1.35;
      margin-bottom: 10px;
      transition: color .15s;
    }

    .card-desc {
      font-size: .9rem;
      color: #5c6280;
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-authors {
      font-size: .82rem;
      color: #8690a8;
      font-style: italic;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: .67rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 4px;
      background: #f0f2f8;
      color: #5c6280;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 16px;
      font-size: .85rem;
      font-weight: 600;
      color: #00629B;
      padding: 6px 0;
    }
    .card-cta svg {
      width: 15px; height: 15px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: transform .2s;
    }
    .blog-card:hover .card-cta svg { transform: translateX(4px); }

    /* ── Article view ── */
    #article-view { display: none; }
    #article-view.active { display: block; }
    #blog-list.hidden { display: none; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .85rem;
      font-weight: 600;
      color: #00629B;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 24px 8px;
      font-family: inherit;
    }
    .back-btn:hover { text-decoration: underline; }
    .back-btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    #article-content { }

    .loading {
      text-align: center; padding: 60px 0; color: #8690a8; font-size: .9rem;
    }
    .loading-spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #e0e0e0; border-top-color: #00629B;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .blog-hero { padding: 32px 20px 28px; }
      .blog-hero h1 { font-size: 1.5rem; }
      .wrapper { padding: 0 20px; }
      .blog-card { padding: 20px; }
      .card-title { font-size: 1.05rem; }
      .card-bottom { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- Hero header -->
<div class="blog-hero">
  <div class="blog-hero-inner">
    <div class="label">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
      Picasso Lab Research
    </div>
    <h1>Research Blog</h1>
    <p>Insights, tutorials, and deep dives from our work on compilers, ML systems, and quantum computing.</p>
  </div>
</div>

<div class="wrapper">
  <!-- Blog list -->
  <div id="blog-list"></div>

  <!-- Article view -->
  <div id="article-view">
    <button class="back-btn" onclick="showIndex()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to all posts
    </button>
    <div id="article-content"></div>
  </div>
</div>

<script>
const RAW_BASE = 'https://raw.githubusercontent.com/yil384/Picasso-Lab/main/blogs/';

const POSTS = [
  {
    title: "Testing NVIDIA Ising: Evaluating Neural Pre-Decoding from Surface Codes to Bivariate Bicycle Codes",
    file: "nvidia-ising/index.html",
    date: "Apr 8, 2026",
    source: "Picasso Lab",
    sourceUrl: "https://yufeiding.ucsd.edu",
    authors: "K. Yin, J. Ruan, Y. Lin",
    desc: "We benchmark NVIDIA's CNN pre-decoder on surface codes (up to 2.12x speedup), then test an MLP pre-decoder on bivariate bicycle qLDPC codes — revealing that architecture-code alignment is the key to robust neural pre-decoding.",
    tags: ["QEC", "Neural Decoding", "NVIDIA Ising", "LDPC"]
  }
];

function renderIndex() {
  document.getElementById('blog-list').innerHTML = POSTS.map((p, i) => `
    <div class="blog-card" onclick="openArticle(${i})">
      <div class="card-top">
        <span class="card-date">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${p.date}
        </span>
        <span class="card-source-pill">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ${p.source}
        </span>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-bottom">
        <div class="card-authors">${p.authors}</div>
        <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="card-cta">Read article <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </div>
  `).join('');
}

async function openArticle(idx) {
  const post = POSTS[idx];
  const container = document.getElementById('article-content');
  const listEl = document.getElementById('blog-list');
  const articleEl = document.getElementById('article-view');

  listEl.classList.add('hidden');
  articleEl.classList.add('active');
  document.body.classList.add('article-mode');
  document.querySelector('.blog-hero').style.display = 'none';
  container.innerHTML = '<div class="loading"><span class="loading-spinner"></span>Loading article...</div>';
  window.scrollTo(0, 0);

  try {
    const filePath = post.file.split('/').map(encodeURIComponent).join('/');
    const url = RAW_BASE + filePath;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to fetch');
    const html = await resp.text();

    const fileDir = post.file.substring(0, post.file.lastIndexOf('/') + 1);
    const imgBase = RAW_BASE + fileDir.split('/').map(encodeURIComponent).join('/');

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const styles = [...doc.querySelectorAll('head style')].map(s => s.outerHTML).join('\n');

    doc.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src && !src.startsWith('http') && !src.startsWith('data:')) {
        img.setAttribute('src', imgBase + src.split('/').map(encodeURIComponent).join('/'));
      }
    });

    const body = doc.body.innerHTML;
    container.innerHTML = styles + body;

    // Fix TOC anchor links: scroll within page instead of navigating
    container.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const id = a.getAttribute('href').slice(1);
        const target = container.querySelector('#' + CSS.escape(id));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // Re-initialize TOC scroll-spy (IntersectionObserver)
    const tocLinks = container.querySelectorAll('.toc-sidebar a');
    if (tocLinks.length) {
      const sections = [];
      tocLinks.forEach(link => {
        const id = link.getAttribute('href').slice(1);
        const sec = container.querySelector('#' + CSS.escape(id));
        if (sec) sections.push({ el: sec, link: link });
      });

      const spyObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            tocLinks.forEach(l => l.classList.remove('active'));
            const match = sections.find(s => s.el === entry.target);
            if (match) match.link.classList.add('active');
          }
        });
      }, { threshold: 0.1, rootMargin: '-10% 0px -80% 0px' });

      sections.forEach(s => spyObserver.observe(s.el));
    }

    // Resize for Google Sites embed
    requestAnimationFrame(() => {
      const h = document.body.scrollHeight;
      document.documentElement.style.height = h + 'px';
      document.body.style.height = h + 'px';
      try { window.parent.postMessage({ type: 'resize', height: h }, '*'); } catch(e) {}
    });

    // Load MathJax if needed
    if (html.includes('mathjax')) {
      const mjScript = document.createElement('script');
      mjScript.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js';
      mjScript.async = true;
      document.head.appendChild(mjScript);
    }
  } catch (e) {
    container.innerHTML = '<div class="loading" style="color:#e04040">Failed to load article. <a href="' + post.sourceUrl + '" target="_blank" style="color:#00629B">View original &rarr;</a></div>';
  }
}

function showIndex() {
  document.getElementById('blog-list').classList.remove('hidden');
  document.getElementById('article-view').classList.remove('active');
  document.body.classList.remove('article-mode');
  document.querySelector('.blog-hero').style.display = '';
  document.documentElement.style.height = '';
  document.body.style.height = '';
  document.getElementById('article-content').innerHTML = '';
  window.scrollTo(0, 0);
}

renderIndex();
</script>
</body>
</html>
