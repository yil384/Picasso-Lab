<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects – Picasso Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: transparent;
      color: #1a1d2e;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #00629B 0%, #004a76 60%, #003355 100%);
      padding: 48px 32px 44px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -40%; right: -10%;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(255,205,0,.14), transparent 70%);
      border-radius: 50%;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -30%; left: 8%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
      border-radius: 50%;
    }
    .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .hero-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      color: #FFCD00; margin-bottom: 12px;
    }
    .hero-label svg { width: 14px; height: 14px; stroke: #FFCD00; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .hero h1 { font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: -.03em; margin-bottom: 8px; }
    .hero p { font-size: .92rem; color: rgba(255,255,255,.7); max-width: 500px; }

    /* ── Grid ── */
    .wrapper { max-width: 1100px; margin: 0 auto; padding: 36px 24px 56px; }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 22px;
    }

    /* ── Card ── */
    .project-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform .25s cubic-bezier(.34,1.26,.64,1), box-shadow .25s ease, border-color .2s;
      position: relative;
    }
    .project-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,.12);
      border-color: rgba(0,0,0,.11);
    }

    /* Colored top accent bar */
    .card-accent-bar {
      height: 3px;
      width: 100%;
      flex-shrink: 0;
    }

    /* Thumbnail — screenshot as background */
    .card-thumb {
      width: 100%;
      height: 210px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
    }

    /* Dark overlay so particles pop */
    .card-thumb::before {
      content: '';
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(4,6,20,.42) 0%, rgba(4,6,20,.60) 100%);
      pointer-events: none;
    }

    /* Particle canvas */
    .thumb-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 2;
      pointer-events: none;
    }

    /* Bottom fade — blends thumbnail into white card body */
    .card-thumb::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,.6) 55%, rgba(255,255,255,.98) 100%);
      pointer-events: none; z-index: 5;
    }

    /* Decorative corner-bracket overlay */
    .thumb-deco {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 3;
      opacity: .55;
      transition: opacity .3s;
    }
    .project-card:hover .thumb-deco { opacity: .85; }

    /* Scanline that sweeps on hover */
    .thumb-scan {
      position: absolute; top: -2px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.55) 40%, rgba(255,255,255,.55) 60%, transparent);
      pointer-events: none; z-index: 4;
      opacity: 0;
      transition: none;
    }
    .project-card:hover .thumb-scan {
      animation: scan-sweep .65s ease-in-out forwards;
    }
    @keyframes scan-sweep {
      0%   { top: -2px;  opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: .6; }
      100% { top: calc(100% + 2px); opacity: 0; }
    }

    /* Live badge */
    .live-pill {
      position: absolute; top: 12px; right: 12px; z-index: 4;
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(10,12,24,.55);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff; font-size: .65rem; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #22d46b;
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }

    /* Card body */
    .card-body {
      padding: 18px 22px 20px;
      flex: 1; display: flex; flex-direction: column;
    }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-category {
      font-size: .68rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px;
    }
    .card-domain {
      font-size: .72rem; color: #9399b0;
      display: flex; align-items: center; gap: 3px;
    }
    .card-domain svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .card-name {
      font-size: 1.25rem; font-weight: 800; color: #0e1120;
      letter-spacing: -.02em; line-height: 1.2;
      margin-bottom: 8px;
      transition: color .15s;
    }
    .project-card:hover .card-name { color: var(--accent); }

    .card-desc {
      font-size: .875rem; color: #5c6280; line-height: 1.7;
      flex: 1; margin-bottom: 16px;
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: .63rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 5px;
      background: #f0f2f9; color: #6470a0;
    }
    .card-launch {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .8rem; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
      padding: 7px 14px; border-radius: 8px;
      color: #fff;
      transition: opacity .15s, transform .15s;
    }
    .card-launch svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .project-card:hover .card-launch { opacity: .88; }
    .project-card:hover .card-launch svg { transform: translateX(3px); }

    /* ── iframe viewer ── */
    #iframe-view {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      flex-direction: column;
    }
    #iframe-view.active { display: flex; }

    .iframe-bar {
      height: 52px; min-height: 52px;
      background: #fff;
      border-bottom: 1px solid #e6e8f0;
      display: flex; align-items: center; gap: 10px;
      padding: 0 14px;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
    }
    .bar-back {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .82rem; font-weight: 600; color: #4a5280;
      background: none; border: none; cursor: pointer; font-family: inherit;
      padding: 7px 10px; border-radius: 8px;
      transition: background .15s, color .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .bar-back:hover { background: #f0f2f9; color: #00629B; }
    .bar-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .bar-sep { width: 1px; height: 22px; background: #e0e2ec; flex-shrink: 0; }

    .bar-url {
      flex: 1;
      background: #f4f6fb; border: 1px solid #e0e2ec;
      border-radius: 8px; padding: 6px 12px;
      font-size: .8rem; color: #5c6280; font-family: inherit;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      min-width: 0;
    }
    .bar-url-lock { color: #22c55e; flex-shrink: 0; }
    .bar-url-lock svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .bar-url-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .bar-ext {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .78rem; font-weight: 600; color: #fff;
      background: #00629B; border: none; cursor: pointer; font-family: inherit;
      padding: 7px 14px; border-radius: 8px;
      text-decoration: none; transition: background .15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .bar-ext:hover { background: #005082; }
    .bar-ext svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .iframe-body { flex: 1; position: relative; background: #fff; }
    #project-iframe { width: 100%; height: 100%; border: none; display: block; }

    .iframe-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      background: #fff;
      transition: opacity .25s;
    }
    .iframe-overlay.hide { opacity: 0; pointer-events: none; }
    .spin-ring {
      width: 38px; height: 38px;
      border: 3px solid #e0e2ec; border-top-color: #00629B;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { font-size: .88rem; color: #8690a8; font-weight: 500; }

    .iframe-blocked-msg {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 32px;
    }
    .iframe-blocked-msg.show { display: flex; }
    .blocked-icon { font-size: 2.8rem; line-height: 1; }
    .blocked-title { font-size: 1.05rem; font-weight: 700; color: #1a1d2e; }
    .blocked-desc { font-size: .85rem; color: #8690a8; max-width: 300px; line-height: 1.6; }
    .blocked-cta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .85rem; font-weight: 700; color: #fff;
      background: #00629B; text-decoration: none;
      padding: 10px 22px; border-radius: 10px;
      transition: background .15s;
    }
    .blocked-cta:hover { background: #005082; }
    .blocked-cta svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    @media (max-width: 640px) {
      .hero { padding: 32px 20px 28px; }
      .hero h1 { font-size: 1.6rem; }
      .wrapper { padding: 22px 14px 40px; }
      .project-grid { grid-template-columns: 1fr; gap: 16px; }
      .card-thumb { height: 180px; }
      .bar-url { display: none; }
      .iframe-bar { padding: 0 10px; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="hero" id="hero-section">
  <div class="hero-inner">
    <div class="hero-label">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Picasso Lab
    </div>
    <h1>Projects &amp; Demos</h1>
    <p>Live research tools and interactive demos from our work on compilers, ML systems, and quantum computing.</p>
  </div>
</div>

<div class="wrapper" id="project-list">
  <div class="project-grid" id="project-grid"></div>
</div>

<!-- iframe viewer -->
<div id="iframe-view">
  <div class="iframe-bar">
    <button class="bar-back" onclick="closeProject()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Projects
    </button>
    <div class="bar-sep"></div>
    <div class="bar-url">
      <span class="bar-url-lock"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></span>
      <span class="bar-url-text" id="bar-url-text">—</span>
    </div>
    <a class="bar-ext" id="external-link" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Open in new tab
    </a>
  </div>
  <div class="iframe-body">
    <div class="iframe-overlay" id="iframe-overlay">
      <div class="iframe-blocked-msg" id="iframe-blocked">
        <div class="blocked-icon">🔒</div>
        <div class="blocked-title">Can't embed this site</div>
        <div class="blocked-desc">This site's security policy prevents inline preview. Open it directly instead.</div>
        <a class="blocked-cta" id="blocked-link" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open in new tab
        </a>
      </div>
      <div id="loading-inner">
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
          <div class="spin-ring"></div>
          <div class="overlay-text">Loading…</div>
        </div>
      </div>
    </div>
    <iframe id="project-iframe" title="Project preview"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  </div>
</div>

<script>
// ─── Project data ─────────────────────────────────────────────────────────────
const PROJECTS = [
  {
    id: 'qubrio', name: "Qubrio", url: "https://qubrio.picasso-lab.com/",
    img: "qubrio.png",
    category: "Quantum Computing", accent: "#7c3aed", accentBg: "rgba(124,58,237,.10)",
    desc: "A multi-agent LLM compiler for neutral atom quantum computers. Specialized agents handle qubit placement, atom routing, and schedule optimization — achieving 4.7× hardware runtime reduction over state-of-the-art baselines.",
    tags: ["Quantum Compilation", "Multi-Agent", "LLM"], bracketColor: "rgba(167,139,250,.7)",
  },
  {
    id: 'tritongym', name: "TritonGym", url: "https://tritongym.picasso-lab.com",
    img: "tritongym.png",
    category: "LLM Benchmark", accent: "#059669", accentBg: "rgba(5,150,105,.10)",
    desc: "An ICML 2026 benchmark evaluating LLMs on generating optimized Triton GPU kernels via agentic workflows. 164 operators, four agent strategies, and a live leaderboard ranking models by correctness and kernel performance.",
    tags: ["Triton", "LLM", "Benchmark", "ICML 2026"], bracketColor: "rgba(52,211,153,.7)",
  },
  {
    id: 'tritondft', name: "TritonDFT", url: "https://tritondft.com/",
    img: "tritondft.png",
    category: "AI for Science", accent: "#0284c7", accentBg: "rgba(2,132,199,.10)",
    desc: "A multi-agent AI system automating Density Functional Theory (DFT) calculations in materials science. Four specialized agents — Planner, Executor, Analyzer, Refiner — reduce per-step time from hours to seconds.",
    tags: ["DFT", "Materials Science", "Multi-Agent"], bracketColor: "rgba(56,189,248,.7)",
  },
  {
    id: 'chipmate', name: "ChipMate", url: "https://chipmate.picasso-lab.com",
    img: "chipmate.png",
    category: "Chip Design", accent: "#d97706", accentBg: "rgba(217,119,6,.10)",
    desc: "A self-trained multi-agent framework for RTL (Verilog) code generation. Two agents cross-verify outputs via waveform comparison — outperforming DeepSeek V3 despite being 20–180× smaller.",
    tags: ["RTL", "Verilog", "Multi-Agent", "EDA"], bracketColor: "rgba(251,191,36,.7)",
  },
];

// ─── Particle constellation animation ─────────────────────────────────────────
function initParticles() {
  document.querySelectorAll('.thumb-canvas').forEach(cv => {
    if (cv._started) return;
    cv._started = true;

    const hex = cv.dataset.accent;
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);

    const W = cv.offsetWidth  || 480;
    const H = cv.offsetHeight || 210;
    cv.width  = W;
    cv.height = H;

    const pts = Array.from({length: 26}, () => ({
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: (Math.random() - .5) * .45,
      vy: (Math.random() - .5) * .45,
      r:  Math.random() * 1.6 + .7,
      ph: Math.random() * Math.PI * 2,
    }));

    const ctx = cv.getContext('2d');
    const LINK = 88; // max distance for connecting lines

    function frame() {
      ctx.clearRect(0, 0, W, H);

      // update
      for (const p of pts) {
        p.x  += p.vx;
        p.y  += p.vy;
        p.ph += .016;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
      }

      // connecting lines
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x;
          const dy = pts[i].y - pts[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < LINK) {
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(${r},${g},${b},${.22 * (1 - d / LINK)})`;
            ctx.lineWidth   = .9;
            ctx.stroke();
          }
        }
      }

      // dots
      for (const p of pts) {
        const a = .55 + .35 * Math.sin(p.ph);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
        ctx.fill();
      }

      requestAnimationFrame(frame);
    }
    frame();
  });
}

// ─── Card rendering ────────────────────────────────────────────────────────────
function renderCards() {
  document.getElementById('project-grid').innerHTML = PROJECTS.map((p, i) => `
    <div class="project-card" style="--accent:${p.accent}" onclick="openProject(${i})">
      <div class="card-accent-bar" style="background:${p.accent}"></div>
      <div class="card-thumb" style="background-image:url('${p.img}')">
        <canvas class="thumb-canvas" data-accent="${p.accent}"></canvas>
        <svg class="thumb-deco" viewBox="0 0 480 210" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <g stroke="${p.bracketColor}" stroke-width="1.5" fill="none" stroke-linecap="round">
            <path d="M14 30 L14 13 L30 13"/>
            <path d="M450 13 L466 13 L466 30"/>
            <path d="M14 180 L14 197 L30 197"/>
            <path d="M450 197 L466 197 L466 180"/>
          </g>
          <rect x="13" y="12" width="454" height="186" rx="1"
                stroke="${p.bracketColor}" stroke-width=".4" fill="none" stroke-dasharray="3 6"/>
        </svg>
        <div class="thumb-scan"></div>
        <div class="live-pill"><div class="live-dot"></div>Live</div>
      </div>
      <div class="card-body">
        <div class="card-head">
          <span class="card-category" style="color:${p.accent};background:${p.accentBg}">${p.category}</span>
          <span class="card-domain">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
            ${p.url.replace(/^https?:\/\//, '').replace(/\/$/, '')}
          </span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="card-launch" style="background:${p.accent}">
            Launch
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ─── iframe viewer ─────────────────────────────────────────────────────────────
function openProject(idx) {
  const p = PROJECTS[idx];
  const view    = document.getElementById('iframe-view');
  const iframe  = document.getElementById('project-iframe');
  const overlay = document.getElementById('iframe-overlay');
  const blocked = document.getElementById('iframe-blocked');
  const loadInner = document.getElementById('loading-inner');

  document.getElementById('bar-url-text').textContent = p.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
  document.getElementById('external-link').href = p.url;
  document.getElementById('blocked-link').href  = p.url;

  overlay.classList.remove('hide');
  blocked.classList.remove('show');
  loadInner.style.display = '';
  iframe.src = '';

  view.classList.add('active');
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('project-list').style.display = 'none';
  document.body.style.overflow = 'hidden';

  let done = false;
  const timer = setTimeout(() => { if (!done) showBlocked(); }, 11000);
  iframe.onload = () => { done = true; clearTimeout(timer); overlay.classList.add('hide'); };
  iframe.src = p.url;
}

function showBlocked() {
  document.getElementById('loading-inner').style.display = 'none';
  document.getElementById('iframe-blocked').classList.add('show');
}

function closeProject() {
  document.getElementById('iframe-view').classList.remove('active');
  document.getElementById('project-iframe').src = '';
  document.getElementById('hero-section').style.display = '';
  document.getElementById('project-list').style.display = '';
  document.body.style.overflow = '';
}

renderCards();
requestAnimationFrame(initParticles);
</script>
