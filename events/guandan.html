                <div class="score-pill">${iconHTML("level")}<span>${L("Level", "本局打")}</span><strong>${game.currentLevelRank}</strong></div>
                <div class="score-pill">${iconHTML("round")}<span>${L("Round", "第")}</span><strong>${game.roundNo}</strong>${isZH() ? " 局" : ""}</div>
                <div class="score-pill wide turn-timer ${turnClockClass}">${iconHTML("turn")}<span>${L("Turn", "轮到")}</span><strong>${encodeHTML(currentTurnName)}</strong><em id="turn-clock">${turnClockText}</em></div>
                <div class="score-pill">${iconHTML("wild")}<span>${L("Wild", "逢人配")}</span><strong class="wild-rank">♥${game.currentLevelRank}</strong></div>
            </div>
            ${[0,1,2,3].map(i => playerHTML(i, mine)).join("")}
            ${[0,1,2,3].map(i => seatPlayHTML(i, mine)).join("")}
            ${dealOverlayHTML(mine, dealPhase)}
            <div class="center-zone">
                <div class="center-card">
                    <div class="center-meta"><span>${iconHTML("last")}${L("Last Trick", "上一手")}</span><strong>${lastLabel}</strong></div>
                    ${tributeSummaryHTML()}
                    <div class="last-play ${game.lastPlay ? "" : "empty"}">${encodeHTML(lastPlaySummaryHTML(lastLabel))}</div>
                    <div class="round-message">${encodeHTML(displayMessage(game.message || ""))}</div>
                </div>
            </div>
            <div class="history"><div class="history-title"><span>${iconHTML("log")}${L("Trick Log", "出牌记录")}</span><span>${(game.history || []).length}</span></div>${historyRows || `<div class="history-row">${L("Waiting for the first play.", "等待第一手牌。")}</div>`}</div>
            ${game.phase === "roundOver" ? roundOverHTML() : ""}
            ${game.phase === "gameOver" ? gameOverHTML() : ""}
            <div class="hand-zone ${canAct ? "your-turn" : ""}">
                <div class="hand-header">
                    <div class="hand-summary">${mine >= 0 ? `${L("Hand", "手牌")} ${tableBusy ? "" : `<strong>${myHand.length}</strong> ${L("cards", "张")} · `}${canAct ? L("Your turn", "轮到你出牌") : tableBusy ? (dealPhase === "dealing" ? L("Dealing", "发牌中") : L("Sorting", "理牌中")) : `${L("Waiting for", "等待")} ${encodeHTML(currentTurnName)}`}` : L("Spectator view", "观战视角")}</div>
                    <div class="hand-tools">
                        <button class="btn secondary" id="clear-btn" type="button">${iconLabel("clear", L("Clear", "取消"))}</button>
                        <button class="btn secondary" id="hint-btn" ${canAct && !actionBusy ? "" : "disabled"} type="button">${iconLabel("hint", L("Hint", "提示"))}</button>
                        <button class="btn secondary" id="pass-btn" ${canAct && game.lastPlay && !actionBusy ? "" : "disabled"} type="button">${iconLabel("pass", L("Pass", "不要"))}</button>
                        <button class="btn" id="play-btn" ${canPlaySelected ? "" : "disabled"} type="button">${iconLabel("play", L("Play", "出牌"))}</button>
                    </div>
                    <div class="hand-feedback">
                        <div class="selection-meter">${L("Selected", "已选")} <strong>${selected.size}</strong> ${L("cards", "张")}</div>
                        <div class="combo-advisor ${advisorClass}"><span>${advisorText}</span><em>${encodeHTML(advisorDetail)}</em></div>
                    </div>
                </div>
                <div class="hand ${dealPhase === "dealing" ? "receiving-hand" : dealPhase === "sorting" ? "sorting-hand" : ""} ${handSelectable && dealPhase === "done" ? "reorderable" : ""}">${handCardsHTML(myHand, handSelectable, dealPhase)}</div>
            </div>
        </div>
    </section>`;
    function refreshSelectionState() {
        const selectedCardsNow = mine >= 0 ? myHand.filter(c => selected.has(c.id)) : [];
        const rawCombosNow = selectedCardsNow.length ? evaluateCombos(selectedCardsNow, game.currentLevelRank) : [];
        const selectedComboNow = selectedCardsNow.length ? choosePlayable(selectedCardsNow, game.lastPlay?.combo || null, game.currentLevelRank) : null;
        const canPlayNow = canAct && !!selectedComboNow && !actionBusy;
        let nextClass = "";
        let nextText = mine >= 0
            ? L("Select cards to preview the combo before playing.", "选牌后会预览牌型和能否出牌。")
            : L("Spectator view. Sit in the lobby before the next game to play.", "观战视角。下局前回大厅入座即可参与。");
        let nextDetail = selectedCardsNow.map(cardText).join(" ");
        const activeHintNow = activeHintForSelection(selectedCardsNow, canAct);
        if (activeHintNow) {
            nextClass = activeHintNow.className || "hint";
            nextText = activeHintNow.text;
            nextDetail = activeHintNow.detail || nextDetail;
        } else if (tableBusy) {
            nextText = dealPhase === "dealing"
                ? L("Cards are being dealt. Your hand will reveal after the deal.", "正在发牌，发完后会翻开并理牌。")
                : L("Sorting your hand.", "正在理牌。");
        } else if (mine >= 0 && game.phase !== "playing") {
            nextText = L("Round review mode. Start the next round when everyone is ready.", "本局结算中，准备好后进入下一局。");
        } else if (mine >= 0 && !canAct) {
            nextText = `${L("Waiting for", "等待")} ${encodeHTML(currentTurnName)}`;
        } else if (selectedCardsNow.length && selectedComboNow) {
            nextClass = "ready";
            nextText = `${L("Ready", "可出")}: ${comboName(selectedComboNow)} · ${selectedCardsNow.length} ${L("cards", "张")}`;
        } else if (selectedCardsNow.length && rawCombosNow.length) {
            nextClass = "invalid";
            nextText = L("Legal combo, but it does not beat the current trick.", "牌型合法，但压不过当前上一手。");
        } else if (selectedCardsNow.length) {
            nextClass = "invalid";
            nextText = L("Not a legal Guandan combo.", "当前选牌不是合法掼蛋牌型。");
        }
        const advisor = document.querySelector(".combo-advisor");
        advisor?.classList.toggle("ready", nextClass === "ready");
        advisor?.classList.toggle("hint", nextClass === "hint");
        advisor?.classList.toggle("invalid", nextClass === "invalid");
        const span = advisor?.querySelector("span");
        const em = advisor?.querySelector("em");
        if (span) span.textContent = nextText;
        if (em) em.textContent = nextDetail;
        const playBtn = document.getElementById("play-btn");
        if (playBtn) playBtn.disabled = !canPlayNow;
        const meter = document.querySelector(".selection-meter strong");
        if (meter) meter.textContent = String(selected.size);
    }
    document.querySelectorAll("[data-card-id]").forEach(el => {
        el.addEventListener("click", () => {
            if (suppressNextCardClick) {
                suppressNextCardClick = false;
                return;
            }
            const id = el.dataset.cardId;
            hintAdvisor = null;
            if (selected.has(id)) selected.delete(id);
            else selected.add(id);
            el.classList.toggle("selected", selected.has(id));
            refreshSelectionState();
        });
        el.addEventListener("dragstart", event => {
            cardDragState = { id: el.dataset.cardId || "", moved: false };
            el.classList.add("drag-source");
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", cardDragState.id);
        });
        el.addEventListener("dragover", event => {
            if (!cardDragState.id || cardDragState.id === el.dataset.cardId) return;
            event.preventDefault();
            const rect = el.getBoundingClientRect();
            const before = event.clientX < rect.left + rect.width / 2;
            el.classList.toggle("drop-before", before);
            el.classList.toggle("drop-after", !before);
        });
        el.addEventListener("dragleave", () => {
            el.classList.remove("drop-before", "drop-after");
        });
        el.addEventListener("drop", event => {
            if (!cardDragState.id) return;
            event.preventDefault();
            const rect = el.getBoundingClientRect();
            const before = event.clientX < rect.left + rect.width / 2;
            cardDragState.moved = moveHandCard(cardDragState.id, el.dataset.cardId, before);
        });
        el.addEventListener("dragend", () => {
            if (cardDragState.moved) suppressNextCardClick = true;
            cardDragState = { id: "", moved: false };
            document.querySelectorAll(".drag-source,.drop-before,.drop-after").forEach(node => node.classList.remove("drag-source", "drop-before", "drop-after"));
        });
    });
    document.getElementById("play-btn")?.addEventListener("click", playSelected);
    document.getElementById("pass-btn")?.addEventListener("click", passTurn);
    document.getElementById("hint-btn")?.addEventListener("click", hintMove);
    document.getElementById("clear-btn")?.addEventListener("click", () => { selected.clear(); hintAdvisor = null; renderTable(); });
    document.getElementById("next-round")?.addEventListener("click", nextRound);
}

function playerHTML(i, mine) {
    const s = game.seats[i] || { name: `Seat ${i + 1}`, type: "empty" };
    if (i === mine) return "";
    const count = (game.hands[i] || []).length;
    const finishedPlace = finishedList(game).indexOf(i) + 1;
    const pos = visualSeatPos(i, mine);
    const name = displaySeatName(s, `Seat ${i + 1}`);
    const thinking = game.phase === "playing" && game.currentTurn === i && s.type === "ai";
    const canRevealCount = i === mine || finishedPlace || count <= 7;
    const countText = finishedPlace
        ? L("DONE", "完赛")
        : canRevealCount
            ? `${count} ${L("cards", "张")}`
            : "";
    const leftLabel = finishedPlace
        ? L(`#${finishedPlace}`, `第 ${finishedPlace} 名`)
        : i !== mine && count > 7
            ? `≥8 ${L("cards", "张")}`
            : L("left", "剩余");
    const backCount = finishedPlace
        ? 0
        : i === mine
            ? Math.min(6, Math.max(1, Math.ceil(count / 5)))
            : count <= 7
                ? Math.max(1, count)
                : 8;
    return `<div class="player p${pos} ${game.currentTurn === i ? "turn" : ""} ${thinking ? "thinking" : ""} ${finishedPlace ? "finished" : ""}">
        <div class="player-main">
            <div class="player-avatar">${encodeHTML(initials(name, String(i + 1)))}</div>
            <div class="player-name"><span>${encodeHTML(name)}</span><span class="player-badge">${i === mine ? L("You", "你") : teamName(i % 2)}</span></div>
        </div>
        <div class="player-small"><span>${iconHTML(s.type === "ai" ? "ai" : "human")} ${s.type === "ai" ? "AI" : L("Human", "真人")} · ${thinking ? `<span class="thinking-badge">${L("Thinking", "思考中")}<i></i><i></i><i></i></span>` : leftLabel}</span>${countText ? `<span class="count-chip${i !== mine && !finishedPlace && count <= 7 ? " alert" : ""}">${iconHTML("cards")} ${countText}</span>` : ""}</div>
        <div class="back-stack">${Array.from({ length: backCount }).map(() => `<i class="mini-back"></i>`).join("")}</div>
    </div>`;
}

function roundOverHTML() {
    const r = game.roundResult;
    const rows = r.order.map((i, idx) => `<div class="tribute-row">${L(`#${idx + 1}`, `第 ${idx + 1} 名`)}: ${encodeHTML(displaySeatName(game.seats[i]))} · ${teamName(i % 2)}</div>`).join("");
    const title = r.aceChallenge
        ? r.aceReset
            ? `${teamName(r.firstTeam)} ${L("A challenge reset", "冲 A 失败退回 2")}`
            : `${teamName(r.firstTeam)} ${L("A challenge failed", "冲 A 失败")}`
        : `${teamName(r.firstTeam)} ${L(`advances ${r.advance}`, `本局升级 ${r.advance}`)}`;
    const detail = r.aceChallenge
        ? r.aceReset
            ? L("This was the third failed A challenge. The team resets to level 2 next round.", "这是第 3 次冲 A 失败，下局该队退回打 2。")
            : L(`A challenge failed. Failure ${r.aceFailureCount}/${ACE_FAIL_LIMIT}; the team keeps playing A next round.`, `冲 A 失败，第 ${r.aceFailureCount}/${ACE_FAIL_LIMIT} 次；下局继续打 A。`)
        : L("The next round will automatically handle Tribute and Return. If the paying side holds two Red Jokers, Tribute is blocked.", "下一局将自动处理进贡/还贡；如果进贡方合计拿到两张大王，则抗贡成功。");
    return `<div class="phase-panel">
        <h2>${title}</h2>
        <p>${detail}</p>
        <div class="tribute-list">${rows}</div>
        <button class="btn" id="next-round" ${isHost() ? "" : "disabled"} type="button">${L("Next Round", "进入下一局")}</button>
    </div>`;
}

function gameOverHTML() {
    const r = game.roundResult;
    const rows = r.order.map((i, idx) => `<div class="tribute-row">${L(`#${idx + 1}`, `第 ${idx + 1} 名`)}: ${encodeHTML(displaySeatName(game.seats[i]))} · ${teamName(i % 2)}</div>`).join("");
    return `<div class="phase-panel">
        <h2>${teamName(r.firstTeam)} ${L("wins the match", "冲 A 成功")}</h2>
        <p>${L("A-level victory requires first place with the partner in second or third. The match is complete.", "打 A 时必须头游且对家第二或第三才算升级成功；本场比赛结束。")}</p>
        <div class="tribute-list">${rows}</div>
        <button class="btn" id="next-round" disabled type="button">${L("Match Complete", "比赛结束")}</button>
    </div>`;
}

document.getElementById("copy-link-btn").addEventListener("click", async () => {
    if (!roomCode) return showToast(L("No room yet", "还没有房间"));
    const url = new URL(location.href);
    url.searchParams.set("room", roomCode);
    try {
        await navigator.clipboard.writeText(url.toString());
        showToast(L("Room link copied", "房间链接已复制"));
    } catch (_) {
        showToast(roomCode);
    }
});

document.getElementById("new-room-btn").addEventListener("click", () => {
    location.href = GUANDAN_URL;
});

langToggleBtn.addEventListener("click", () => {
    uiLang = isZH() ? "en" : "zh";
    localStorage.setItem("picasso.guandan.lang", uiLang);
    setStaticLabels();
    render();
});

backEventsBtn.addEventListener("click", startReturnToEvents);

window.addEventListener("load", () => setTimeout(primeReturnKeyboardCapture, 0), { once: true });
window.addEventListener("pageshow", () => setTimeout(primeReturnKeyboardCapture, 0));
window.addEventListener("focus", primeReturnKeyboardCapture);
document.addEventListener("pointerenter", primeReturnKeyboardCapture);
document.addEventListener("mousemove", () => {
    if (!returnKeyboardPrimed) primeReturnKeyboardCapture();
}, { once: true });

document.addEventListener("keydown", event => {
    if (event.target?.closest?.("input, textarea, [contenteditable='true']")) return;
    if (event.key.length !== 1 || event.metaKey || event.ctrlKey || event.altKey) return;
    returnKeyboardPrimed = true;
    returnBuffer = (returnBuffer + event.key.toLowerCase()).slice(-7);
    if (returnBuffer.endsWith("picasso") || returnBuffer.endsWith("picaso")) {
        returnBuffer = "";
        startReturnToEvents();
        return;
    }
    if (returnBuffer.length >= 2) showReturnTypeHint();
}, true);

if (roomCode) attachRoom(roomCode);
else render();
</script>
<script src="https://yil384.github.io/Picasso-Lab/events/static/guandan-records.js"></script>
<script>
(function () {
    var R = window.GuandanRecords;
    if (!R) return;
    var modal = document.getElementById("gdr-cardmodal");
    var mbody = document.getElementById("gdr-cardmodal-body");
    var closeBtn = document.getElementById("gdr-card-close");
    var rendered = false;
    function openCard() {
        if (!rendered && mbody) { mbody.innerHTML = R.buildHTML(); rendered = true; }
        if (modal) { modal.style.display = "flex"; modal.setAttribute("aria-hidden", "false"); }
        document.body.style.overflow = "hidden";
    }
    function closeCard() {
        if (modal) { modal.style.display = "none"; modal.setAttribute("aria-hidden", "true"); }
        document.body.style.overflow = "";
    }
    closeBtn && closeBtn.addEventListener("click", closeCard);
    modal && modal.addEventListener("click", function (e) { if (e.target === modal) closeCard(); });
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && modal && modal.style.display === "flex") closeCard();
        if ((e.key === "Enter" || e.key === " ") && e.target.closest && e.target.closest(".gdr-banner")) { e.preventDefault(); openCard(); }
    });
    // open via delegation (banner is injected into the JS-rendered lobby)
    document.addEventListener("click", function (e) {
        if (e.target.closest && e.target.closest(".gdr-banner")) openCard();
    });
    // inject the records banner into the lobby (the "Open a Lab Guandan Table" page) whenever it (re)renders
    function injectBanner() {
        var lobby = document.querySelector(".lobby");
        if (lobby && !lobby.querySelector(".gdr-banner")) {
            var el = document.createElement("div");
            el.className = "gdr-banner gdr-scope";
            el.setAttribute("role", "button");
            el.tabIndex = 0;
            // main UI is a module (L/uiLang aren't global) — read the saved lang directly.
            // The toggle writes localStorage before re-render, so re-injection picks up the switch.
            var bnLang = localStorage.getItem("picasso.guandan.lang") || "en";
            var btnLabel = bnLang === "zh" ? "巅峰对决 · 完整战绩 ›" : "Peak Showdown · Full Record ›";
            el.innerHTML = '<div class="gdr-banner-inner">' + (R.buildBanner ? R.buildBanner() : "") + '</div>' +
                '<button class="gdr-banner-btn" type="button">' + btnLabel + '</button>';
            lobby.insertBefore(el, lobby.firstChild);
        }
    }
    var root = document.getElementById("root") || document.body;
    new MutationObserver(injectBanner).observe(root, { childList: true, subtree: true });
    injectBanner();
    // open records board by default on page load
    openCard();
})();

// BGM: autoplay on load; fall back to first user gesture if browser blocks autoplay
(function () {
    var bgm = document.getElementById("guandan-bgm");
    if (!bgm) return;
    bgm.volume = 0.45;
    function tryPlay() { bgm.play().catch(function () {}); }
    tryPlay();
    function onGesture() {
        tryPlay();
        document.removeEventListener("click", onGesture, true);
        document.removeEventListener("keydown", onGesture, true);
    }
    document.addEventListener("click", onGesture, true);
    document.addEventListener("keydown", onGesture, true);
})();
</script>
