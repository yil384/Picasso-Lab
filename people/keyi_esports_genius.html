<style>
.eg-wrap {
  display: inline-block;
  cursor: pointer;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
}

.eg-wrap *,
.eg-wrap *::before,
.eg-wrap *::after {
  box-sizing: border-box;
}

.eg-stage {
  position: relative;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  overflow: visible;
}

.eg-avatar-frame {
  position: relative;
  z-index: 3;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  border: 0;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: none;
  transition: transform 0.32s cubic-bezier(0.34,1.3,0.64,1);
}

.eg-avatar {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  transition: filter 0.32s ease;
}

.eg-wrap:hover .eg-avatar-frame {
  transform: scale(1.08);
}

.eg-wrap:hover .eg-avatar {
  filter: brightness(1.1) saturate(1.06);
}

.eg-board,
.eg-trophy,
.eg-controller,
.eg-cash,
.eg-win-flash,
.eg-coin-layer {
  position: absolute;
  pointer-events: none;
}

.eg-board {
  right: -22px;
  top: 3px;
  z-index: 5;
  width: 95px;
  height: 49px;
  opacity: 0;
  transform: rotate(8deg) translate(18px, -9px) scale(0.72);
  filter: drop-shadow(4px 5px 0 rgba(15,23,42,0.26));
}

.eg-trophy {
  right: -15px;
  bottom: -4px;
  z-index: 5;
  width: 70px;
  height: 82px;
  opacity: 0;
  transform: rotate(8deg) translate(15px, 16px) scale(0.72);
  filter: drop-shadow(4px 5px 0 rgba(15,23,42,0.25));
}

.eg-controller {
  left: -16px;
  bottom: 27px;
  z-index: 5;
  width: 81px;
  height: 48px;
  opacity: 0;
  transform: rotate(-10deg) translate(-17px, 12px) scale(0.72);
  filter: drop-shadow(4px 5px 0 rgba(15,23,42,0.22));
}

.eg-cash {
  left: 4px;
  top: 8px;
  z-index: 4;
  width: 62px;
  height: 47px;
  opacity: 0;
  transform: rotate(-12deg) translate(-13px, -12px) scale(0.74);
  filter: drop-shadow(3px 4px 0 rgba(20,83,45,0.2));
}

.eg-win-flash {
  left: 58px;
  top: 121px;
  z-index: 6;
  width: 91px;
  height: 20px;
  border: 2px solid #0f172a;
  border-radius: 4px;
  color: #07111f;
  background: linear-gradient(90deg, #67e8f9, #facc15 55%, #fb7185);
  box-shadow: 3px 4px 0 rgba(15,23,42,0.24);
  opacity: 0;
  transform: skewX(-10deg) translateY(8px) scale(0.78);
}

.eg-win-flash span {
  display: block;
  font: 900 12px/17px "Arial Black", Impact, Arial, sans-serif;
  text-align: center;
  letter-spacing: 0.06em;
}

.eg-coin-layer {
  inset: 0;
  z-index: 6;
  overflow: visible;
}

.eg-coin {
  position: absolute;
  left: 151px;
  top: 152px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid #7c2d12;
  background: radial-gradient(circle at 35% 30%, #fff7b8, #facc15 48%, #d97706 100%);
  box-shadow: 0 2px 0 #92400e, 0 0 8px rgba(250,204,21,0.65);
  animation: eg-coin-fly 0.9s ease-out forwards;
}

.eg-wrap.eg-on .eg-board {
  animation: eg-board-in 0.52s 0.08s cubic-bezier(0.18,1.35,0.28,1) forwards;
}

.eg-wrap.eg-on .eg-trophy {
  animation: eg-trophy-in 0.58s 0.22s cubic-bezier(0.18,1.35,0.28,1) forwards,
             eg-trophy-float 1.8s 0.9s ease-in-out infinite alternate;
}

.eg-wrap.eg-on .eg-controller {
  animation: eg-controller-in 0.5s 0.16s cubic-bezier(0.18,1.35,0.28,1) forwards;
}

.eg-wrap.eg-on .eg-cash {
  animation: eg-cash-in 0.5s 0.3s cubic-bezier(0.18,1.35,0.28,1) forwards;
}

.eg-wrap.eg-on .eg-win-flash {
  animation: eg-victory-in 0.36s 0.42s cubic-bezier(0.18,1.35,0.28,1) forwards,
             eg-victory-blink 1.1s 0.85s steps(2, end) infinite;
}

@keyframes eg-board-in {
  to { opacity: 1; transform: rotate(8deg) translate(0, 0) scale(1); }
}

@keyframes eg-trophy-in {
  to { opacity: 1; transform: rotate(5deg) translate(0, 0) scale(1); }
}

@keyframes eg-trophy-float {
  from { transform: rotate(5deg) translateY(0) scale(1); }
  to { transform: rotate(2deg) translateY(-5px) scale(1); }
}

@keyframes eg-controller-in {
  to { opacity: 1; transform: rotate(-10deg) translate(0, 0) scale(1); }
}

@keyframes eg-cash-in {
  to { opacity: 1; transform: rotate(-12deg) translate(0, 0) scale(1); }
}

@keyframes eg-victory-in {
  to { opacity: 1; transform: skewX(-10deg) translateY(0) scale(1); }
}

@keyframes eg-victory-blink {
  50% { filter: brightness(1.25); }
}

@keyframes eg-coin-fly {
  0% { opacity: 1; transform: translate(-50%, -50%) rotate(0deg) scale(0.62); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scale(1); }
}
</style>

<script>
(function () {
  document.querySelectorAll('.eg-wrap').forEach((wrap) => {
    if (wrap.dataset.egReady === '1') return;
    wrap.dataset.egReady = '1';
    const layer = wrap.querySelector('.eg-coin-layer');

    wrap.addEventListener('click', () => {
      const on = wrap.classList.toggle('eg-on');
      if (on) burstCoins(layer);
      else if (layer) layer.innerHTML = '';
    });
  });

  function burstCoins(layer) {
    if (!layer) return;
    layer.innerHTML = '';
    for (let i = 0; i < 20; i++) {
      const coin = document.createElement('span');
      const angle = (-165 + Math.random() * 250) * Math.PI / 180;
      const dist = 34 + Math.random() * 78;
      coin.className = 'eg-coin';
      coin.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      coin.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      coin.style.setProperty('--rot', `${220 + Math.random() * 360}deg`);
      coin.style.animationDelay = `${Math.random() * 0.15}s`;
      layer.appendChild(coin);
    }
    setTimeout(() => { layer.innerHTML = ''; }, 1100);
  }
})();
</script>
