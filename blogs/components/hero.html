<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #00629B 0%, #004a76 60%, #003355 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    body::before {
      content: '';
      position: absolute;
      top: -40%; right: -10%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,205,0,.15), transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -30%; left: 10%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
      border-radius: 50%;
    }
    .inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 32px;
      position: relative;
      z-index: 1;
    }
    .label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #FFCD00;
      margin-bottom: 10px;
    }
    .label svg {
      width: 14px; height: 14px;
      stroke: #FFCD00; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.03em;
      margin-bottom: 6px;
    }
    p {
      font-size: .92rem;
      color: rgba(255,255,255,.7);
      max-width: 500px;
    }
  </style>
</head>
<body>
  <div class="inner">
    <div class="label">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
      Picasso Lab Research
    </div>
    <h1>Research Blog</h1>
    <p>Insights, tutorials, and deep dives from our work on compilers, ML systems, and quantum computing.</p>
  </div>
</body>
</html>
