<style>

.baseball-stage {

}

.baseball-avatar-frame {

.baseball-panel-flash,
.baseball-bat,
.baseball-ball,
.baseball-trail,
.baseball-swing-arc,
.baseball-focus-lines,
.baseball-comic-speed,

.baseball-ball {

.baseball-ball::after {

.baseball-trail {

<script>
(function () {
  document.querySelectorAll('.baseball-wrap').forEach((wrap) => {
    if (wrap.dataset.baseballReady === '1') return;
    wrap.dataset.baseballReady = '1';

    wrap.addEventListener('click', () => {
      wrap.classList.toggle('baseball-on');
    });
  });
})();
</script>
