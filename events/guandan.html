<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Picasso Lab Guandan Arena</title>
<style>
    :root {
        --felt: #0c5b47;
        --felt-dark: #06372d;
        --felt-light: #178263;
        --ink: #16201d;
        --paper: #fffdf6;
        --line: rgba(255,255,255,0.22);
        --gold: #f1c76a;
        --red: #d53440;
        --blue: #7fd3ff;
        --shadow: 0 18px 60px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #061a18; color: #f9f6ea; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; overflow-x: hidden; }
    body {
        overflow-x: hidden;
        background:
            radial-gradient(circle at 18% 12%, rgba(242,196,97,0.24), transparent 28%),
            radial-gradient(circle at 84% 18%, rgba(79,189,255,0.16), transparent 26%),
            radial-gradient(circle at 50% 100%, rgba(18,128,94,0.5), transparent 45%),
            linear-gradient(145deg, #061a18, #0a3029 48%, #061815);
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .app-shell { min-height: 100vh; padding: 18px clamp(12px, 3vw, 32px) 28px; }
    .topbar {
        display: flex; align-items: center; justify-content: space-between; gap: 14px;
        max-width: 1380px; margin: 0 auto 16px; padding: 10px 12px;
        border: 1px solid rgba(255,255,255,0.16); border-radius: 18px;
        background: rgba(7,24,22,0.58); backdrop-filter: blur(18px);
        box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
        width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center;
        background: radial-gradient(circle at 34% 28%, #fff6be, #f0b23f 44%, #8d3b25);
        color: #241307; font-weight: 900; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .brand h1 { margin: 0; font-size: clamp(18px, 3vw, 25px); letter-spacing: 0; }
    .brand p { margin: 3px 0 0; color: rgba(255,255,255,0.66); font-size: 12px; }
    .top-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .top-actions .btn { min-width: 0; }
    .btn {
        border: 0; border-radius: 12px; padding: 10px 14px; color: #13211c; background: #fff6d6;
        font-weight: 750; box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 22px rgba(0,0,0,0.18);
    }
    .btn.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.22); box-shadow: none; }
    .btn.danger { background: rgba(213,52,64,0.16); color: #ffd9dc; border: 1px solid rgba(213,52,64,0.36); box-shadow: none; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .lobby, .table-wrap {
        max-width: 1380px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.16); border-radius: 24px;
        background: rgba(255,255,255,0.08); box-shadow: var(--shadow); backdrop-filter: blur(20px);
        overflow: hidden;
    }
    .lobby { display: grid; grid-template-columns: minmax(260px, 0.9fr) minmax(320px, 1.2fr); }
    .lobby-hero { padding: clamp(22px, 5vw, 46px); background: linear-gradient(145deg, rgba(255,246,214,0.16), rgba(255,255,255,0.05)); }
    .lobby-hero h2 { margin: 0 0 12px; font-size: clamp(34px, 7vw, 72px); line-height: 0.95; letter-spacing: 0; }
    .lobby-hero p { margin: 0; max-width: 560px; color: rgba(255,255,255,0.72); line-height: 1.65; }
    .rule-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
    .rule-chips span { flex: 0 0 auto; max-width: 100%; padding: 7px 10px; border-radius: 999px; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.13); color: #ffe9a9; font-size: 12px; }
    .lobby-panel { padding: clamp(18px, 4vw, 34px); background: rgba(5,21,20,0.62); }
    .field-grid { display: grid; gap: 12px; margin-bottom: 18px; }
    label { display: grid; gap: 7px; color: rgba(255,255,255,0.72); font-size: 12px; font-weight: 700; letter-spacing: 0; }
    input {
        min-height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18); padding: 0 13px;
        background: rgba(255,255,255,0.09); color: #fff; outline: none;
    }
    input:focus { border-color: rgba(241,199,106,0.72); box-shadow: 0 0 0 3px rgba(241,199,106,0.16); }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .status-line { min-height: 20px; color: #ffd9a1; font-size: 12px; margin-top: 10px; }
    .seats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
    .seat-card {
        min-height: 116px; padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.08); display: grid; gap: 8px; align-content: space-between;
    }
    .seat-card.mine { border-color: rgba(241,199,106,0.8); box-shadow: 0 0 0 3px rgba(241,199,106,0.12); }
    .seat-card .seat-name { font-weight: 850; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .seat-card .seat-meta { color: rgba(255,255,255,0.58); font-size: 12px; }
    .seat-card .seat-team { color: #ffe39c; font-size: 12px; font-weight: 800; }
    .level-setup { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .level-setup label {
        padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
    }
    .level-setup select {
        width: 100%; min-height: 38px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.18);
        padding: 0 10px; background: rgba(5,18,18,0.9); color: #fff; outline: none; font-weight: 850;
    }

    .table-wrap { min-height: calc(100vh - 112px); position: relative; }
    .table {
        min-height: calc(100vh - 112px); position: relative; padding: 18px; overflow: hidden;
        background:
            radial-gradient(ellipse at center, rgba(26,144,108,0.78), rgba(4,56,45,0.88) 62%, rgba(2,23,21,0.96)),
            repeating-radial-gradient(circle at center, rgba(255,255,255,0.028) 0 2px, transparent 2px 11px);
    }
    .table::before {
        content: ""; position: absolute; inset: 50px; border-radius: 42%; border: 1px solid rgba(255,255,255,0.13);
        box-shadow: 0 0 0 14px rgba(255,255,255,0.025), inset 0 0 90px rgba(0,0,0,0.2);
        pointer-events: none;
    }
    .score-strip {
        position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 8px; z-index: 4; flex-wrap: wrap; justify-content: center;
    }
    .score-pill {
        padding: 7px 10px; border-radius: 999px; background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.82); font-size: 12px; font-weight: 800;
    }
    .score-pill strong { color: #ffe39c; }

    .player {
        position: absolute; z-index: 5; display: grid; gap: 8px; min-width: 150px;
        border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.25); border-radius: 16px; padding: 10px;
        box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }
    .player.turn { border-color: rgba(241,199,106,0.92); box-shadow: 0 0 0 4px rgba(241,199,106,0.16), 0 10px 28px rgba(0,0,0,0.18); }
    .player.finished { opacity: 0.75; }
    .player.p0 { left: 50%; bottom: 178px; transform: translateX(-50%); }
    .player.p1 { left: 18px; top: 50%; transform: translateY(-50%); }
    .player.p2 { left: 50%; top: 58px; transform: translateX(-50%); }
    .player.p3 { right: 18px; top: 50%; transform: translateY(-50%); }
    .player-name { display: flex; justify-content: space-between; gap: 8px; align-items: center; font-weight: 850; }
    .player-badge { color: #ffe39c; font-size: 12px; }
    .player-small { color: rgba(255,255,255,0.62); font-size: 12px; }
    .back-stack { display: flex; align-items: center; gap: 4px; }
    .mini-back { width: 21px; height: 29px; border-radius: 4px; background: linear-gradient(150deg, #241b3a, #0c0a18); border: 1px solid rgba(255,211,94,0.5); box-shadow: inset 0 0 0 1px rgba(255,211,94,0.12), -3px 2px 4px rgba(0,0,0,0.18); display: grid; place-items: center; }
    .mini-back::after { content: "P"; font-size: 8px; font-weight: 900; color: #ffd96a; width: 13px; height: 13px; border-radius: 3px; display: grid; place-items: center; border: 1px solid rgba(255,211,94,0.55); background: rgba(255,211,94,0.08); }

    .center-zone {
        position: absolute; inset: 148px 190px 218px; z-index: 4;
        display: grid; grid-template-rows: auto 1fr auto; place-items: center; text-align: center; pointer-events: none;
    }
    .last-play { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; min-height: 88px; align-items: center; }
    .combo-label { color: rgba(255,255,255,0.72); font-size: 13px; min-height: 18px; }
    .round-message {
        align-self: end; max-width: 740px; padding: 12px 14px; border-radius: 16px; background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.14); color: #ffe6aa; line-height: 1.45;
    }
    .history {
        position: absolute; right: 16px; bottom: 188px; width: 250px; max-height: 210px; overflow: auto; z-index: 6;
        background: rgba(0,0,0,0.23); border: 1px solid rgba(255,255,255,0.13); border-radius: 14px; padding: 10px;
        font-size: 12px; color: rgba(255,255,255,0.68);
    }
    .history b { color: #fff; }
    .hand-zone {
        position: absolute; left: 0; right: 0; bottom: 0; z-index: 10; padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
        background: linear-gradient(to top, rgba(2,16,15,0.96), rgba(2,16,15,0.72) 68%, transparent);
    }
    .hand-tools { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .hand { display: flex; justify-content: center; align-items: flex-end; gap: 0; min-height: 116px; padding: 0 8px; }
    .card {
        width: 58px; height: 82px; border-radius: 8px; border: 1px solid #d9d1bd; background: var(--paper); color: #111;
        display: grid; grid-template-rows: auto 1fr auto; padding: 5px; margin-left: -20px; user-select: none;
        box-shadow: 0 8px 18px rgba(0,0,0,0.24); transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
        position: relative; flex: 0 0 auto;
    }
    .card:first-child { margin-left: 0; }
    .card:hover { transform: translateY(-8px); z-index: 20; }
    .card.selected { transform: translateY(-22px); border-color: #f4bc4d; box-shadow: 0 0 0 3px rgba(244,188,77,0.25), 0 16px 24px rgba(0,0,0,0.34); z-index: 30; }
    .card.red { color: var(--red); }
    .card.wild { background: linear-gradient(145deg, #fffdf6, #ffefd3 55%, #ffd3dc); }
    .card .corner { font-weight: 900; font-size: 15px; line-height: 1; }
    .card .pip { display: grid; place-items: center; font-size: 25px; font-weight: 900; }
    .card .bottom { transform: rotate(180deg); }
    .card.small { width: 44px; height: 62px; border-radius: 7px; margin-left: -12px; padding: 4px; }
    .card.small .pip { font-size: 18px; }
    .card.small .corner { font-size: 12px; }
    .card.back {
        display: grid; grid-auto-rows: max-content; place-content: center; justify-items: center; gap: 2px;
        background: linear-gradient(150deg, #241b3a, #0c0a18);
        border-color: rgba(255,211,94,0.5);
        box-shadow: inset 0 0 0 2px rgba(255,211,94,0.16);
    }
    .card.back b {
        font-size: 15px; font-weight: 900; color: #ffd96a;
        width: 22px; height: 22px; border-radius: 6px;
        display: grid; place-items: center;
        border: 1.5px solid rgba(255,211,94,0.6);
        background: rgba(255,211,94,0.08);
    }
    .card.back i {
        font-style: normal; font-size: 6px; font-weight: 900;
        letter-spacing: 1px; color: rgba(255,224,150,0.82);
    }
    .card.small.back b { font-size: 11px; width: 16px; height: 16px; }
    .card.small.back i { font-size: 4.5px; }

    .phase-panel {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 30;
        width: min(720px, calc(100vw - 28px)); padding: 24px; border-radius: 22px; background: rgba(7,24,22,0.9);
        border: 1px solid rgba(255,255,255,0.18); box-shadow: var(--shadow); text-align: left;
    }
    .phase-panel h2 { margin: 0 0 12px; }
    .phase-panel p { color: rgba(255,255,255,0.72); line-height: 1.6; }
    .tribute-list { display: grid; gap: 8px; margin: 14px 0; }
    .tribute-row { padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.08); color: #ffe2a0; }
    .table-tribute {
        width: min(520px, 100%); margin: 10px auto 0; display: grid; gap: 6px;
        text-align: left; pointer-events: none;
    }
    .table-tribute .tribute-row {
        margin: 0; padding: 7px 10px; border-radius: 10px;
        background: rgba(255,233,156,0.12); border: 1px solid rgba(255,233,156,0.18);
        color: #fff1b8; font-size: 11px;
    }

    .toast {
        position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(18px);
        padding: 10px 14px; border-radius: 999px; background: rgba(10,18,16,0.92); border: 1px solid rgba(255,255,255,0.18);
        color: #fff; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .return-transition {
        position: fixed; inset: 0; z-index: 2000; overflow: hidden;
        background:
            radial-gradient(54% 46% at 50% 46%, rgba(255, 205, 80, 0.2), transparent 60%),
            radial-gradient(72% 58% at 50% 116%, rgba(46, 120, 255, 0.16), transparent 70%),
            linear-gradient(180deg, #0d0a18, #050409 72%);
        opacity: 0; visibility: hidden; pointer-events: none;
        transition: opacity 0.18s ease, visibility 0s linear 0.18s;
    }
    .return-transition.active { opacity: 1; visibility: visible; pointer-events: auto; transition-delay: 0s; }
    .return-transition::before {
        content: ""; position: absolute; inset: -14%; opacity: 0.16; pointer-events: none;
        background-image:
            linear-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
        background-size: 48px 48px; transform: rotate(-5deg) scale(1.18);
    }
    /* ===== Kaiju-defeated exit transition (redesigned, esports victory) ===== */
    .rkt-stage { position: absolute; inset: 0; display: grid; place-items: center; pointer-events: none; }
    .rkt-title {
        position: absolute; left: 50%; top: 11%; transform: translateX(-50%);
        text-align: center; font-weight: 900; font-style: italic; line-height: 1;
        white-space: nowrap;
        font-size: clamp(30px, 6.6vw, 66px); letter-spacing: 0.03em;
        background: linear-gradient(180deg, #fff7d4 0%, #ffd96a 40%, #b9831f 62%, #ffe9a8 82%, #8a6612 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; color: transparent;
        filter: drop-shadow(0 4px 14px rgba(0,0,0,0.5)) drop-shadow(0 0 24px rgba(255,190,60,0.3));
        opacity: 0; animation: rktTitleIn 0.6s cubic-bezier(0.2,0.86,0.22,1) 0.46s forwards;
    }
    .rkt-title small {
        display: block; margin-top: 10px; font-style: normal; font-weight: 800;
        font-size: 0.3em; letter-spacing: 0.46em; text-indent: 0.46em;
        color: #7fe3ff; -webkit-text-fill-color: #7fe3ff;
        filter: drop-shadow(0 0 12px rgba(70,200,255,0.5));
    }
    .rkt-ring {
        position: absolute; left: 50%; top: 50%; width: min(360px, 52vw); aspect-ratio: 1;
        transform: translate(-50%,-50%) scale(0.3); border-radius: 50%;
        border: 2px solid rgba(255,205,80,0.8); box-shadow: 0 0 40px rgba(255,205,80,0.34);
        opacity: 0; animation: rktRing 0.9s cubic-bezier(0.16,0.86,0.24,1) 0.16s forwards;
    }
    .rkt-beam {
        position: absolute; left: 50%; top: -6%; width: min(64px, 8vw); height: 64%;
        transform: translateX(-50%) scaleY(0); transform-origin: top; border-radius: 0 0 999px 999px;
        background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.95) 24%, rgba(255,205,80,0.8) 56%, rgba(70,200,255,0));
        filter: blur(1px); opacity: 0; animation: rktBeam 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards;
    }
    .rkt-boss {
        position: relative; width: clamp(150px, 30vw, 236px); z-index: 2;
        filter: drop-shadow(0 0 40px rgba(255,160,40,0.35)) drop-shadow(0 24px 38px rgba(0,0,0,0.6));
        animation: rktBossDefeat 1.18s cubic-bezier(0.2,0.7,0.3,1) forwards;
    }
    .rkt-boss-svg { width: 100%; height: auto; display: block; }
    .rkt-eyes { animation: rktEyesOut 0.4s ease 0.48s forwards; }
    .rkt-crack { opacity: 0; animation: rktCrackIn 0.18s ease 0.5s forwards; }
    .rkt-shard {
        position: absolute; left: 50%; top: 50%; width: clamp(34px,4.6vw,50px); height: clamp(48px,6.4vw,70px);
        margin: -32px 0 0 -24px; border-radius: 8px; overflow: hidden;
        background: linear-gradient(157deg, #fffdf6, #eee); border: 1px solid rgba(190,150,50,0.72);
        box-shadow: 0 8px 18px rgba(0,0,0,0.4);
        opacity: 0; animation: rktShard 0.86s cubic-bezier(0.16,0.8,0.2,1) var(--delay) forwards;
    }
    .rkt-shard-photo {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 74%; aspect-ratio: 1; border-radius: 50%;
        background-size: cover; background-position: center top; background-color: #2a3350;
        border: 1.5px solid rgba(190,150,50,0.85);
    }
    .rkt-shard-cn {
        position: absolute; top: 2px; left: 4px; z-index: 2;
        font-size: 11px; font-weight: 900; line-height: 1; color: #14110a;
        text-shadow: 0 1px 2px rgba(255,255,255,0.85);
    }
    .rkt-shard-cn small { font-size: 8px; }
    .rkt-shard.red .rkt-shard-cn { color: #c4203a; }
    .rkt-spark {
        position: absolute; left: 50%; top: 46%; width: 8px; height: 8px; border-radius: 50%;
        background: #fff3bf; box-shadow: 0 0 18px rgba(255,205,80,0.8); opacity: 0;
        animation: rktSpark 0.72s cubic-bezier(0.14,0.84,0.18,1) var(--delay) forwards;
    }
    @keyframes rktBeam {
        0% { transform: translateX(-50%) scaleY(0); opacity: 0; }
        24% { opacity: 1; }
        70% { transform: translateX(-50%) scaleY(1); opacity: 0.96; }
        100% { transform: translateX(-50%) scaleY(1); opacity: 0; }
    }
    @keyframes rktRing {
        0% { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
    }
    @keyframes rktTitleIn {
        0% { opacity: 0; transform: translateX(-50%) translateY(-14px) scale(0.92); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    @keyframes rktBossDefeat {
        0% { transform: translateY(10px) scale(0.96); opacity: 0; }
        16% { transform: translateY(0) scale(1); opacity: 1; }
        44% { transform: translateY(0) rotate(0) scale(1); opacity: 1; }
        60% { transform: translateY(6px) rotate(-5deg) scale(1.02); opacity: 1; }
        100% { transform: translateY(96px) rotate(-16deg) scale(0.58); opacity: 0; }
    }
    @keyframes rktEyesOut { to { opacity: 0; } }
    @keyframes rktCrackIn { to { opacity: 1; } }
    @keyframes rktShard {
        0% { transform: translate(0,0) rotate(0) scale(0.6); opacity: 0; }
        24% { opacity: 1; }
        100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(1); opacity: 0; }
    }
    @keyframes rktSpark {
        0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0; }
        16% { opacity: 1; }
        100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.15); opacity: 0; }
    }
    .return-defeat-stage {
        position: absolute; inset: 0; display: grid; place-items: center;
        transform: translateZ(0); pointer-events: none;
    }
    .return-defeat-stage::before {
        content: ""; position: absolute; left: 50%; top: 58%; width: min(520px, 72vw); height: 32px;
        transform: translate(-50%, -50%) scaleX(0.4); border-radius: 50%;
        background: rgba(255,255,255,0.16); filter: blur(8px); opacity: 0;
        animation: defeatTableGlow 1.1s ease-out forwards;
    }
    .return-defeat-ring {
        position: absolute; left: 50%; top: 54%; width: min(330px, 46vw); aspect-ratio: 1;
        transform: translate(-50%, -50%) scale(0.36); border-radius: 50%;
        border: 2px solid rgba(255,205,0,0.78); opacity: 0;
        box-shadow: 0 0 32px rgba(255,205,0,0.28);
        animation: defeatRing 1.04s cubic-bezier(0.16, 0.86, 0.24, 1) forwards;
    }
    .return-defeat-beam {
        position: absolute; left: 50%; top: -8%; width: min(70px, 9vw); height: 68%;
        transform: translateX(-50%) scaleY(0); transform-origin: top;
        border-radius: 0 0 999px 999px;
        background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.92) 26%, rgba(255,205,0,0.72) 58%, rgba(50,176,190,0));
        filter: blur(1px); opacity: 0;
        animation: defeatBeam 0.82s cubic-bezier(0.2, 0.8, 0.2, 1) 0.12s forwards;
    }
    .return-kaiju {
        position: relative; width: min(230px, 42vw); height: min(300px, 54vw);
        transform: translateY(22px) scale(0.96); opacity: 0;
        filter: drop-shadow(0 24px 28px rgba(0,0,0,0.45));
        animation: kaijuDefeat 1.18s cubic-bezier(0.17, 0.84, 0.22, 1) forwards;
        will-change: transform, opacity;
    }
    .return-kaiju-head {
        position: absolute; left: 50%; top: 2%; width: 54%; height: 32%;
        transform: translateX(-50%); border-radius: 45% 45% 40% 40%;
        background: linear-gradient(145deg, #253933, #101b18);
        border: 3px solid rgba(255,225,142,0.22);
    }
    .return-kaiju-head::before,
    .return-kaiju-head::after {
        content: ""; position: absolute; top: -16%; width: 24%; height: 34%;
        border-radius: 70% 70% 20% 20%; background: #16231f;
        border: 2px solid rgba(255,225,142,0.16);
    }
    .return-kaiju-head::before { left: 12%; transform: rotate(-18deg); }
    .return-kaiju-head::after { right: 12%; transform: rotate(18deg); }
    .return-kaiju-eye {
        position: absolute; top: 43%; width: 15%; height: 10%; border-radius: 999px;
        background: #ffcd00; box-shadow: 0 0 12px rgba(255,205,0,0.9);
        animation: kaijuEyeOut 0.48s ease 0.58s forwards;
    }
    .return-kaiju-eye.left { left: 27%; }
    .return-kaiju-eye.right { right: 27%; }
    .return-kaiju-body {
        position: absolute; left: 50%; top: 30%; width: 70%; height: 48%;
        transform: translateX(-50%); border-radius: 32px 32px 22px 22px;
        background: linear-gradient(155deg, #31443e, #14211d 72%);
        border: 3px solid rgba(255,225,142,0.18);
    }
    .return-kaiju-body::before {
        content: ""; position: absolute; left: 50%; top: 18%; width: 18%; height: 52%;
        transform: translateX(-50%); border-radius: 999px;
        background: linear-gradient(180deg, rgba(255,205,0,0.82), rgba(255,205,0,0));
        opacity: 0.62;
    }
    .return-kaiju-arm {
        position: absolute; top: 39%; width: 36%; height: 12%;
        border-radius: 999px; background: #17251f; border: 2px solid rgba(255,225,142,0.14);
        transform-origin: 12% 50%;
    }
    .return-kaiju-arm.left { left: 0; transform: rotate(22deg); }
    .return-kaiju-arm.right { right: 0; transform: rotate(158deg); }
    .return-kaiju-spark {
        position: absolute; left: 50%; top: 48%; width: 8px; height: 8px; border-radius: 50%;
        background: #fff5ba; opacity: 0; box-shadow: 0 0 18px rgba(255,205,0,0.72);
        animation: defeatSpark 0.72s cubic-bezier(0.14, 0.84, 0.18, 1) var(--delay) forwards;
    }
    @keyframes defeatBeam {
        0% { transform: translateX(-50%) scaleY(0); opacity: 0; }
        22% { opacity: 1; }
        72% { transform: translateX(-50%) scaleY(1); opacity: 0.96; }
        100% { transform: translateX(-50%) scaleY(1); opacity: 0; }
    }
    @keyframes defeatRing {
        0% { transform: translate(-50%, -50%) scale(0.36); opacity: 0; }
        18% { opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1.45); opacity: 0; }
    }
    @keyframes defeatTableGlow {
        0% { opacity: 0; transform: translate(-50%, -50%) scaleX(0.4); }
        34% { opacity: 1; }
        100% { opacity: 0; transform: translate(-50%, -50%) scaleX(1.08); }
    }
    @keyframes kaijuDefeat {
        0% { transform: translateY(28px) scale(0.94); opacity: 0; }
        18% { transform: translateY(0) scale(1); opacity: 1; }
        48% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
        70% { transform: translateY(18px) scale(0.86, 1.04) rotate(-7deg); opacity: 1; }
        100% { transform: translateY(72px) scale(0.52, 0.2) rotate(-15deg); opacity: 0; }
    }
    @keyframes kaijuEyeOut {
        to { opacity: 0; box-shadow: none; }
    }
    @keyframes defeatSpark {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        16% { opacity: 1; }
        100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.15); opacity: 0; }
    }

    #return-type-hint {
        position: fixed; left: 50%; bottom: 74px; z-index: 3000;
        transform: translateX(-50%) translateY(12px); opacity: 0; pointer-events: none;
        padding: 9px 14px; border-radius: 999px; white-space: nowrap;

        transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #return-type-hint.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #return-type-hint kbd {

    @media (max-width: 860px) {
        .lobby { grid-template-columns: 1fr; }

        .table-wrap, .table { min-height: calc(100vh - 96px); }

        .top-actions {

            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);

            flex: none;
            min-width: 0;

        }
        #back-events-btn { grid-column: 1 / -1; }
        .lobby { border-radius: 20px; }
        .lobby-hero, .lobby-panel { padding: 22px 20px; }
        .lobby-hero h2 { font-size: 38px; }
        .split { grid-template-columns: 1fr; }
        .seats { grid-template-columns: 1fr; }
        .score-strip { top: 10px; left: 10px; right: 10px; transform: none; }
        .score-pill { font-size: 11px; padding: 6px 8px; }
    }

    /* Professional table UI pass: casino table structure + Picasso Lab HUD. */
    :root {
        --lab-bg: #061013;
        --lab-blue: #00629B;
        --lab-cyan: #45d9ff;
        --lab-gold: #FFCD00;
        --lab-red: #C13743;
        --felt: #0f6c58;
        --felt-dark: #052c2a;
        --felt-light: #1a9273;
        --panel: rgba(5, 17, 20, 0.72);
        --panel-strong: rgba(7, 22, 28, 0.9);
        --rim: rgba(255,255,255,0.16);
        --rim-bright: rgba(255,205,0,0.4);
        --paper: #fffdf7;
        --ink: #111820;
        --shadow: 0 24px 70px rgba(0,0,0,0.38);
    }

    html, body {
        min-height: 100%;
        background: var(--lab-bg);
        color: #f7fbff;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    }
    body {
        background:
            linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px),
            linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
            radial-gradient(circle at 18% 12%, rgba(69,217,255,0.18), transparent 26%),
            radial-gradient(circle at 88% 18%, rgba(255,205,0,0.14), transparent 24%),
            radial-gradient(circle at 50% 100%, rgba(15,108,88,0.58), transparent 46%),
            linear-gradient(145deg, #061013 0%, #09242b 48%, #061414 100%);
        background-size: 38px 38px, 38px 38px, auto, auto, auto, auto;
    }
    button, input, select { font: inherit; }
    .app-shell {
        min-height: 100vh;
        padding: 14px clamp(10px, 2.5vw, 28px) 22px;
    }

    .topbar {
        max-width: 1480px;
        min-height: 70px;
        margin: 0 auto 12px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.13);
        background:
            linear-gradient(135deg, rgba(255,255,255,0.105), rgba(255,255,255,0.035)),
            rgba(3, 14, 18, 0.78);
        box-shadow: 0 18px 55px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.12);

    .brand-mark {

        border-radius: 14px;
        background:
            radial-gradient(circle at 34% 24%, rgba(255,255,255,0.96), transparent 0 13px),

        color: #061013;
        font-size: 20px;

        overflow: hidden;

    .brand-mark::after {

    .brand h1 {
        margin: 0;

        line-height: 1.08;
        letter-spacing: 0;

    .brand > div { min-width: 0; }
    .brand p {
        margin: 5px 0 0;
        max-width: min(720px, 58vw);

            linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,242,176,0.92));

    .lobby, .table-wrap {

    .lobby-hero h2 {

    .lobby-hero p {

    .lobby-preview {

        border-radius: 28px;
        border: 12px solid rgba(54,33,20,0.84);

            radial-gradient(ellipse at center, rgba(28,151,116,0.96), rgba(6,62,54,0.98) 68%, #041b1c 100%);

    .lobby-preview::before {

    /* ===== Lab signature deck — photo face cards + PICASSO back (decorative) ===== */
    .preview-card {

        --rot: 4.4deg;
        position: absolute;
        bottom: 20px;
        left: 50%;
        width: 58px;
        height: 82px;
        margin-left: calc((var(--i) - (var(--n) - 1) / 2) * var(--step) - 29px);
        transform: rotate(calc((var(--i) - (var(--n) - 1) / 2) * var(--rot)));

            margin-left: calc((var(--i) - (var(--n) - 1) / 2) * var(--step) - 23px);
        }
        .preview-card.face { padding: 3px 4px; }
        .pc-cn { font-size: 10px; }
        .pc-cn small { font-size: 7px; }
        .pc-photo { width: 27px; height: 27px; }
        .pc-name { font-size: 6px; }
        .pc-pip { font-size: 21px; }
        .preview-card.back b { width: 22px; height: 22px; font-size: 15px; }
        .preview-card.back i { font-size: 6px; }
        .preview-seat { width: 38px; height: 38px; }
        .score-strip {
            top: 8px;
            left: 8px;
            right: 8px;
            width: auto;
            transform: none;
            gap: 6px;
        }
        .score-pill {
            min-width: 0;
            flex: 1 1 calc(50% - 6px);
            padding: 7px 8px;
        }
        .table, .table-wrap { min-height: calc(100vh - 188px); }
        .table::before { inset: 122px 16px 154px; border-width: 10px; }
        .table::after { display: none; }
        .table-emblem b { font-size: 40px; }
        .player {
            min-width: 112px;
            max-width: 132px;
            padding: 6px;
        }
        .player-main { grid-template-columns: 30px minmax(0, 1fr); gap: 7px; }
        .player-avatar { width: 30px; height: 30px; font-size: 12px; }
        .player-name { font-size: 13px; }
        .player-badge { font-size: 10px; padding: 2px 6px; }
        .player-small { font-size: 10px; }
        .back-stack { display: none; }
        .player.p0 { bottom: 236px; }
        .player.p1 { left: 8px; top: 45%; }
        .player.p2 { top: 108px; }
        .player.p3 { right: 8px; top: 45%; }
        .center-zone { inset: 218px 12px 220px; }
        .center-card { width: calc(100% - 54px); min-height: 130px; padding: 10px; border-radius: 14px; }
        .last-play { min-height: 48px; }
        .round-message { padding: 9px 10px; font-size: 12px; }
        .hand-zone {
            height: 174px;
            padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
        }
        .hand-header {
            position: absolute;
            left: 8px;
            right: 8px;
            bottom: calc(98px + env(safe-area-inset-bottom));
            margin: 0;
        }
        .hand-summary { display: none; }
        .selection-meter { display: none; }
        .hand-tools { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); width: 100%; }
        .hand-tools .btn { min-width: 0; padding: 8px 6px; font-size: 12px; }
        .hand {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(4px + env(safe-area-inset-bottom));
            justify-content: flex-start;
            overflow-x: auto;
            min-height: 88px;
            padding: 10px 22px 0;
        }
        .card {
            --card-w: 46px;
            --card-h: 68px;
            --card-overlap: -17px;
            border-radius: 6px;
            padding: 4px;
            grid-template-rows: 14px 1fr 14px;
        }
        .card .corner { width: 15px; }
        .card .corner span { width: 15px; font-size: 10px; }
        .card .corner em { width: 15px; font-size: 8px; }
        .card .pip-mark { width: 11px; height: 11px; font-size: 10px; }
        .face-center { padding: 2px 3px 3px; }
        .face-badge { border-radius: 5px; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.56); }
        .face-badge strong { font-size: 14px; }
        .face-badge span { font-size: 11px; }
        .face-badge i { width: 16px; height: 7px; }
        .joker-center { padding: 2px 3px; }
        .joker-figure strong { font-size: 12px; }
        .joker-figure span { font-size: 7px; }
        .wild-chip { display: none; }
    }

    /* Definitive game-table overhaul: full-width board, fixed play lanes, SVG card faces. */
    :root {
        --arena-bg: #061115;
        --felt-core: #11735f;
        --felt-edge: #042b2e;
        --hud-bg: rgba(3, 15, 18, 0.86);
        --hud-line: rgba(205, 235, 239, 0.18);
        --hud-text: #edf8fb;
        --accent-gold: #ffca28;
        --accent-cyan: #77e8ff;
        --card-red: #c92035;
        --card-black: #111820;
        --wood-rim: #3b281d;
    }

    body {
        background:
            linear-gradient(90deg, rgba(255,255,255,0.023) 1px, transparent 1px),
            linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
            radial-gradient(circle at 15% 12%, rgba(119,232,255,0.18), transparent 28%),
            radial-gradient(circle at 88% 8%, rgba(255,202,40,0.13), transparent 24%),
            linear-gradient(135deg, #061115 0%, #0a2b32 42%, #071812 100%);
        background-size: 40px 40px, 40px 40px, auto, auto, auto;
    }

    .app-shell {
        padding: 12px clamp(12px, 2vw, 32px) 18px;
    }

    .topbar,
    .lobby,
    .table-wrap {
        width: min(1968px, 100%);
        max-width: none;
    }

    .topbar {
        min-height: 74px;
        margin-bottom: 12px;
        border-radius: 14px;
        background:
            linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.035)),
            rgba(5, 18, 23, 0.88);
    }

    .brand h1 {
        font-size: 24px;
        line-height: 1.08;
    }

    .brand p {
        max-width: 760px;
        font-size: 12px;
    }

    .ui-icon-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-width: 0;
        line-height: 1;
    }

    .ui-icon-label span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .ui-icon {
        width: 17px;
        height: 17px;
        flex: 0 0 auto;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .btn .ui-icon {
        width: 18px;
        height: 18px;
        stroke-width: 2.25;
    }

    .table-wrap {
        height: calc(100svh - 104px);
        min-height: 760px;
        margin-inline: auto;
        border-radius: 16px;
        background: #031114;
        overflow: hidden;
    }

    .table {
        height: 100%;
        min-height: inherit;
        padding: 0;
        overflow: hidden;
        background:
            radial-gradient(ellipse at center, rgba(25, 154, 119, 0.94) 0%, rgba(14, 108, 93, 0.96) 44%, rgba(4, 44, 47, 0.98) 73%),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px);
        background-size: auto, 46px 46px, 46px 46px;
    }

    .table::before {
        inset: 92px 132px 190px;
        border-radius: 50%;
        border: 24px solid rgba(59, 40, 29, 0.72);
        background: transparent;
        box-shadow:
            inset 0 0 0 1px rgba(255,255,255,0.14),
            inset 0 0 120px rgba(0,0,0,0.28),
            0 22px 80px rgba(0,0,0,0.36),
            0 0 0 1px rgba(255,255,255,0.08);
    }

    .table::after {
        inset: 124px 174px 224px;
        border-color: rgba(214, 246, 241, 0.18);
    }

    .table-grid {
        opacity: 0.11;
        background:
            radial-gradient(circle at center, transparent 0 31%, rgba(255,255,255,0.14) 31.2% 31.5%, transparent 31.7%),
            linear-gradient(90deg, rgba(255,255,255,0.09) 1px, transparent 1px),
            linear-gradient(rgba(255,255,255,0.09) 1px, transparent 1px);
        background-size: auto, 58px 58px, 58px 58px;
    }

    .table-grid::before,
    .table-grid::after {
        content: "";
        position: absolute;
        pointer-events: none;
    }

    .table-grid::before {
        left: 50%;
        top: 52%;
        width: min(900px, 58vw);
        aspect-ratio: 1.72;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background:
            radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2), transparent 0 24px),
            radial-gradient(ellipse at center, rgba(255,255,255,0.12), transparent 55%),
            radial-gradient(ellipse at center, transparent 58%, rgba(255,202,40,0.18) 58.5% 59.5%, transparent 60.5%);
        opacity: 0.72;
    }

    .table-grid::after {
        left: 50%;
        top: 86px;
        width: 220px;
        height: 34px;
        transform: translateX(-50%);
        border-radius: 999px;
        background:
            radial-gradient(circle at 18% 50%, rgba(255,202,40,0.95) 0 7px, rgba(111,68,18,0.95) 8px 12px, transparent 13px),
            radial-gradient(circle at 31% 50%, rgba(255,202,40,0.95) 0 7px, rgba(111,68,18,0.95) 8px 12px, transparent 13px),
            radial-gradient(circle at 44% 50%, rgba(119,232,255,0.95) 0 7px, rgba(17,78,100,0.95) 8px 12px, transparent 13px),
            radial-gradient(circle at 57% 50%, rgba(255,202,40,0.95) 0 7px, rgba(111,68,18,0.95) 8px 12px, transparent 13px),
            radial-gradient(circle at 70% 50%, rgba(119,232,255,0.95) 0 7px, rgba(17,78,100,0.95) 8px 12px, transparent 13px),
            radial-gradient(circle at 83% 50%, rgba(255,202,40,0.95) 0 7px, rgba(111,68,18,0.95) 8px 12px, transparent 13px);
        opacity: 0.46;
    }

    .table-emblem {
        top: 54%;
        color: rgba(255,255,255,0.105);
    }

    .table-emblem span {
        font-size: 22px;
        letter-spacing: 0;
    }

    .table-emblem b {
        font-size: 82px;
        letter-spacing: 0;
    }

    .score-strip {
        top: 8px;
        width: auto;
        max-width: calc(100% - 56px);
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: center;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
    }

    .score-strip::-webkit-scrollbar {
        display: none;
    }

    .score-pill {
        flex: 0 0 auto;
        min-width: 146px;
        height: 36px;
        padding: 5px 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        border-radius: 8px;
        background:
            linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
            var(--hud-bg);
        border: 1px solid var(--hud-line);
        color: #edf8fb;
        font-size: 12px;
        line-height: 1;
        white-space: nowrap;
    }

    .score-pill .ui-icon {
        width: 15px;
        height: 15px;
        color: var(--accent-cyan);
        filter: drop-shadow(0 0 8px rgba(119,232,255,0.28));
    }

    .score-pill span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .score-pill strong {
        margin: 0;
        min-width: 26px;
        height: 24px;
        padding: 0 8px;
        border-radius: 8px;
        background: var(--accent-gold);
        color: #061115;
        line-height: 24px;
        font-size: 14px;
        font-weight: 800;
    }

    .score-pill strong.wild-rank {
        color: var(--card-red);
    }

    .score-pill.wide {
        min-width: 164px;
    }

    .score-pill.wide strong {
        max-width: 112px;
    }

    .player {
        width: 260px;
        min-width: 0;
        gap: 8px;
        padding: 10px;
        border-radius: 8px;
        background:
            linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.035)),
            rgba(3, 15, 18, 0.84);
        border: 1px solid rgba(223, 246, 249, 0.18);
        box-shadow: 0 18px 42px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .player::before {
        content: "";
        position: absolute;
        inset: -10px;
        z-index: -1;
        border-radius: 14px;
        background:
            radial-gradient(circle at 50% 10%, rgba(119,232,255,0.24), transparent 48%),
            radial-gradient(circle at 50% 100%, rgba(255,202,40,0.16), transparent 55%);
        opacity: 0.66;
        filter: blur(10px);
    }

    .player.turn {
        border-color: rgba(255,202,40,0.84);
        box-shadow: 0 0 0 3px rgba(255,202,40,0.16), 0 20px 46px rgba(0,0,0,0.38);
    }

    .player.p0 {
        bottom: 246px;
    }

    .player.p1 {
        left: 24px;
        top: 50%;
    }

    .player.p2 {
        top: 68px;
    }

    .player.p3 {
        right: 24px;
        top: 50%;
    }

    .player-main {
        grid-template-columns: 44px minmax(0, 1fr);
    }

    .player-avatar {
        width: 44px;
        height: 44px;
        font-size: 14px;
    }

    .player-name {
        min-width: 0;
        font-size: 16px;
        line-height: 1.08;
    }

    .player-badge {
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-radius: 8px;
    }

    .player-small {
        align-items: center;
        min-width: 0;
        line-height: 1.15;
    }

    .player-small .ui-icon,
    .count-chip .ui-icon {
        width: 13px;
        height: 13px;
        color: rgba(119,232,255,0.9);
        stroke-width: 2.2;
        vertical-align: -2px;
    }
    @keyframes countAlertPulse {
        0%, 100% { color: #ff3b5c; filter: drop-shadow(0 0 4px rgba(255,59,92,0.8)); }
        50%       { color: #ff8fa3; filter: drop-shadow(0 0 8px rgba(255,59,92,0.4)); }
    }
    .count-chip.alert .ui-icon {
        animation: countAlertPulse 0.9s ease-in-out infinite;
    }

    .player-small > span:first-child {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .count-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .back-stack {
        min-height: 33px;
        overflow: hidden;
        white-space: nowrap;
    }

    .mini-back {
        width: 23px;
        height: 32px;
        border-radius: 6px;
        background: linear-gradient(150deg, #241b3a, #0c0a18);
        display: grid; place-items: center;
    }
    .mini-back::after { content: "P"; font-size: 9px; font-weight: 900; color: #ffd96a; width: 14px; height: 14px; border-radius: 3px; display: grid; place-items: center; border: 1px solid rgba(255,211,94,0.55); background: rgba(255,211,94,0.08); }

    .center-zone {
        inset: 286px 430px 430px;
        z-index: 3;
    }

    .center-card {
        width: min(560px, 100%);
        min-height: 118px;
        padding: 12px 14px;
        border-radius: 8px;
        background:
            linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
            rgba(2, 30, 27, 0.58);
        border: 1px solid rgba(226, 251, 247, 0.17);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 26px 70px rgba(0,0,0,0.24);
    }

    .center-meta {
        min-width: 0;
        font-size: 12px;
    }

    .center-meta span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .center-meta .ui-icon,
    .history-title .ui-icon {
        width: 15px;
        height: 15px;
        color: var(--accent-cyan);
        stroke-width: 2.25;
    }

    .center-meta strong {
        max-width: 420px;
    }

    .last-play {
        min-height: 28px;
        padding: 4px 0;
    }

    .round-message {
        padding: 8px 12px;
        border-radius: 8px;
        color: #fff3bd;
        font-size: 12px;
    }

    .history {
        right: 28px;
        top: 86px;
        bottom: auto;
        width: 280px;
        max-height: 188px;
        border-radius: 8px;
        z-index: 7;
    }

    .seat-play {
        position: absolute;
        z-index: 6;
        min-width: 110px;
        max-width: 280px;
        min-height: 46px;
        display: grid;
        align-items: center;
        gap: 4px;
        pointer-events: none;
        animation: none;
    }

    .seat-play.p0 {
        left: 50%;
        bottom: 314px;
        transform: translateX(-50%);
        justify-items: center;
    }

    .seat-play.p1 {
        left: 288px;
        top: 50%;
        transform: translateY(-50%);
        justify-items: start;
    }

    .seat-play.p2 {
        left: 50%;
        top: 202px;
        transform: translateX(-50%);
        justify-items: center;
    }

    .seat-play.p3 {
        right: 288px;
        top: 50%;
        transform: translateY(-50%);
        justify-items: end;
    }

    .trick-card-stack {
        position: relative;
        display: flex;
        align-items: center;
        min-height: 70px;
        padding: 8px 10px 4px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.1);
        overflow: visible;
        box-shadow: 0 12px 28px rgba(0,0,0,0.12);
    }

    .trick-card-row {
        position: relative;
        display: flex;
        align-items: center;
        min-width: 0;
    }

    .trick-card-stack .card.small {
        animation: none;
    }

    .seat-play.fresh {
        animation: playPanelIn 320ms cubic-bezier(0.16, 0.86, 0.24, 1) both;
    }

    .seat-play.fresh .trick-card-stack .card.small {
        animation: playedCardIn 420ms cubic-bezier(0.16, 0.86, 0.24, 1) both;
        animation-delay: calc(var(--i, 0) * 34ms);
    }

    .seat-play.fresh .relation-band {
        animation: relationSleeveIn 360ms cubic-bezier(0.16, 0.86, 0.24, 1) both;
        animation-delay: 160ms;
    }

    .pass-mark {
        min-width: 74px;
        padding: 9px 16px;
        border-radius: 999px;
        background: rgba(5, 15, 18, 0.76);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: rgba(237, 248, 251, 0.78);
        font-size: 15px;
        font-weight: 950;
        text-align: center;
        box-shadow: 0 14px 32px rgba(0,0,0,0.26);
        animation: passMarkIn 300ms cubic-bezier(0.2, 0.82, 0.22, 1) both;
    }

    .play-caption {
        max-width: 240px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(3, 15, 18, 0.72);
        color: rgba(237,248,251,0.76);
        font-size: 10px;
        font-weight: 850;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .relation-band {
        --sleeve-w: 36px;
        --sleeve-h: 36px;
        --band-fill-top: #ffe57b;
        --band-fill-mid: #ffcf37;
        --band-fill-bottom: #d89c14;
        position: absolute;
        right: -1px;
        top: -1px;
        z-index: 20;
        width: var(--sleeve-w);
        height: var(--sleeve-h);
        transform: none;
        transform-origin: top right;
        background: none;
        color: #061115;
        pointer-events: none;
        filter: drop-shadow(-1px 1px 2px rgba(0,0,0,0.22));
    }

    .relation-band span {
        position: absolute;
        left: 15px;
        top: 10px;
        width: 24px;
        display: block;
        transform: rotate(47deg);
        transform-origin: center;
        color: inherit;
        font-size: 7px;
        line-height: 1;
        font-weight: 950;
        letter-spacing: 0;
        text-align: center;
        white-space: nowrap;
        text-shadow: 0 1px 0 rgba(255,255,255,0.18);
    }

    .relation-band::before,
    .relation-band::after {
        content: "";
        position: absolute;
        pointer-events: none;
    }

    .relation-band::before {
        inset: 0;
        clip-path: polygon(18% 0, 56% 0, 100% 44%, 100% 82%);
        background:
            linear-gradient(132deg, rgba(255,255,255,0.48) 0 18%, transparent 29% 67%, rgba(0,0,0,0.19) 82% 100%),
            linear-gradient(45deg, var(--band-fill-top), var(--band-fill-mid) 52%, var(--band-fill-bottom));
        box-shadow:
            inset 0 1px 0 rgba(255,255,255,0.68),
            inset -1px -1px 0 rgba(0,0,0,0.2);
    }

    .relation-band::after {
        right: 0;
        top: 45%;
        width: 100%;
        height: 3px;
        transform: rotate(47deg);
        transform-origin: right center;
        background: linear-gradient(90deg, rgba(255,255,255,0.12), rgba(0,0,0,0.24));
        filter: blur(0.18px);
    }

    .relation-band.relation-opponent {
        --band-fill-top: #ff8a87;
        --band-fill-mid: #f45d62;
        --band-fill-bottom: #b93b40;
        color: #fff;
    }

    .relation-band.relation-self {
        --band-fill-top: #c4f8ff;
        --band-fill-mid: #77e8ff;
        --band-fill-bottom: #3aa7bf;
    }

    @keyframes playPanelIn {
        from { opacity: 0; filter: blur(3px); }
        to { opacity: 1; filter: blur(0); }
    }

    @keyframes playedCardIn {
        from { opacity: 0; transform: translate3d(0, -22px, 0) scale(0.92) rotate(-2deg); }
        to { opacity: 1; transform: translate3d(0, 0, 0) scale(1); }
    }

    @keyframes relationSleeveIn {
        0% {
            opacity: 0;
            transform: translate3d(6px, -6px, 0) scale(0.92);
            filter: blur(0.4px);
        }
        72% {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(1.04);
            filter: none;
        }
        100% {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(1);
            filter: none;
        }
    }

    @keyframes passMarkIn {
        from { opacity: 0; transform: scale(0.86); }
        to { opacity: 1; transform: scale(1); }
    }

    .player.thinking .mini-back {
        animation: thinkingCards 920ms ease-in-out infinite alternate;
    }

    .thinking-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        color: #fff0a9;
        font-weight: 900;

        left: 50%;

    .deal-card.target-0 { --tx: calc(var(--fan) * 8px); --ty: clamp(310px, 39vh, 430px); }
    .deal-card.target-1 { --tx: clamp(-850px, -42vw, -430px); --ty: clamp(40px, 7vh, 74px); }
    .deal-card.target-2 { --tx: calc(var(--fan) * 5px); --ty: clamp(-330px, -32vh, -245px); }
    .deal-card.target-3 { --tx: clamp(430px, 42vw, 850px); --ty: clamp(40px, 7vh, 74px); }

        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.78) rotate(0deg); }

function valuesFromFirebase(value) {
    if (Array.isArray(value)) return value.filter(v => v != null);
    if (value && typeof value === "object") {
        return Object.keys(value)
            .sort((a, b) => Number(a) - Number(b))
            .map(k => value[k])
            .filter(v => v != null);
    }
    return [];
}

function indexedFromFirebase(value, length, fallback = null) {
    return Array.from({ length }, (_, i) => value?.[i] ?? fallback);
}

function recomputeComboForEntry(entry, levelRank) {
    const cards = valuesFromFirebase(entry?.cards);
    if (!cards.length) return entry?.combo || null;
    const combos = evaluateCombos(cards, levelRank);
    if (!combos.length) return entry?.combo || null;
    if (entry?.combo?.type) {
        const sameType = combos.find(combo => {
            if (combo.type !== entry.combo.type) return false;
            if (combo.type === "bomb" && entry.combo.bombLen && combo.bombLen !== entry.combo.bombLen) return false;
            return true;
        });
        if (sameType) return sameType;
    }
    return choosePlayable(cards, null, levelRank) || combos[0];

function normalizeActionEntry(entry, levelRank = "2") {
    if (!entry || typeof entry !== "object") return entry || null;
    const cards = valuesFromFirebase(entry.cards);
    const combo = cards.length && (entry.combo || entry.actionType === "combo")
        ? recomputeComboForEntry({ ...entry, cards }, levelRank)
        : entry.combo || null;
    return { ...entry, cards, combo };
}

function normalizeGame(g) {
    if (!g) return null;
    g.seats = indexedFromFirebase(g.seats, 4, null);
    g.levels = indexedFromFirebase(g.levels, 2, "2").map(level => level || "2");
    g.aceFailures = indexedFromFirebase(g.aceFailures, 2, 0).map(n => Math.max(0, Number(n) || 0));
    if (!g.currentLevelRank) g.currentLevelRank = "2";
    g.hands = {
        0: valuesFromFirebase(g.hands?.[0]),
        1: valuesFromFirebase(g.hands?.[1]),
        2: valuesFromFirebase(g.hands?.[2]),
        3: valuesFromFirebase(g.hands?.[3])
    };
    g.finished = valuesFromFirebase(g.finished).map(Number).filter(n => Number.isInteger(n) && n >= 0 && n < 4);
    g.lastPlay = normalizeActionEntry(g.lastPlay, g.currentLevelRank);

    const idx = clientSeatIn(g, id);

function localizeStoredNames(text) {
    let out = String(text || "");
    for (let i = 0; i < teamNames.en.length; i++) {
        out = out.replaceAll(teamNames.en[i], teamNames[uiLang][i]).replaceAll(teamNames.zh[i], teamNames[uiLang][i]);
    }
    for (let i = 0; i < legacyTeamNames.length; i++) {
        out = out.replaceAll(legacyTeamNames[i], teamNames[uiLang][i % 2]);
    }
    for (let i = 0; i < botNames.en.length; i++) {
        out = out.replaceAll(botNames.en[i], botNames[uiLang][i]).replaceAll(botNames.zh[i], botNames[uiLang][i]);
    }
    for (let i = 0; i < legacyBotNames.length; i++) {
        out = out.replaceAll(legacyBotNames[i], botNames[uiLang][i % 4]);
    }
    return out;
}

function displayMessage(message) {
    const text = localizeStoredNames(message);
    if (isZH() || !text) return text;
    let m;
    if (text === "等待队友入座。") return "Waiting for players to take seats.";
    if (text === "座位已清空。") return "Seat cleared.";
    if (text === "抗贡成功，头游先出牌。") return "Tribute blocked. The first-place player leads.";
    if (text === "本轮收牌。") return "Trick collected.";
    if ((m = text.match(/^(.+) 入座。$/))) return `${displayNameText(m[1])} took a seat.`;
    if ((m = text.match(/^(.+) 加入对局。$/))) return `${displayNameText(m[1])} joined the table.`;
    if ((m = text.match(/^(.+) 从 (.+) 开始打。$/))) return `${displayNameText(m[1])} starts from ${m[2]}.`;
    if ((m = text.match(/^第 (\d+) 局开始，打 (.+)。$/))) return `Round ${m[1]} started. Level rank: ${m[2]}.`;
    if ((m = text.match(/^第 (\d+) 局 · (.+)$/))) return `Round ${m[1]} · ${m[2].split("；").map(displayMessage).join("; ")}`;
    if ((m = text.match(/^双贡：(.+) 进贡 (.+) 给 (.+)，(.+) 还贡 (.+)$/))) return `Double tribute: ${displayNameText(m[1])} tributes ${displayCardTextFromMessage(m[2])} to ${displayNameText(m[3])}; ${displayNameText(m[4])} returns ${displayCardTextFromMessage(m[5])}.`;
    if ((m = text.match(/^双贡：(.+) 进贡 (.+) 给 (.+)$/))) return `Double tribute: ${displayNameText(m[1])} tributes ${displayCardTextFromMessage(m[2])} to ${displayNameText(m[3])}.`;
    if ((m = text.match(/^(.+) 进贡 (.+) 给 (.+)，(.+) 还贡 (.+)$/))) return `${displayNameText(m[1])} tributes ${displayCardTextFromMessage(m[2])} to ${displayNameText(m[3])}; ${displayNameText(m[4])} returns ${displayCardTextFromMessage(m[5])}.`;
    if ((m = text.match(/^(.+) 进贡 (.+) 给 (.+)，还贡 (.+)$/))) return `${displayNameText(m[1])} tributes ${displayCardTextFromMessage(m[2])} to ${displayNameText(m[3])}; ${displayNameText(m[3])} returns ${displayCardTextFromMessage(m[4])}.`;
    if ((m = text.match(/^(.+) 进贡 (.+) 给 (.+)$/))) return `${displayNameText(m[1])} tributes ${displayCardTextFromMessage(m[2])} to ${displayNameText(m[3])}.`;
    if ((m = text.match(/^(.+) 出了 (.+)。$/))) return `${displayNameText(m[1])} played ${translateAction(m[2])}.`;
    if ((m = text.match(/^(.+) 收牌，继续出。$/))) return `${displayNameText(m[1])} takes the trick and leads again.`;
    if ((m = text.match(/^(.+) 接风给队友 (.+)。$/))) return `${displayNameText(m[1])} passes catch-wind to partner ${displayNameText(m[2])}.`;
    if ((m = text.match(/^(.+) 超时不要。$/))) return `${displayNameText(m[1])} timed out and passed.`;
    if ((m = text.match(/^(.+) 超时自动出 (.+)。$/))) return `${displayNameText(m[1])} timed out and auto-played ${displayCardTextFromMessage(m[2])}.`;
    if ((m = text.match(/^(.+) 不要。$/))) return `${displayNameText(m[1])} passes.`;
    if ((m = text.match(/^(.+) 冲 A 成功，赢得比赛。$/))) return `${displayNameText(m[1])} cleared A and won the match.`;
    if ((m = text.match(/^(.+) 冲 A 第 (\d+) 次失败，退回打 2。$/))) return `${displayNameText(m[1])} failed the A challenge ${m[2]} times and resets to level 2.`;
    if ((m = text.match(/^(.+) 冲 A 失败，第 (\d+)\/(\d+) 次；下局继续打 A。$/))) return `${displayNameText(m[1])} failed the A challenge (${m[2]}/${m[3]}). They keep playing A next round.`;
    if ((m = text.match(/^(.+) (.+) 完成排名，升 (\d+) 级。$/))) return `${displayNameText(m[1])} completed the round order and advanced ${m[3]} level${m[3] === "1" ? "" : "s"}.`;
    return text;
}

// Lab face cards: map every J/Q/K/A (rank+suit) to a labmate. Each player's
// signature card (from the records board) is honored first; the remaining face
// slots are filled round-robin so all labmates appear and no face card is bare.
let _facePortraitMap = null;
function facePortraitMap() {
    if (_facePortraitMap) return _facePortraitMap;
    const PL = (window.GuandanRecords && window.GuandanRecords.PLAYERS) || {};
    // All 16 PICASSO Lab members get a face card (A♠→J♣); external opponents (zihan, yilin) are excluded.
    const keys = ["yufei","yue","zhengding","chang","hezi","keyi","xiang","jixuan","zaifeng","zhongkai","zhuo","yichen","xinwei","alon","chenyang","haotian"].filter(k => PL[k] && PL[k].avatar);
    if (!keys.length) return {};            // board data not loaded yet → no portraits this pass
    const sig = {};
    keys.forEach(k => { if (PL[k].card) sig[PL[k].card] = k; });
    const FACE_RANKS = ["A", "K", "Q", "J"];
    const SUITS = ["S", "H", "C", "D"];
    const map = {};
    const leftover = [];
    FACE_RANKS.forEach(r => SUITS.forEach(s => {
        const str = r + (suitGlyph[s] || "");
        if (sig[str]) map[r + s] = sig[str];
        else leftover.push(r + s);
    }));
    let i = 0;
    leftover.forEach(slot => { map[slot] = keys[i % keys.length]; i++; });
    _facePortraitMap = map;
    return map;
}
function faceCardPortrait(card) {
    if (!card || card.joker || card.back) return null;
    if (!["A", "K", "Q", "J"].includes(card.rank)) return null;
    const PL = (window.GuandanRecords && window.GuandanRecords.PLAYERS) || {};
    const key = facePortraitMap()[card.rank + card.suit];
    const p = key && PL[key];
    if (!p || !p.avatar) return null;
    return { avatar: p.avatar, name: (p.name || "").split(" ")[0] };
}

function jokerIconHTML(card) {

}

function cardCenterHTML(card, label) {
    if (card.joker) {
        const jokerName = card.joker === "RJ" ? "大王" : "小王";

    return `<div class="pip-grid pip-count-${count}">${marks}</div>`;
}

function cardHTML(card, small = false, selectable = false, extraAttrs = "", extraClass = "", overlayHTML = "") {
    if (!card) return "";
    if (card.back) return `<div class="card back ${small ? "small" : ""} ${extraClass}" ${extraAttrs} aria-hidden="true"><b>P</b><i>PICASSO</i><i>LAB</i></div>`;
    const red = cardColor(card);

    const sel = selectable && selected.has(card.id) ? "selected" : "";
    const color = red ? "red" : "black";
    const jokerClass = card.joker ? `joker-card ${card.joker === "RJ" ? "red-joker" : "black-joker"}` : "";
    const label = card.joker ? "JOKER" : rankLabel(card.rank);
    const subLabel = card.joker ? (card.joker === "RJ" ? "大王" : "小王") : suitIconHTML(card.suit, "corner-suit");
    const cornerClass = card.joker ? "corner joker-corner" : "corner";
    const title = isWild(card, game?.currentLevelRank) ? L("Wild Card (逢人配)", "逢人配") : cardText(card);
    const data = selectable ? `data-card-id="${encodeHTML(card.id)}"` : "";
    const attrs = [data, extraAttrs].filter(Boolean).join(" ");
    const artPath = cardAssetPath(card);
    const portrait = faceCardPortrait(card);
    const portraitHTML = portrait
        ? `<div class="card-portrait"><img src="${encodeHTML(portrait.avatar)}" alt="" aria-hidden="true" loading="eager" decoding="async" onerror="this.closest('.card')?.classList.remove('has-portrait');this.parentElement?.remove()"><span class="card-portrait-name">${encodeHTML(portrait.name)}</span></div>`
        : "";
    return `<div class="card has-art ${portrait ? "has-portrait" : ""} ${small ? "small" : ""} ${color} ${jokerClass} ${wild} ${sel} ${extraClass}" ${attrs} title="${encodeHTML(title)}" aria-label="${encodeHTML(title)}">
        <img class="card-art" src="${encodeHTML(artPath)}" alt="" aria-hidden="true" loading="eager" decoding="async" onerror="this.closest('.card')?.classList.add('art-failed');this.remove()">
        ${portraitHTML}
        <div class="${cornerClass}"><span class="rank-label">${label}</span><em>${subLabel}</em></div>
        ${cardCenterHTML(card, label)}
        <div class="${cornerClass} bottom"><span class="rank-label">${label}</span><em>${subLabel}</em></div>
        ${wild ? `<div class="wild-chip">${L("WILD", "逢人配")}</div>` : ""}
        ${overlayHTML}
    </div>`;
}

function initials(name, fallback = "P") {
    const clean = String(name || "").trim();
    if (!clean) return fallback;
    const parts = clean.split(/\s+/).filter(Boolean);
    if (parts.length > 1) return parts.slice(0, 2).map(p => p[0]).join("").toUpperCase();
    return clean.slice(0, 2).toUpperCase();
}

function rankBase(rank) {
    return ranks.indexOf(rank) + 2;
}

function rankPower(rank, levelRank) {
    if (rank === levelRank) return 16;
    return rankBase(rank);
}

function jokerPower(card) {
    if (card.joker === "RJ") return 18;
    if (card.joker === "BJ") return 17;
    return 0;
}

function sortCards(cards, levelRank) {
    return [...cards].sort((a, b) => {
        const pa = a.joker ? jokerPower(a) : rankPower(a.rank, levelRank);
        const pb = b.joker ? jokerPower(b) : rankPower(b.rank, levelRank);
        if (pa !== pb) return pb - pa;
        const sa = suits.indexOf(a.suit || "S");
        const sb = suits.indexOf(b.suit || "S");
        return sa - sb || a.id.localeCompare(b.id);
    });
}

function sortHandForDisplay(cards, levelRank) {
    return [...cards].sort((a, b) => {
        const pa = a.joker ? jokerPower(a) : rankPower(a.rank, levelRank);
        const pb = b.joker ? jokerPower(b) : rankPower(b.rank, levelRank);
        if (pa !== pb) return pa - pb;
        const sa = suits.indexOf(a.suit || "S");
        const sb = suits.indexOf(b.suit || "S");
        return sa - sb || a.id.localeCompare(b.id);
    });
}

function handOrderKey(seat, g = game) {
    return `${roomCode || g?.roomCode || ""}:${g?.roundNo || 0}:${g?.dealStartedAt || 0}:${seat}`;
}

function orderedHandForDisplay(cards, levelRank, seat) {
    const sorted = sortHandForDisplay(cards, levelRank);
    const key = handOrderKey(seat);
    const sortedIds = sorted.map(c => c.id);
    if (handOrderState.key !== key) {
        handOrderState = { key, ids: sortedIds };
        return sorted;
    }
    const liveIds = new Set(sortedIds);
    const nextIds = handOrderState.ids.filter(id => liveIds.has(id));
    const seen = new Set(nextIds);
    for (const card of sorted) {
        if (!seen.has(card.id)) nextIds.push(card.id);
    }
    handOrderState.ids = nextIds;
    const byId = new Map(cards.map(c => [c.id, c]));
    return nextIds.map(id => byId.get(id)).filter(Boolean);
}

function moveHandCard(dragId, targetId, before) {
    if (!dragId || !targetId || dragId === targetId) return false;
    const seat = mySeat();
    if (seat < 0) return false;
    orderedHandForDisplay(game.hands[seat] || [], game.currentLevelRank, seat);
    const ids = handOrderState.ids.filter(id => id !== dragId);
    const targetIndex = ids.indexOf(targetId);
    if (targetIndex < 0) return false;
    ids.splice(targetIndex + (before ? 0 : 1), 0, dragId);
    handOrderState.ids = ids;
    suppressNextCardClick = true;
    renderTable();
    return true;
}

function makeDeck() {
    const deck = [];
    for (let copy = 0; copy < 2; copy++) {
        for (const suit of suits) {
            for (const rank of ranks) deck.push({ id: `${copy}${suit}${rank}`, suit, rank });
        }
        deck.push({ id: `${copy}BJ`, joker: "BJ" });
        deck.push({ id: `${copy}RJ`, joker: "RJ" });
    }
    return shuffle(deck);
}

function shuffle(arr) {
    const a = [...arr];
    const randomIndex = (maxExclusive) => {
        if (globalThis.crypto?.getRandomValues && maxExclusive > 0) {
            const limit = Math.floor(0x100000000 / maxExclusive) * maxExclusive;
            const buf = new Uint32Array(1);
            do globalThis.crypto.getRandomValues(buf);
            while (buf[0] >= limit);
            return buf[0] % maxExclusive;
        }
        return Math.floor(Math.random() * maxExclusive);
    };
    for (let i = a.length - 1; i > 0; i--) {
        const j = randomIndex(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function activeSeatIds(g = game) {
    if (!g) return [];
    normalizeGame(g);
    const done = finishedList(g);
    return [0,1,2,3].filter(i => g.seats[i] && !done.includes(i));
}

function requiredPassesForTrick(g = game) {
    if (!g?.lastPlay) return 0;
    const done = finishedList(g);
    return [0,1,2,3].filter(i => i !== g.lastPlay.player && g.seats[i] && !done.includes(i)).length;
}

function setCurrentTurn(g, seat) {
    g.currentTurn = seat;
    g.turnStartedAt = Date.now();
}

function nextSeat(from, g = game) {
    const active = activeSeatIds(g);
    if (!active.length) return null;
    for (let step = 1; step <= 4; step++) {
        const n = (from - step + 4) % 4;
        if (active.includes(n)) return n;
    }
    return active[0];
}

function partnerOf(i) {
    return (i + 2) % 4;
}

function addHistory(g, entry) {
    g.history = [...valuesFromFirebase(g.history), entry].slice(-16);
}

function finishIfPartnershipDone(g, lastSeat = null) {
    const order = finishedList(g);
    if (order.length < 2) return false;
    const first = order[0];
    const partner = partnerOf(first);
    if (!order.includes(partner)) return false;
    const remaining = [0,1,2,3].filter(i => !order.includes(i));
    if (lastSeat != null) {
        const orderedRemaining = [];
        let cursor = lastSeat;
        while (orderedRemaining.length < remaining.length) {
            cursor = nextSeat(cursor, { ...g, finished: [...order, ...orderedRemaining] });
            if (cursor == null || orderedRemaining.includes(cursor)) break;
            if (remaining.includes(cursor)) orderedRemaining.push(cursor);
        }
        for (const i of remaining) if (!orderedRemaining.includes(i)) orderedRemaining.push(i);
        g.finished.push(...orderedRemaining);
    } else {
        g.finished.push(...remaining);
    }
    finishRound(g);
    return true;
}

function cardsByIdFromHand(g, seat, ids) {
    const wanted = new Set(ids);
    if (wanted.size !== ids.length) return null;
    const cards = (g.hands[seat] || []).filter(c => wanted.has(c.id));
    return cards.length === wanted.size ? cards : null;
}

function canSeatAct(g, seat) {
    return g.phase === "playing" && !dealWindowOpen(g) && g.currentTurn === seat && !!g.seats[seat] && !finishedList(g).includes(seat);
}

async function withAction(fn) {
    if (actionBusy) return false;
    actionBusy = true;
    root.classList.add("action-busy");
    try {
        return await fn();
    } finally {
        actionBusy = false;
        root.classList.remove("action-busy");
        render();
    }
}

function commitAction(fn, options = {}) {
    return options.silent ? mutateGame(fn) : withAction(() => mutateGame(fn));
}

function createRoomCode() {
    const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "";
    for (let i = 0; i < 5; i++) code += alphabet[Math.floor(Math.random() * alphabet.length)];
    return code;
}

function defaultGame(code, hostName) {
    const seats = [null, null, null, null];
    seats[0] = { clientId, name: hostName || "Host", type: "human", team: 0, ready: true, host: true };
    return {
        roomCode: code,
        createdAt: Date.now(),
        updatedAt: Date.now(),
        revision: 0,
        phase: "lobby",
        seats,
        levels: ["2", "2"],
        aceFailures: [0, 0],
        currentLevelRank: "2",
        roundNo: 0,
        leaderTeam: 0,
        hands: { 0: [], 1: [], 2: [], 3: [] },
        currentTurn: 0,
        turnStartedAt: Date.now(),
        roundStartedAt: 0,
        dealStartedAt: 0,
        lastPlay: null,
        passCount: 0,
        finished: [],
        history: [],
        trickPlays: [null, null, null, null],
        selectedTributes: [],
        message: "等待队友入座。"
    };
}

async function createRoom() {
    const name = (document.getElementById("nick-input")?.value.trim() || nickname || "Lab Player").slice(0, 24);
    nickname = name;
    localStorage.setItem("picasso.guandan.name", name);
    const code = createRoomCode();
    const g = defaultGame(code, name);
    await set(roomRef(code), g);
    history.replaceState(null, "", `?room=${code}`);
    attachRoom(code);
    showToast(L("Room created", "房间已创建"));
}

async function joinRoom() {
    const code = (document.getElementById("room-input")?.value || roomCode).trim().toUpperCase();
    const name = (document.getElementById("nick-input")?.value.trim() || nickname || "Lab Player").slice(0, 24);
    if (!code) return showToast(L("Enter a room code", "请输入房间码"));
    nickname = name;
    localStorage.setItem("picasso.guandan.name", name);
    const snap = await get(roomRef(code));
    if (!snap.exists()) {
        statusText = L("Room not found. You can create a new one.", "没找到这个房间，可以新建一个。");
        render();
        return;
    }
    roomCode = code;
    history.replaceState(null, "", `?room=${code}`);
    attachRoom(code);
}

function attachRoom(code) {
    roomCode = code;
    if (unsubscribe) unsubscribe();
    unsubscribe = onValue(roomRef(code), (snap) => {
        game = normalizeGame(snap.val());
        selected.clear();
        hintAdvisor = null;
        syncDealAnimation();
        render();
        maybeRunAI();
        scheduleTurnClock();
    });
}

async function mutateGame(fn) {
    if (!roomCode) return null;
    try {
        const result = await runTransaction(roomRef(), current => {
            if (!current) return undefined;
            const next = normalizeGame(JSON.parse(JSON.stringify(current)));
            const outcome = fn(next);
            if (outcome === false) return undefined;
            next.updatedAt = Date.now();
            next.revision = (Number(next.revision) || 0) + 1;
            return next;
        }, { applyLocally: false });
        return result.committed ? normalizeGame(result.snapshot.val()) : null;
    } catch (err) {
        console.error(err);
        showToast(L("Sync failed. Please retry.", "同步失败，请重试。"));
        return null;
    }
}

function mySeat(g = game) {
    if (!g) return -1;
    return clientSeatIn(g);
}

function isHost(g = game) {
    if (!g) return false;
    return clientIsHost(g);
}

function clearDealTimers() {
    dealAnimation.timers.forEach(t => clearTimeout(t));
    dealAnimation.timers = [];
}

function dealKey(g = game) {
    if (!g || g.phase !== "playing" || !Number.isFinite(g.dealStartedAt) || !g.dealStartedAt) return "";
    return `${g.roomCode || roomCode}:${g.roundNo || 0}:${g.dealStartedAt}`;
}

function setDealPhase(phase) {
    if (dealAnimation.phase === phase) return;
    dealAnimation.phase = phase;
    render();
}

function finishDealAnimation(key = dealAnimation.key) {
    clearDealTimers();
    if (key) dealAnimation.completed.add(key);
    if (dealAnimation.key === key) dealAnimation.phase = "done";
    render();
    maybeRunAI();
    scheduleTurnClock();
}

function syncDealAnimation(g = game) {
    const key = dealKey(g);
    if (!key || dealAnimation.completed.has(key)) {
        if (!key) {
            clearDealTimers();
            dealAnimation.key = "";
            dealAnimation.phase = "done";
        }
        return;
    }
    const elapsed = Math.max(0, Date.now() - Number(g.dealStartedAt || 0));
    const total = DEALING_MS + SORTING_MS;
    if (elapsed >= total) {
        finishDealAnimation(key);
        return;
    }
    if (dealAnimation.key !== key) {
        clearDealTimers();
        dealAnimation.key = key;
    } else {
        clearDealTimers();
    }
    dealAnimation.phase = elapsed < DEALING_MS ? "dealing" : "sorting";
    if (elapsed < DEALING_MS) {
        dealAnimation.timers.push(setTimeout(() => setDealPhase("sorting"), DEALING_MS - elapsed));
    }
    dealAnimation.timers.push(setTimeout(() => finishDealAnimation(key), total - elapsed));
}

function currentDealPhase(g = game) {
    const key = dealKey(g);
    if (!key || dealAnimation.completed.has(key) || dealAnimation.key !== key) return "done";
    return dealAnimation.phase;
}

function dealBusy(g = game) {
    const phase = currentDealPhase(g);
    return phase === "dealing" || phase === "sorting";
}

function dealWindowOpen(g = game) {
    return !!g && g.phase === "playing" && Number(g.dealStartedAt) > 0 && Date.now() < Number(g.dealStartedAt) + DEALING_MS + SORTING_MS;
}

function clearTurnTimers() {
    clearTimeout(turnDeadlineTimer);
    clearTimeout(turnRenderTimer);
    turnDeadlineTimer = null;
    turnRenderTimer = null;
}

function isOpeningLead(g = game) {
    return !!g && g.phase === "playing" && !g.lastPlay && valuesFromFirebase(g.history).length === 0;
}

function turnLimitApplies(g = game) {
    if (!g || g.phase !== "playing" || dealWindowOpen(g)) return false;
    if (isOpeningLead(g)) return false;
    if (!g.seats?.[g.currentTurn] || finishedList(g).includes(g.currentTurn)) return false;
    return true;
}

function turnRemainingMs(g = game) {
    if (!turnLimitApplies(g)) return null;
    const started = Number(g.turnStartedAt) || Date.now();
    return Math.max(0, TURN_LIMIT_MS - (Date.now() - started));
}

function formatClock(ms) {
    const safe = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(safe / 60);
    const s = String(safe % 60).padStart(2, "0");
    return `${m}:${s}`;
}

function scheduleTurnClock() {
    clearTurnTimers();
    if (!game || !turnLimitApplies(game)) return;
    const remaining = turnRemainingMs(game);
    if (remaining == null) return;
    if (remaining <= 0) {
        handleTurnTimeout();
        return;
    }
    turnDeadlineTimer = setTimeout(handleTurnTimeout, remaining + 80);
    updateTurnClockDOM();
    turnRenderTimer = setTimeout(scheduleTurnClock, Math.min(1000, remaining + 80));
}

function updateTurnClockDOM() {
    const el = document.getElementById("turn-clock");
    if (!el || !game) return;
    const remaining = turnRemainingMs(game);
    el.textContent = remaining == null ? (isOpeningLead(game) ? L("No limit", "不限时") : "--") : formatClock(remaining);
    el.classList.toggle("warn", remaining != null && remaining <= 60000 && remaining > 30000);
    el.classList.toggle("danger", remaining != null && remaining <= 30000);
}

async function takeSeat(index) {
    const name = (document.getElementById("nick-input")?.value.trim() || nickname || "Lab Player").slice(0, 24);
    nickname = name;
    localStorage.setItem("picasso.guandan.name", name);
    const updated = await withAction(() => mutateGame(g => {
        if (g.phase !== "lobby") return false;
        const occupiedByOther = g.seats[index] && g.seats[index].clientId !== clientId;
        if (occupiedByOther) return false;
        const existing = clientSeatIn(g);
        const wasHost = existing >= 0 && !!g.seats[existing]?.host;
        if (existing >= 0) g.seats[existing] = null;
        const needsHost = !g.seats.some(s => s?.host);
        g.seats[index] = { clientId, name, type: "human", team: index % 2, ready: true, host: wasHost || needsHost };
        ensureHost(g);
        g.message = `${name} 入座。`;
    }));
    if (!updated) showToast(L("Seat changed before you. Try another seat.", "座位刚被占了，请换一个。"));
}

async function leaveSeat(index) {
    const updated = await withAction(() => mutateGame(g => {
        if (g.phase !== "lobby") return false;
        if (g.seats[index]?.clientId === clientId || clientIsHost(g)) {
            g.seats[index] = null;
            ensureHost(g);
            g.message = "座位已清空。";
            return true;
        }
        return false;
    }));
    if (!updated) showToast(L("Cannot leave that seat now.", "现在不能离开这个座位。"));
}

function makeAISeat(index) {
    return {
        clientId: `ai_${index}_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
        name: botNames.zh[index] || `AI ${index + 1}`,
        botIndex: index,
        type: "ai",
        team: index % 2,
        ready: true,
        host: false
    };
}

async function addAI(index) {
    if (!isHost()) return showToast(L("Only the host can add AI", "只有房主能补 AI"));
    const updated = await withAction(() => mutateGame(g => {
        if (g.phase !== "lobby" || !clientIsHost(g) || g.seats[index]) return false;
        g.seats[index] = makeAISeat(index);
        g.message = `${g.seats[index].name} 加入对局。`;
    }));
    if (!updated) showToast(L("That seat is no longer open.", "这个座位已经不是空位了。"));
}

async function fillAISeats() {
    if (!isHost()) return showToast(L("Only the host can add AI", "只有房主能补 AI"));
    const updated = await withAction(() => mutateGame(g => {
        if (g.phase !== "lobby" || !clientIsHost(g)) return false;
        let filled = 0;
        for (let i = 0; i < 4; i++) {
            if (!g.seats[i]) {
                g.seats[i] = makeAISeat(i);
                filled++;
            }
        }
        if (!filled) return false;
        g.message = `${filled} AI 加入对局。`;
    }));
    if (!updated) showToast(L("No open AI seats to fill.", "没有空位需要补 AI。"));
}

async function startGame() {
    if (!isHost()) return showToast(L("Only the host can start", "只有房主能开始"));
    const updated = await withAction(() => mutateGame(g => {
        if (g.phase !== "lobby" || !clientIsHost(g)) return false;
        for (let i = 0; i < 4; i++) if (!g.seats[i]) g.seats[i] = makeAISeat(i);
        ensureHost(g);
        startRound(g, null);
    }));
    if (!updated) showToast(L("The table changed. Please retry.", "牌桌状态变了，请重试。"));
}

function startRound(g, previousResult) {
    const deck = makeDeck();
    const now = Date.now();
    g.roundNo = (g.roundNo || 0) + 1;
    g.roundStartedAt = now;
    g.dealStartedAt = now;
    g.currentLevelRank = g.levels[g.leaderTeam || 0] || "2";
