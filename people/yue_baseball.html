<style>
.baseball-wrap {
  --baseball-cycle: 4.9s;

.baseball-stage {

.baseball-avatar-frame {

  height: 100%;

  border-radius: 50%;
  transition: transform 0.3s ease, filter 0.3s ease;
}

.baseball-wrap:hover .baseball-avatar-frame {
  transform: scale(1.08);
}

.baseball-wrap:hover .baseball-avatar {
  filter: brightness(1.1);
}

.baseball-panel-flash,
.baseball-bat,
.baseball-ball,
.baseball-trail,
.baseball-swing-arc,
.baseball-focus-lines,
.baseball-comic-speed,
.baseball-electric-pack,
.baseball-whoosh,
.baseball-comic-word,
.baseball-home-callout,
.baseball-impact {

.baseball-panel-flash {
  inset: 0;

  border-radius: 50%;

    radial-gradient(circle at 59% 38%, rgba(255,255,255,0.98), rgba(255,242,94,0.72) 16%, transparent 31%),

  mix-blend-mode: screen;
}

.baseball-wrap.baseball-on .baseball-panel-flash {
  animation: panel-flash var(--baseball-cycle) ease-out infinite;
}

.baseball-bat {

  height: var(--bat-height, 124px);

  opacity: 1;

.baseball-ball {

  border-radius: 50%;

    inset -2px -2px 0 rgba(95,50,20,0.18);
  opacity: 0;
}

.baseball-ball::before,
.baseball-ball::after {
  content: "";

  top: 2px;
  width: 6px;
  height: 12px;
