<style>
.ct-wrap {
  display: inline-block;
  cursor: pointer;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
}

.ct-wrap *,
.ct-wrap *::before,
.ct-wrap *::after {
  box-sizing: border-box;
}

.ct-stage {
  position: relative;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  overflow: visible;
}

.ct-avatar-frame {
  position: relative;
  z-index: 4;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  border-radius: 50%;
  overflow: hidden;
  background: #111827;
  transform: scale(var(--ct-avatar-scale, 1));
  transform-origin: 50% 50%;
  transition: transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1);
  will-change: transform;
}

.ct-avatar {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  transition: filter 0.32s ease;
}

.ct-wrap:hover {
  --ct-avatar-scale: 1.08;
}

.ct-wrap.ct-on {
  --ct-avatar-scale: 1.07;
}

.ct-wrap.ct-on:hover {
  --ct-avatar-scale: 1.12;
}

.ct-wrap:hover .ct-avatar,
.ct-wrap.ct-on .ct-avatar {
  filter: brightness(1.08) saturate(1.06);
}

.ct-photo-warmth,
.ct-cup-energy,
.ct-steam,
.ct-laurel,
.ct-answer-sheet,
.ct-pencil,
.ct-honor,
.ct-spark-layer {
  position: absolute;
  pointer-events: none;
}

.ct-photo-warmth {
  inset: 0;
  z-index: 1;
  border-radius: 50%;
  background:
    radial-gradient(circle at 66% 24%, rgba(255, 244, 184, 0.34), rgba(255, 244, 184, 0) 28%),
    radial-gradient(circle at 21% 48%, rgba(186, 230, 253, 0.16), rgba(186, 230, 253, 0) 32%);
  mix-blend-mode: screen;
  opacity: 0;
}

.ct-cup-energy {
  left: 83px;
  top: 19px;
  z-index: 7;
  width: 112px;
  height: 150px;
  opacity: 0;
  mix-blend-mode: screen;
  overflow: visible;
  filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4));
}

.ct-cup-energy path,
.ct-cup-energy ellipse {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.ct-cup-rings ellipse {
  stroke: url(#ctCupGlow);
  stroke-width: 2.1;
  stroke-dasharray: 24 82;
  opacity: 0.74;
}

.ct-cup-steam-lines path {
  stroke: url(#ctSteamGlow);
  stroke-width: 2.6;
  stroke-dasharray: 16 46;
  opacity: 0;
}

.ct-cup-liquid {
  stroke: #fff7cc;
  stroke-width: 2.4;
  stroke-dasharray: 35 55;
  filter: drop-shadow(0 0 7px rgba(255, 255, 255, 0.78));
}

.ct-cup-shine {
  stroke: rgba(255, 255, 255, 0.88);
  stroke-width: 3.2;
  stroke-dasharray: 18 92;
  opacity: 0.72;
  filter: drop-shadow(0 0 6px rgba(254, 240, 138, 0.65));
}

.ct-cup-bolt {
  fill: rgba(250, 204, 21, 0.24);
  stroke: rgba(255, 247, 150, 0.95);
  stroke-width: 2;
  opacity: 0;
  filter: drop-shadow(0 0 6px rgba(250, 204, 21, 0.8));
}

.ct-cup-bubbles {
  fill: rgba(255, 247, 205, 0.92);
  filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.8));
}

.ct-cup-bubbles circle {
  opacity: 0;
  transform-box: fill-box;
  transform-origin: center;
}

.ct-steam {
  left: 104px;
  top: 16px;
  z-index: 7;
  width: 64px;
  height: 58px;
  opacity: 0;
}

.ct-steam i {
  position: absolute;
  bottom: 4px;
  width: 14px;
  height: 42px;
  border-left: 2px solid rgba(255, 255, 255, 0.82);
  border-radius: 999px;
  opacity: 0;
  transform-origin: 50% 100%;
}

.ct-steam i:nth-child(1) { left: 6px; --tilt: -16deg; }
.ct-steam i:nth-child(2) { left: 25px; --tilt: 2deg; animation-delay: 0.24s; }
.ct-steam i:nth-child(3) { left: 44px; --tilt: 14deg; animation-delay: 0.48s; }

.ct-laurel {
  left: -15px;
  top: -15px;
  z-index: 2;
  width: 230px;
  height: 230px;
  opacity: 0;
  overflow: visible;
  filter: drop-shadow(0 4px 5px rgba(92, 50, 8, 0.18));
}

.ct-laurel-stem {
  fill: none;
  stroke: url(#ctGold);
  stroke-width: 2.1;
  stroke-dasharray: 8 8;
}

.ct-leaves {
  fill: url(#ctGold);
}

.ct-answer-sheet {
  left: -13px;
  bottom: -10px;
  z-index: 6;
  width: 64px;
  height: 79px;
  opacity: 0;
  transform: rotate(-10deg) translate(-16px, 12px) scale(0.72);
  filter: drop-shadow(4px 5px 0 rgba(63, 42, 11, 0.2));
}

.ct-check {
  stroke-dasharray: 56;
  stroke-dashoffset: 56;
}

.ct-pencil {
  right: -23px;
  bottom: 26px;
  z-index: 8;
  width: 102px;
  height: 29px;
  opacity: 0;
  transform-origin: 18px 50%;
  transform: rotate(-27deg) translate(20px, 12px) scale(0.78);
  filter: drop-shadow(4px 5px 0 rgba(63, 42, 11, 0.2));
}

.ct-honor {
  left: 57px;
  top: 177px;
  z-index: 9;
  min-width: 128px;
  padding: 7px 13px 8px;
  border: 2px solid #3f2a0b;
  border-radius: 8px;
  color: #111827;
  text-align: center;
  background: linear-gradient(145deg, #fffdf0, #facc15 66%, #d97706);
  box-shadow: 4px 5px 0 rgba(63, 42, 11, 0.24);
  opacity: 0;
  transform: rotate(-2deg) translateY(10px) scale(0.74);
}

.ct-honor::before,
.ct-honor::after {
  content: "";
  position: absolute;
  top: -13px;
  width: 30px;
  height: 17px;
  border: 2px solid #3f2a0b;
  background: #facc15;
}

.ct-honor::before {
  left: 16px;
  transform: skewX(-16deg);
}

.ct-honor::after {
  right: 16px;
  transform: skewX(16deg);
}

.ct-honor span,
.ct-honor b {
  position: relative;
  z-index: 1;
  display: block;
  letter-spacing: 0;
}

.ct-honor span {
  margin-bottom: 2px;
  color: #78350f;
  font: 900 8px/1 Arial, sans-serif;
}

.ct-honor b {
  font: 900 16px/0.95 "Arial Black", Impact, Arial, sans-serif;
}

.ct-spark-layer {
  inset: 0;
  z-index: 12;
  overflow: visible;
}

.ct-spark {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: var(--s, 6px);
  height: var(--s, 6px);
  border-radius: 50%;
  background: var(--c, #facc15);
  box-shadow: 0 0 9px rgba(250, 204, 21, 0.78);
  transform: translate(-50%, -50%) scale(0.45);
  animation: ct-spark-fly 0.92s ease-out forwards;
}

.ct-bean {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: 10px;
  height: 15px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c2d12, #3f1d0b);
  box-shadow: 0 0 8px rgba(251, 191, 36, 0.5);
  transform: translate(-50%, -50%) rotate(var(--r, 0deg)) scale(0.45);
  animation: ct-bean-pop 0.95s ease-out forwards;
}

.ct-bean::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 2px;
  width: 2px;
  height: 11px;
  border-radius: 999px;
  background: rgba(255, 247, 205, 0.48);
  transform: rotate(12deg);
}

.ct-wrap.ct-on .ct-photo-warmth {
  animation: ct-warmth-in 0.45s ease-out forwards;
}

.ct-wrap.ct-on .ct-cup-energy {
  animation: ct-cup-energy-in 0.28s ease-out forwards;
}

.ct-wrap.ct-on .ct-cup-rings ellipse {
  animation: ct-cup-ring 1.65s linear infinite;
}

.ct-wrap.ct-on .ct-cup-rings ellipse:nth-child(2) {
  animation-delay: -0.54s;
}

.ct-wrap.ct-on .ct-cup-steam-lines path {
  animation: ct-cup-steam 1.45s ease-in-out infinite;
}

.ct-wrap.ct-on .ct-cup-steam-lines path:nth-child(2) { animation-delay: 0.18s; }
.ct-wrap.ct-on .ct-cup-steam-lines path:nth-child(3) { animation-delay: 0.36s; }

.ct-wrap.ct-on .ct-cup-liquid {
  animation: ct-cup-liquid 1.05s ease-in-out infinite;
}

.ct-wrap.ct-on .ct-cup-shine {
  animation: ct-cup-shine 1.35s ease-in-out infinite;
}

.ct-wrap.ct-on .ct-cup-bolt {
  animation: ct-cup-bolt 1.28s ease-in-out infinite;
}

.ct-wrap.ct-on .ct-cup-bubbles circle {
  animation: ct-cup-bubble 1.15s ease-out infinite;
}

.ct-wrap.ct-on .ct-cup-bubbles circle:nth-child(2) { animation-delay: 0.18s; }
.ct-wrap.ct-on .ct-cup-bubbles circle:nth-child(3) { animation-delay: 0.36s; }
.ct-wrap.ct-on .ct-cup-bubbles circle:nth-child(4) { animation-delay: 0.54s; }

.ct-wrap.ct-on .ct-steam {
  animation: ct-steam-in 0.35s ease-out forwards;
}

.ct-wrap.ct-on .ct-steam i {
  animation: ct-steam-rise 1.65s ease-in-out infinite;
}

.ct-wrap.ct-on .ct-laurel {
  animation: ct-laurel-in 0.58s 0.08s cubic-bezier(0.18, 1.35, 0.28, 1) forwards,
             ct-laurel-float 2.2s 0.8s ease-in-out infinite alternate;
}

.ct-wrap.ct-on .ct-answer-sheet {
  animation: ct-sheet-in 0.52s 0.14s cubic-bezier(0.18, 1.35, 0.28, 1) forwards;
}

.ct-wrap.ct-on .ct-check {
  animation: ct-check-draw 0.52s 0.58s ease-out forwards;
}

.ct-wrap.ct-on .ct-pencil {
  animation: ct-pencil-in 0.52s 0.28s cubic-bezier(0.18, 1.35, 0.28, 1) forwards,
             ct-pencil-write 1.4s 0.95s ease-in-out infinite alternate;
}

.ct-wrap.ct-on .ct-honor {
  animation: ct-honor-in 0.5s 0.42s cubic-bezier(0.18, 1.35, 0.28, 1) forwards,
             ct-honor-shine 1.9s 1.1s ease-in-out infinite alternate;
}

@keyframes ct-warmth-in {
  to { opacity: 1; }
}

@keyframes ct-cup-energy-in {
  to { opacity: 1; }
}

@keyframes ct-cup-ring {
  0% { stroke-dashoffset: 82; opacity: 0.2; transform: scale(0.98); }
  42% { opacity: 0.9; }
  100% { stroke-dashoffset: -82; opacity: 0.35; transform: scale(1.03); }
}

@keyframes ct-cup-steam {
  0% { opacity: 0; stroke-dashoffset: 34; transform: translateY(8px) scaleY(0.78); }
  28% { opacity: 0.95; }
  100% { opacity: 0; stroke-dashoffset: -28; transform: translateY(-16px) scaleY(1.12); }
}

@keyframes ct-cup-liquid {
  0%, 100% { stroke-dashoffset: 48; opacity: 0.45; transform: translateY(0); }
  50% { stroke-dashoffset: -12; opacity: 1; transform: translateY(-1.5px); }
}

@keyframes ct-cup-shine {
  0%, 20% { stroke-dashoffset: 96; opacity: 0; }
  45%, 64% { opacity: 0.95; }
  100% { stroke-dashoffset: -36; opacity: 0; }
}

@keyframes ct-cup-bolt {
  0%, 100% { opacity: 0; transform: scale(0.94); }
  42%, 62% { opacity: 0.95; transform: scale(1.04); }
}

@keyframes ct-cup-bubble {
  0% { opacity: 0; transform: translateY(8px) scale(0.35); }
  22% { opacity: 0.95; }
  100% { opacity: 0; transform: translateY(-18px) scale(1.15); }
}

@keyframes ct-steam-in {
  to { opacity: 1; }
}

@keyframes ct-steam-rise {
  0% { opacity: 0; transform: translateY(9px) rotate(var(--tilt, 0deg)) scaleY(0.72); }
  35% { opacity: 0.85; }
  100% { opacity: 0; transform: translateY(-18px) rotate(var(--tilt, 0deg)) scaleY(1.12); }
}

@keyframes ct-laurel-in {
  to { opacity: 1; transform: scale(1); }
}

@keyframes ct-laurel-float {
  from { transform: translateY(0) scale(1); }
  to { transform: translateY(-3px) scale(1.01); }
}

@keyframes ct-sheet-in {
  to { opacity: 1; transform: rotate(-9deg) translate(0, 0) scale(1); }
}

@keyframes ct-check-draw {
  to { stroke-dashoffset: 0; }
}

@keyframes ct-pencil-in {
  to { opacity: 1; transform: rotate(-27deg) translate(0, 0) scale(1); }
}

@keyframes ct-pencil-write {
  from { transform: rotate(-27deg) translate(0, 0) scale(1); }
  to { transform: rotate(-22deg) translate(-8px, -4px) scale(1); }
}

@keyframes ct-honor-in {
  to { opacity: 1; transform: rotate(-2deg) translateY(0) scale(1); }
}

@keyframes ct-honor-shine {
  from { filter: brightness(1); }
  to { filter: brightness(1.16); }
}

@keyframes ct-spark-fly {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.4); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1); }
}

@keyframes ct-bean-pop {
  0% { opacity: 1; transform: translate(-50%, -50%) rotate(var(--r, 0deg)) scale(0.42); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(calc(var(--r, 0deg) + 130deg)) scale(1); }
}
</style>

<script>
(function () {
  document.querySelectorAll('.ct-wrap').forEach((wrap) => {
    if (wrap.dataset.ctReady === '1') return;
    wrap.dataset.ctReady = '1';
    const layer = wrap.querySelector('.ct-spark-layer');

    wrap.addEventListener('click', () => {
      const on = wrap.classList.toggle('ct-on');
      if (on) burstSparks(layer);
      else if (layer) layer.innerHTML = '';
    });
  });

  function burstSparks(layer) {
    if (!layer) return;
    layer.innerHTML = '';
    const colors = ['#facc15', '#fff7b8', '#fb923c', '#ffffff'];
    const anchors = [
      { x: 132, y: 58 },
      { x: 158, y: 102 },
      { x: 122, y: 168 },
      { x: 151, y: 181 }
    ];

    for (let i = 0; i < 24; i++) {
      const spark = document.createElement('span');
      const anchor = anchors[i % anchors.length];
      const angle = Math.random() * Math.PI * 2;
      const dist = 24 + Math.random() * 64;
      spark.className = 'ct-spark';
      spark.style.setProperty('--x', `${anchor.x}px`);
      spark.style.setProperty('--y', `${anchor.y}px`);
      spark.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      spark.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      spark.style.setProperty('--s', `${4 + Math.random() * 5}px`);
      spark.style.setProperty('--c', colors[i % colors.length]);
      spark.style.animationDelay = `${Math.random() * 0.18}s`;
      layer.appendChild(spark);
    }

    for (let i = 0; i < 10; i++) {
      const bean = document.createElement('span');
      const anchor = anchors[i % 2];
      const angle = -Math.PI * 0.72 + Math.random() * Math.PI * 0.88;
      const dist = 20 + Math.random() * 48;
      bean.className = 'ct-bean';
      bean.style.setProperty('--x', `${anchor.x}px`);
      bean.style.setProperty('--y', `${anchor.y}px`);
      bean.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      bean.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      bean.style.setProperty('--r', `${Math.random() * 180}deg`);
      bean.style.animationDelay = `${Math.random() * 0.16}s`;
      layer.appendChild(bean);
    }

    setTimeout(() => { layer.innerHTML = ''; }, 1200);
  }
})();
</script>
