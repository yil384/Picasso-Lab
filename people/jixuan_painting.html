<style>
.jp-wrap {
  display: inline-block;
  cursor: pointer;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
}

.jp-wrap *,
.jp-wrap *::before,
.jp-wrap *::after {
  box-sizing: border-box;
}

.jp-stage {
  position: relative;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  overflow: visible;
}

.jp-avatar-frame {
  position: relative;
  z-index: 3;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  border: 0;
  border-radius: 50%;
  overflow: hidden;
  background: transparent;
  box-shadow: none;
  transform: scale(var(--jp-avatar-scale, 1));
  transform-origin: 50% 50%;
  transition: transform 0.32s cubic-bezier(0.34,1.3,0.64,1);
  will-change: transform;
}

.jp-avatar {
  display: block;
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  transition: filter 0.32s ease;
}

.jp-wrap:hover {
  --jp-avatar-scale: 1.08;
}

.jp-wrap.jp-on {
  --jp-avatar-scale: 1.07;
}

.jp-wrap.jp-on:hover {
  --jp-avatar-scale: 1.12;
}

.jp-wrap:hover .jp-avatar,
.jp-wrap.jp-on .jp-avatar {
  filter: brightness(1.06) saturate(1.02);
}

.jp-face-sketch,
.jp-rice-paper,
.jp-ink-orchid,
.jp-ducks,
.jp-calligraphy,
.jp-brush,
.jp-red-seal,
.jp-ink-drops {
  position: absolute;
  pointer-events: none;
}

.jp-face-sketch {
  inset: 0;
  z-index: 2;
  width: 100%;
  height: 100%;
  opacity: 0;
  mix-blend-mode: multiply;
}

.jp-sketch-line {
  fill: none;
  stroke: rgba(36,32,27,0.42);
  stroke-width: 1.1;
  stroke-linecap: round;
  stroke-dasharray: 74;
  stroke-dashoffset: 74;
}

.jp-sketch-line.light {
  stroke: rgba(36,32,27,0.24);
  stroke-width: 0.9;
  stroke-dasharray: 62;
  stroke-dashoffset: 62;
}

.jp-rice-paper {
  right: -38px;
  top: 0;
  z-index: 4;
  width: 84px;
  height: 133px;
  opacity: 0;
  transform: rotate(5deg) translate(14px, -12px) scale(0.78);
  transform-origin: 50% 18%;
  transition: opacity 0.14s ease, transform 0.28s cubic-bezier(0.18,1.35,0.28,1);
}

.jp-paper-fibers path {
  fill: none;
  stroke: rgba(72,58,36,0.16);
  stroke-width: 0.8;
  stroke-linecap: round;
}

.jp-ink-orchid {
  left: -22px;
  top: 13px;
  z-index: 5;
  width: 106px;
  height: 142px;
  opacity: 0;
  overflow: visible;
  filter: drop-shadow(2px 4px 0 rgba(32,26,17,0.1));
  transform: rotate(-5deg) translate(-14px, 4px) scale(0.82);
  transform-origin: 34% 90%;
}

.jp-ink-stem,
.jp-water-line {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.jp-ink-stem {
  stroke: rgba(17,24,18,0.86);
  stroke-width: 4.5;
  stroke-dasharray: 150;
  stroke-dashoffset: 150;
}

.jp-ink-stem.s2 {
  stroke: rgba(36,58,43,0.78);
  stroke-width: 3.7;
}

.jp-ink-leaf {
  fill: rgba(30,58,42,0.78);
  stroke: rgba(10,26,18,0.88);
  stroke-width: 2;
  opacity: 0;
  transform-box: fill-box;
  transform-origin: 50% 100%;
}

.jp-ink-leaf.soft {
  fill: rgba(51,87,61,0.48);
}

.jp-orchid-blooms path {
  fill: rgba(255,252,237,0.92);
  stroke: rgba(17,24,18,0.92);
  stroke-width: 2.4;
  stroke-linejoin: round;
  opacity: 0;
  transform-box: fill-box;
  transform-origin: center;
}

.jp-ducks {
  right: -24px;
  bottom: 12px;
  z-index: 5;
  width: 105px;
  height: 72px;
  opacity: 0;
  overflow: visible;
  transform: translate(16px, 14px) scale(0.78);
  filter: drop-shadow(2px 4px 0 rgba(30,24,18,0.14));
  transition: opacity 0.14s ease, transform 0.28s cubic-bezier(0.18,1.35,0.28,1);
}

.jp-water-line {
  stroke: rgba(27,43,48,0.78);
  stroke-width: 2.2;
  stroke-dasharray: 118;
  stroke-dashoffset: 118;
}

.jp-water-line.w2 {
  stroke-width: 1.5;
  opacity: 0.6;
}

.jp-duck path {
  stroke: rgba(14,18,16,0.9);
  stroke-width: 2;
  stroke-linejoin: round;
}

.jp-duck circle {
  fill: #fefce8;
}

.duck-a path:nth-child(1) { fill: rgba(35,39,34,0.94); }
.duck-a path:nth-child(2) { fill: rgba(245,148,47,0.86); }
.duck-a path:nth-child(3) { fill: #ef4444; }
.duck-b path:nth-child(1) { fill: rgba(235,232,216,0.92); }
.duck-b path:nth-child(2) { fill: rgba(30,31,29,0.9); }
.duck-b path:nth-child(3) { fill: #d97706; }

.jp-calligraphy {
  right: -18px;
  top: 20px;
  z-index: 6;
  display: flex;
  gap: 4px;
  opacity: 0;
  transform: rotate(5deg) translate(11px, -8px);
  transition: opacity 0.12s ease, transform 0.24s cubic-bezier(0.18,1.35,0.28,1);
}

.jp-calligraphy span {
  writing-mode: vertical-rl;
  color: #1f1b17;
  font: 900 15px/1.05 "STKaiti", "KaiTi", "Songti SC", serif;

.jp-brush {
  left: 31px;
  bottom: -10px;
  z-index: 7;
  width: 121px;
  height: 15px;
  border-radius: 999px;
  background: linear-gradient(90deg, #120b07 0 15%, #4b2b14 16% 25%, #d9a35b 26% 70%, #6a3518 71% 100%);
  box-shadow: 0 4px 5px rgba(31,19,8,0.22);
  opacity: 0;
  transform-origin: 18px 50%;
  transform: rotate(-22deg) translate(12px, 17px);
  transition: opacity 0.12s ease, transform 0.24s cubic-bezier(0.18,1.35,0.28,1);
}

.jp-brush::before {
  content: "";
  position: absolute;
  left: -18px;
  top: -7px;
  width: 32px;
  height: 28px;
  border-radius: 72% 28% 61% 39%;
  background:
    radial-gradient(circle at 68% 32%, rgba(255,255,255,0.22), transparent 20%),
    linear-gradient(135deg, #101010, #232323 54%, #0b0b0b);
}

.jp-brush::after {
  content: "";
  position: absolute;
  left: 20px;
  top: 3px;
  width: 65px;
  height: 3px;
  border-radius: 999px;
  background: rgba(255,243,205,0.52);
}

.jp-red-seal {
  right: -21px;
  bottom: 50px;
  z-index: 7;
  width: 27px;
  height: 27px;
  display: grid;
  place-items: center;
  border: 2px solid #7f1d1d;
  color: #fff7ed;
  background: rgba(185,28,28,0.9);
  font: 900 18px/1 "STKaiti", "KaiTi", serif;
  opacity: 0;
  transform: rotate(8deg) scale(0.6);
  box-shadow: 2px 3px 0 rgba(73,19,19,0.22);
  transition: opacity 0.12s ease, transform 0.22s cubic-bezier(0.18,1.35,0.28,1);
}

.jp-ink-drops {
  inset: 0;
  z-index: 8;
  overflow: visible;
}

.jp-drop {
  position: absolute;
  width: var(--s, 5px);
  height: var(--s, 5px);
  border-radius: 50%;
  background: var(--c);
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.35);
  animation: jp-drop-fly 0.92s ease-out forwards;
}

.jp-wrap.jp-on .jp-face-sketch {
  animation: jp-sketch-in 0.28s ease-out forwards;
}

.jp-wrap.jp-on .jp-sketch-line {
  animation: jp-sketch-draw 1.1s 0.18s ease-out forwards;
}

.jp-wrap.jp-on .jp-rice-paper {
  opacity: 1;
  transform: rotate(5deg) translate(0, 0) scale(1);
}

.jp-wrap.jp-on .jp-calligraphy {
  opacity: 1;
  transform: rotate(5deg) translate(0, 0);
}

.jp-wrap.jp-on .jp-ink-orchid {
  animation: jp-orchid-in 0.36s 0.04s cubic-bezier(0.18,1.35,0.28,1) forwards;
}

.jp-wrap.jp-on .jp-ink-stem {
  animation: jp-stem-draw 0.56s 0.1s ease-out forwards;
}

.jp-wrap.jp-on .jp-ink-leaf {
  animation: jp-leaf-open 0.42s 0.2s cubic-bezier(0.18,1.35,0.28,1) forwards;
}

.jp-wrap.jp-on .jp-orchid-blooms path {
  animation: jp-bloom-in 0.34s 0.32s cubic-bezier(0.18,1.35,0.28,1) forwards;
}

.jp-wrap.jp-on .jp-ducks {
  opacity: 1;
  transform: translate(0, 0) scale(1);
  animation: jp-ducks-float 1.9s 0.7s ease-in-out infinite alternate;
}

.jp-wrap.jp-on .jp-water-line {
  animation: jp-water-draw 0.78s 0.52s ease-out forwards;
}

.jp-wrap.jp-on .jp-brush {
  opacity: 1;
  transform: rotate(-22deg) translate(0, 0);
  animation: jp-brush-float 1.8s 0.7s ease-in-out infinite alternate;
}

.jp-wrap.jp-on .jp-red-seal {
  opacity: 1;
  transform: rotate(8deg) scale(1);
}

@keyframes jp-sketch-in {
  to { opacity: 1; }
}

@keyframes jp-sketch-draw {
  to { stroke-dashoffset: 0; }
}

@keyframes jp-paper-in {
  to { opacity: 0.96; transform: rotate(5deg) translate(0, 0) scale(1); }
}

@keyframes jp-calligraphy-in {
  to { opacity: 0.92; transform: rotate(5deg) translate(0, 0); }
}

@keyframes jp-orchid-in {
  to { opacity: 1; transform: rotate(-5deg) translate(0, 0) scale(1); }
}

@keyframes jp-stem-draw {
  to { stroke-dashoffset: 0; }
}

@keyframes jp-leaf-open {
  from { opacity: 0; transform: scaleY(0.24) rotate(-3deg); }
  to { opacity: 1; transform: scaleY(1) rotate(0deg); }
}

@keyframes jp-bloom-in {
  from { opacity: 0; transform: scale(0.5) rotate(-8deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}

@keyframes jp-ducks-in {
  to { opacity: 1; transform: translate(0, 0) scale(1); }
}

@keyframes jp-ducks-float {
  from { transform: translateY(0) scale(1); }
  to { transform: translateY(-2px) scale(1.01); }
}

@keyframes jp-water-draw {
  to { stroke-dashoffset: 0; }
}

@keyframes jp-brush-in {
  to { opacity: 1; transform: rotate(-22deg) translate(0, 0); }
}

@keyframes jp-brush-float {
  from { transform: rotate(-22deg) translate(0, 0); }
  to { transform: rotate(-16deg) translate(-6px, -4px); }
}

@keyframes jp-seal-in {
  to { opacity: 1; transform: rotate(8deg) scale(1); }
}

@keyframes jp-drop-fly {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.35); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1); }
}
</style>

<script>
(function () {
  document.querySelectorAll('.jp-wrap').forEach((wrap) => {
    if (wrap.dataset.jpReady === '1') return;
    wrap.dataset.jpReady = '1';
    const drops = wrap.querySelector('.jp-ink-drops');
    wrap.addEventListener('click', () => {
      const on = wrap.classList.toggle('jp-on');
      if (on) splashInk(drops);
      else if (drops) drops.innerHTML = '';
    });
  });

  function splashInk(layer) {
    if (!layer) return;
    layer.innerHTML = '';
    const colors = ['#111111', '#254734', '#3f2f1c', '#b91c1c', '#f5f0de'];
    const anchors = [[25, 38], [46, 112], [168, 40], [92, 198], [175, 146]];
    for (let i = 0; i < 26; i++) {
      const drop = document.createElement('span');
      const anchor = anchors[i % anchors.length];
      const angle = Math.random() * Math.PI * 2;
      const dist = 18 + Math.random() * 48;
      drop.className = 'jp-drop';
      drop.style.left = `${anchor[0]}px`;
      drop.style.top = `${anchor[1]}px`;
      drop.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      drop.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      drop.style.setProperty('--s', `${3 + Math.random() * 6}px`);
      drop.style.setProperty('--c', colors[i % colors.length]);
      drop.style.animationDelay = `${Math.random() * 0.16}s`;
      layer.appendChild(drop);
    }
    setTimeout(() => { layer.innerHTML = ''; }, 1150);
  }
})();
</script>
