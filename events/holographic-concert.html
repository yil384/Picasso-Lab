<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holographic Concert - 多梦症</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }
.scanlines {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,255,242,0.012) 0px, transparent 1px, transparent 3px);
}
.scanlines::after {
    content: ''; position: absolute; left: 0; right: 0; height: 2px;
    background: rgba(0,255,242,0.05); animation: scanMove 4s linear infinite;
}
@keyframes scanMove { from { top: -2px; } to { top: 100%; } }
.vignette {
    position: fixed; inset: 0; z-index: 9; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}
.song-info {
    position: fixed; bottom: 36px; left: 0; right: 0;
    text-align: center; z-index: 20; pointer-events: none;
}
.song-title {
    font-family: -apple-system, sans-serif; font-size: 34px; font-weight: 700; color: #fff;
    text-shadow: 0 0 30px rgba(0,255,242,0.8), 0 0 60px rgba(0,255,242,0.4), 0 0 90px rgba(0,255,242,0.2);
    letter-spacing: 0.2em;
}
.song-artist {
    font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 300;
    color: rgba(0,255,242,0.6); margin-top: 6px;
    text-shadow: 0 0 15px rgba(0,255,242,0.5); letter-spacing: 0.25em;
}
.loading-text {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, sans-serif; font-size: 13px;
    color: rgba(0,255,242,0.4); letter-spacing: 0.15em;
}
.loading-text.hidden { display: none; }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="song-info">
    <div class="song-title">多 梦 症</div>
    <div class="song-artist">L A Y M E N</div>
</div>
<div class="loading-text" id="loading">INITIALIZING HOLOGRAPHIC PROJECTION...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1800);

// ── Scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000010, 0.012);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.prepend(renderer.domElement);

// ── Post-processing ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 2.5, 0.8, 0.1);
composer.addPass(bloom);

const filmPass = new FilmPass(0.25);
composer.addPass(filmPass);

const ChromaShader = {
    uniforms: { tDiffuse: { value: null }, uOffset: { value: 0.003 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `uniform sampler2D tDiffuse; uniform float uOffset; varying vec2 vUv;
    void main() {
        float r = texture2D(tDiffuse, vUv + vec2(uOffset, 0.0)).r;
        float g = texture2D(tDiffuse, vUv).g;
        float b = texture2D(tDiffuse, vUv - vec2(uOffset, 0.0)).b;
        gl_FragColor = vec4(r, g, b, 1.0);
    }`
};
composer.addPass(new ShaderPass(ChromaShader));

// ── Constants ──
const CYAN = new THREE.Color(0x00fff2);
const PINK = new THREE.Color(0xff69b4);
const GOLD = new THREE.Color(0xffcd00);

// ── Hologram ShaderMaterial ──
function holoMaterial(color) {
    return new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(color || 0x00fff2) } },
        vertexShader: `
            varying vec3 vPosition; varying vec3 vNormal; varying vec2 vUv;
            uniform float uTime;
            void main() {
                vPosition = (modelMatrix * vec4(position, 1.0)).xyz;
                vNormal = normalize(normalMatrix * normal);
                vUv = uv;
                vec3 pos = position;
                float glitch = step(0.99, sin(uTime * 3.0 + position.y * 50.0));
                pos.x += glitch * 0.15 * sin(uTime * 100.0);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }`,
        fragmentShader: `
            varying vec3 vPosition; varying vec3 vNormal; varying vec2 vUv;
            uniform float uTime; uniform vec3 uColor;
            void main() {
                vec3 viewDir = normalize(cameraPosition - vPosition);
                float fresnel = 1.0 - abs(dot(viewDir, vNormal));
                fresnel = pow(fresnel, 2.0);
                float lines = step(0.5, fract(vPosition.y * 15.0 + uTime * 2.0));
                float alpha = fresnel * 0.8 + 0.15;
                alpha *= (0.7 + lines * 0.3);
                alpha *= 0.85 + 0.15 * sin(uTime * 8.0);
                gl_FragColor = vec4(uColor, alpha);
            }`,
        transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
    });
}

const holoMats = []; // track all holo materials for uniform updates

// ── Ground grid ──
const gridMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uBass: { value: 0.3 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
        varying vec2 vUv; uniform float uTime; uniform float uBass;
        void main() {
            vec2 p = (vUv - 0.5) * 80.0;
            float gx = smoothstep(0.9, 1.0, abs(sin(p.x * 3.14159)));
            float gy = smoothstep(0.9, 1.0, abs(sin(p.y * 3.14159)));
            float grid = max(gx, gy);
            float pulse = 0.5 + 0.5 * sin(length(p) * 0.3 - uTime * 3.0);
            float intensity = grid * (0.08 + uBass * 0.15) * pulse;
            gl_FragColor = vec4(0.0, 1.0, 0.95, intensity);
        }`,
    transparent: true, side: THREE.DoubleSide, depthWrite: false
});
const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), gridMat);
ground.rotation.x = -Math.PI / 2; ground.position.y = -0.1;
scene.add(ground);

// ── Projector base ──
const baseGroup = new THREE.Group();
scene.add(baseGroup);
for (let i = 0; i < 8; i++) {
    const r = 3.5 - i * 0.4;
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(r - 0.03, r, 96),
        new THREE.MeshBasicMaterial({ color: CYAN, transparent: true, opacity: 0.12 + i * 0.02, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2; ring.position.y = 0.01 * i;
    baseGroup.add(ring);
}
const baseFill = new THREE.Mesh(
    new THREE.CircleGeometry(3.5, 64),
    new THREE.MeshBasicMaterial({ color: CYAN, transparent: true, opacity: 0.03, side: THREE.DoubleSide })
);
baseFill.rotation.x = -Math.PI / 2;
baseGroup.add(baseFill);

// Volumetric light cone
const coneMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uBass: { value: 0.3 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `
        varying vec2 vUv; uniform float uTime; uniform float uBass;
        void main() {
            float grad = 1.0 - vUv.y;
            float alpha = grad * grad * (0.04 + uBass * 0.04);
            alpha *= 0.8 + 0.2 * sin(uTime * 2.0);
            gl_FragColor = vec4(0.0, 1.0, 0.95, alpha);
        }`,
    transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
});
const cone = new THREE.Mesh(new THREE.ConeGeometry(3.5, 12, 32, 1, true), coneMat);
cone.position.y = 6; cone.rotation.x = Math.PI;
scene.add(cone);

// ── Stage ──
const stageGeo = new THREE.BoxGeometry(7, 0.12, 3.5);
const stageMat = holoMaterial(0x00fff2);
holoMats.push(stageMat);
const stage = new THREE.Mesh(stageGeo, stageMat);
stage.position.set(0, 1.2, 0);
scene.add(stage);
const stageEdge = new THREE.LineSegments(
    new THREE.EdgesGeometry(stageGeo),
    new THREE.LineBasicMaterial({ color: CYAN, transparent: true, opacity: 0.5 })
);
stageEdge.position.copy(stage.position);
scene.add(stageEdge);

// ── Holographic figures ──
function createFigure(x, z, hasGuitar) {
    const group = new THREE.Group();
    const mat = holoMaterial(0x00fff2);
    holoMats.push(mat);

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12), mat);
    head.position.y = 4.1; group.add(head);

    // Body
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.25, 1.6, 12), mat);
    body.position.y = 3.1; group.add(body);

    // Legs
    for (const side of [-1, 1]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.2, 8), mat);
        leg.position.set(side * 0.2, 1.7, 0); group.add(leg);
    }

    // Arms
    for (const side of [-1, 1]) {
        const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.0, 8), mat);
        arm.position.set(side * 0.45, 3.4, 0);
        arm.rotation.z = side * 0.4;
        group.add(arm);
    }

    if (hasGuitar) {
        const guitar = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.12, 8, 16), mat);
        guitar.position.set(0.3, 2.8, 0.25); guitar.rotation.x = Math.PI / 3;
        group.add(guitar);
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.2, 6), mat);
        neck.position.set(-0.2, 3.3, 0.15); neck.rotation.z = 0.6;
        group.add(neck);
    }

    group.position.set(x, 0, z);
    group.userData = { swayPhase: Math.random() * Math.PI * 2, mat };
    scene.add(group);
    return group;
}

const singer = createFigure(0, 0.3, false);
const guitarist = createFigure(2.2, 0.2, true);

// ── Floating particles (2000) ──
const PCOUNT = 2000;
const pPos = new Float32Array(PCOUNT * 3);
const pVel = new Float32Array(PCOUNT);
for (let i = 0; i < PCOUNT; i++) {
    pPos[i*3] = (Math.random()-0.5)*40;
    pPos[i*3+1] = Math.random()*20;
    pPos[i*3+2] = (Math.random()-0.5)*40;
    pVel[i] = 0.005 + Math.random()*0.015;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
    size: 0.05, color: CYAN, transparent: true, opacity: 0.4,
    blending: THREE.AdditiveBlending, depthWrite: false
})));

// ── Audience (800+) ──
const ACOUNT = 900;
const aPos = new Float32Array(ACOUNT*3);
const aCol = new Float32Array(ACOUNT*3);
const aSiz = new Float32Array(ACOUNT);
const stickCols = [CYAN, PINK, GOLD, new THREE.Color(0xffffff)];
for (let i = 0; i < ACOUNT; i++) {
    const row = Math.floor(Math.random()*12);
    const angle = -0.9 + Math.random()*1.8;
    const radius = 5.5 + row*1.1;
    aPos[i*3] = Math.sin(angle)*radius;
    aPos[i*3+1] = 1.2 + row*0.5 + Math.random()*0.3;
    aPos[i*3+2] = -Math.cos(angle)*radius + 3;
    const hasStick = Math.random() < 0.4;
    const c = hasStick ? stickCols[Math.floor(Math.random()*stickCols.length)] : new THREE.Color(0x334455);
    aCol[i*3]=c.r; aCol[i*3+1]=c.g; aCol[i*3+2]=c.b;
    aSiz[i] = hasStick ? 0.18+Math.random()*0.12 : 0.08;
}
const aGeo = new THREE.BufferGeometry();
aGeo.setAttribute('position', new THREE.BufferAttribute(aPos, 3));
aGeo.setAttribute('color', new THREE.BufferAttribute(aCol, 3));
aGeo.setAttribute('size', new THREE.BufferAttribute(aSiz, 1));

const audShaderMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uMid: { value: 0.2 } },
    vertexShader: `
        attribute float size; attribute vec3 color;
        varying vec3 vColor; uniform float uTime; uniform float uMid;
        void main() {
            vColor = color;
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            float flicker = 0.7 + 0.3 * sin(uTime * 6.0 + position.x * 3.0 + position.z * 2.0);
            gl_PointSize = size * (300.0 / -mv.z) * (0.8 + uMid * 0.5) * flicker;
            gl_Position = projectionMatrix * mv;
        }`,
    fragmentShader: `
        varying vec3 vColor;
        void main() {
            float d = length(gl_PointCoord - 0.5);
            if (d > 0.5) discard;
            float a = 1.0 - smoothstep(0.2, 0.5, d);
            gl_FragColor = vec4(vColor, a * 0.9);
        }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
});
scene.add(new THREE.Points(aGeo, audShaderMat));

// ── Spotlights + volumetric cones ──
const spotData = [
    { color: 0x00fff2, x: -2.5 },
    { color: 0xff69b4, x: 0 },
    { color: 0xffcd00, x: 2.5 }
];
const spots = spotData.map(s => {
    const light = new THREE.SpotLight(s.color, 3, 35, Math.PI/7, 0.6);
    light.position.set(s.x, 15, -1);
    light.target.position.set(s.x * 0.3, 1.2, 0);
    scene.add(light); scene.add(light.target);

    const vc = new THREE.Mesh(
        new THREE.ConeGeometry(2, 13, 16, 1, true),
        new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 0.018, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false })
    );
    vc.position.set(s.x, 8.5, -1);
    scene.add(vc);
    return light;
});

scene.add(new THREE.AmbientLight(0x000a15, 0.2));

// ── Audio ──
let analyser = null, dataArray = null;
const params = new URLSearchParams(location.search);
const musicUrl = params.get('music');
if (musicUrl) {
    const listener = new THREE.AudioListener();
    camera.add(listener);
    const audio = new THREE.Audio(listener);
    new THREE.AudioLoader().load(musicUrl, buf => {
        audio.setBuffer(buf); audio.setLoop(true); audio.setVolume(0.8); audio.play();
        analyser = new THREE.AudioAnalyser(audio, 128);
        dataArray = analyser.data;
    }, undefined, () => {});
}

// ── Resize ──
addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});

// ── Animate ──
const clock = new THREE.Clock();
let t = 0;

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    t += dt;

    // Audio
    let bass = 0, mid = 0;
    if (analyser) {
        analyser.getFrequencyData();
        for (let i = 0; i < 8; i++) bass += dataArray[i];
        bass /= 2040;
        for (let i = 8; i < 32; i++) mid += dataArray[i];
        mid /= 6120;
    } else {
        bass = 0.3 + Math.sin(t*2.0)*0.15 + Math.sin(t*3.7)*0.05;
        mid = 0.2 + Math.sin(t*3.5)*0.1;
    }

    // Update uniforms
    holoMats.forEach(m => { m.uniforms.uTime.value = t; });
    gridMat.uniforms.uTime.value = t; gridMat.uniforms.uBass.value = bass;
    coneMat.uniforms.uTime.value = t; coneMat.uniforms.uBass.value = bass;
    audShaderMat.uniforms.uTime.value = t; audShaderMat.uniforms.uMid.value = mid;

    // Base rotation
    baseGroup.rotation.y = t * 0.15;

    // Figures sway
    singer.rotation.z = Math.sin(t*1.2 + singer.userData.swayPhase)*0.04;
    singer.position.y = Math.sin(t*0.8)*0.03;
    guitarist.rotation.z = Math.sin(t*1.5 + guitarist.userData.swayPhase)*0.035;
    guitarist.position.y = Math.sin(t*3)*0.04;
    singer.userData.mat.uniforms.uTime.value = t;
    guitarist.userData.mat.uniforms.uTime.value = t;

    // Spotlights pulse
    spots[0].intensity = 1.5 + bass*5;
    spots[1].intensity = 1 + mid*4;
    spots[2].intensity = 1 + bass*4;

    // Bloom pulse
    bloom.strength = 2.0 + bass*1.5;

    // Floating particles
    const pp = pGeo.attributes.position.array;
    for (let i = 0; i < PCOUNT; i++) {
        pp[i*3+1] += pVel[i];
        if (pp[i*3+1] > 20) {
            pp[i*3+1] = -1;
            pp[i*3] = (Math.random()-0.5)*40;
            pp[i*3+2] = (Math.random()-0.5)*40;
        }
    }
    pGeo.attributes.position.needsUpdate = true;

    // Camera orbit
    const camR = 25, camH = 12;
    camera.position.set(
        Math.sin(t*0.06)*camR,
        camH + Math.sin(t*0.3)*0.4,
        Math.cos(t*0.06)*camR
    );
    camera.lookAt(0, 3.5, 0);

    composer.render();
}
animate();
</script>
</body>
</html>
