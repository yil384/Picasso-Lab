<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – Picasso Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: #1a1d2e;
      line-height: 1.6;
      background: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    .wrapper { max-width: 760px; margin: 0 auto; padding: 36px 40px 60px; }
    /* When showing article, go full-width with no padding */
    body.article-mode .wrapper { max-width: none; padding: 0; }

    /* ── Header ── */
    .blog-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #ebedf3;
    }
    .blog-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1d2e;
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .blog-header p {
      font-size: .88rem;
      color: #8690a8;
    }

    /* ── Blog card ── */
    .blog-card {
      display: block;
      padding: 24px 28px;
      margin-bottom: 16px;
      border-radius: 12px;
      border: 1px solid #ebedf3;
      background: #fff;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, transform .2s;
      position: relative;
      overflow: hidden;
    }
    .blog-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #00629B, #FFCD00);
      opacity: 0;
      transition: opacity .2s;
    }
    .blog-card:hover {
      border-color: #d0d4e0;
      box-shadow: 0 6px 24px rgba(0,0,0,.07);
      transform: translateY(-1px);
    }
    .blog-card:hover::before { opacity: 1; }
    .blog-card:hover .card-title { color: #00629B; }

    .card-meta {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 10px; margin-bottom: 10px;
      font-size: .78rem; color: #8690a8;
    }
    .card-meta svg {
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      vertical-align: -2px;
    }
    .card-source {
      display: inline-flex; align-items: center; gap: 3px;
      color: #00629B; font-weight: 500;
    }
    .card-title {
      font-size: 1.12rem; font-weight: 700; color: #1a1d2e;
      line-height: 1.4; margin-bottom: 8px; transition: color .15s;
    }
    .card-desc {
      font-size: .87rem; color: #5c6280; line-height: 1.65; margin-bottom: 14px;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .card-authors { font-size: .8rem; color: #8690a8; font-style: italic; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: .68rem; font-weight: 600; padding: 3px 9px;
      border-radius: 4px; background: #f0f1f7; color: #5c6280;
      text-transform: uppercase; letter-spacing: .03em;
    }
    .card-cta {
      display: flex; align-items: center; gap: 4px;
      margin-top: 14px; font-size: .82rem; font-weight: 600; color: #00629B;
    }
    .card-cta svg {
      width: 14px; height: 14px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: transform .15s;
    }
    .blog-card:hover .card-cta svg { transform: translateX(3px); }

    /* ── Article view ── */
    #article-view { display: none; }
    #article-view.active { display: block; }
    #blog-list.hidden { display: none; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .85rem; font-weight: 600; color: #00629B;
      background: none; border: none; cursor: pointer;
      padding: 16px 24px 8px; font-family: inherit;
    }
    .back-btn:hover { text-decoration: underline; }
    .back-btn svg {
      width: 16px; height: 16px; stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* The injected article content fills the page */
    #article-content { }

    .loading {
      text-align: center; padding: 60px 0; color: #8690a8; font-size: .9rem;
    }
    .loading-spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid #e0e0e0; border-top-color: #00629B;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .wrapper { padding: 24px 20px 40px; }
      .blog-header h1 { font-size: 1.3rem; }
      .card-title { font-size: 1rem; }
      .card-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <!-- Blog list -->
  <div id="blog-list">
    <div class="blog-header">
      <h1>Research Blog</h1>
      <p>Insights, tutorials, and deep dives from our research.</p>
    </div>
    <div id="blog-index"></div>
  </div>

  <!-- Article view (injected content) -->
  <div id="article-view">
    <button class="back-btn" onclick="showIndex()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back to all posts
    </button>
    <div id="article-content"></div>
  </div>
</div>

<script>
// GitHub raw base URL for fetching blog HTML files
const RAW_BASE = 'https://raw.githubusercontent.com/yil384/Picasso-Lab/main/blogs/';

const POSTS = [
  {
    title: "GPU-Accelerated Automorphism Ensemble Decoding of Quantum LDPC Codes",
    file: "GPU-Accelerated Automorphism Ensemble Decoding of Quantum LDPC Codes – qec.Codes.html",
    date: "Sep 16, 2025",
    source: "qec.codes",
    sourceUrl: "https://qec.codes/blog/autdec/",
    authors: "S. Koutsioumpas, J. Roffe",
    desc: "Automorphism ensemble decoding (AutDEC) on NVIDIA A100 GPU — >2x accuracy gains and 50% fewer iterations for quantum LDPC codes under circuit-level noise.",
    tags: ["Decoding", "GPU", "Quantum LDPC"]
  }
];

function renderIndex() {
  document.getElementById('blog-index').innerHTML = POSTS.map((p, i) => `
    <div class="blog-card" onclick="openArticle(${i})">
      <div class="card-meta">
        <span><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${p.date}</span>
        <span style="color:#d0d4e0">|</span>
        <span class="card-source"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${p.source}</span>
      </div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-footer">
        <div class="card-authors">${p.authors}</div>
        <div class="card-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="card-cta">Read article <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>
    </div>
  `).join('');
}

async function openArticle(idx) {
  const post = POSTS[idx];
  const container = document.getElementById('article-content');
  const listEl = document.getElementById('blog-list');
  const articleEl = document.getElementById('article-view');

  // Switch view
  listEl.classList.add('hidden');
  articleEl.classList.add('active');
  document.body.classList.add('article-mode');
  container.innerHTML = '<div class="loading"><span class="loading-spinner"></span>Loading article...</div>';
  window.scrollTo(0, 0);

  try {
    // Fetch the raw HTML from GitHub
    const url = RAW_BASE + encodeURIComponent(post.file);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Failed to fetch');
    const html = await resp.text();

    // Parse and extract <head> styles + <body> content
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Collect <style> tags from the article's <head>
    const styles = [...doc.querySelectorAll('head style')].map(s => s.outerHTML).join('\n');

    // Collect <script> tags (for MathJax etc.)
    const scripts = [...doc.querySelectorAll('head script')].map(s => {
      if (s.src) return `<script src="${s.src}" async><\/script>`;
      return `<script>${s.textContent}<\/script>`;
    }).join('\n');

    // Get the body content
    const body = doc.body.innerHTML;

    // Inject styles + body content
    container.innerHTML = styles + body;

    // Execute MathJax if referenced
    if (html.includes('mathjax')) {
      const mjScript = document.createElement('script');
      mjScript.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js';
      mjScript.async = true;
      document.head.appendChild(mjScript);
    }

  } catch (e) {
    container.innerHTML = `<div class="loading" style="color:#e04040">Failed to load article. <a href="${post.sourceUrl}" target="_blank" style="color:#00629B">View original &rarr;</a></div>`;
  }
}

function showIndex() {
  document.getElementById('blog-list').classList.remove('hidden');
  document.getElementById('article-view').classList.remove('active');
  document.body.classList.remove('article-mode');
  document.getElementById('article-content').innerHTML = '';
  window.scrollTo(0, 0);
}

renderIndex();
</script>
</body>
</html>
