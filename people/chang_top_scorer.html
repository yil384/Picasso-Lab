<!--
  chang_top_scorer.html — 高考状元 + 灭霸手套
  ─────────────────────────────────────────────────────────────────
  ★ 调节面板 (在下方 <div class="ct-wrap" style="...">, 直接改数字) ★

    avatar:
      --avatar-size     头像圆框大小 (px)

    灭霸手套 (gauntlet):
      --gauntlet-left   手套 left   (px, 水平位置)
      --gauntlet-top    手套 top    (px, 垂直位置)
      --gauntlet-w      手套宽      (px, 等比缩放)
      --gauntlet-h      手套高      (px, 等比缩放)
      --gauntlet-rotate 手套倾角    (deg, 0=不动, 负=逆时针)
-->

<div class="ct-wrap" style="
    --avatar-size: 200px;

    /* 灭霸手套 (位置 + 大小 + 倾角) */
    --gauntlet-left:   70px;
    --gauntlet-top:    40px;
    --gauntlet-w:     150px;
    --gauntlet-h:     130px;
    --gauntlet-rotate: 30deg;
  ">
  <div class="ct-stage">
    <div class="ct-avatar-frame">
      <img src="https://yil384.github.io/Picasso-Lab/people/static/chang.png"
           class="avatar ct-avatar" alt="avatar"/>

      <div class="ct-photo-warmth" aria-hidden="true"></div>

      <!--
        ── 灭霸无限手套 (V5 — 重画解剖连接) ──
        姿态: 拇指 UP / 4 指 LEFT / 腕 RIGHT
        重做了 V4 的问题:
          · 拇指 base 真接到 palm top-right (不再悬空)
          · palm 不再是直角方块, 改成 rounded fist shape (左侧 4 个 finger 接口微凹)
          · 每根 finger 从 palm 根部向 LEFT 延伸时 略微 taper (根部宽 14, 指尖 10)
          · 关节凹槽落在 finger segment 中段, 不再 stick-like
          · 5 颗宝石在 finger base + palm center 显眼位置
      -->
      <svg class="ct-cup-energy ct-gauntlet" viewBox="0 0 140 120"
           aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="ctGtMain" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0"    stop-color="#fff2b8"/>
            <stop offset="0.25" stop-color="#f6c64a"/>
            <stop offset="0.55" stop-color="#a06a0c"/>
            <stop offset="0.85" stop-color="#6b3608"/>
            <stop offset="1"    stop-color="#3a1c02"/>
          </linearGradient>
          <linearGradient id="ctGtFinger" x1="1" y1="0" x2="0" y2="0">
            <stop offset="0"    stop-color="#a06a0c"/>
            <stop offset="0.4"  stop-color="#f6c64a"/>
            <stop offset="0.85" stop-color="#a06a0c"/>
            <stop offset="1"    stop-color="#3a1c02"/>
          </linearGradient>
          <linearGradient id="ctGtPlate" x1="0" y1="0" x2="1" y2="0.5">
            <stop offset="0" stop-color="#5a3a08"/>
            <stop offset="0.5" stop-color="#f6c64a"/>
            <stop offset="1" stop-color="#5a3a08"/>
          </linearGradient>
          <linearGradient id="ctGtWrist" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#8a5e1c"/>
            <stop offset="0.5" stop-color="#5a3a08"/>
            <stop offset="1" stop-color="#2a1a02"/>
          </linearGradient>
          <radialGradient id="ctGemSoul" cx="0.35" cy="0.35" r="0.7">
            <stop offset="0"   stop-color="#fde047"/>
            <stop offset="0.25" stop-color="#fed7aa"/>
            <stop offset="0.65" stop-color="#f97316"/>
            <stop offset="1"   stop-color="#7c2d12"/>
          </radialGradient>
          <filter id="ctGemBloom" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="2.4"/>
          </filter>
        </defs>

        <g stroke="#2a1a02" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">

          <!-- ── 腕板 (画在最底层, 在 palm 后面) ── -->
          <path d="M 100 36 L 138 38 L 138 60 L 100 60 Z" fill="url(#ctGtWrist)"/>
          <path d="M 100 62 L 138 64 L 138 88 L 100 88 Z" fill="url(#ctGtWrist)"/>
          <line x1="118" y1="40" x2="118" y2="58" stroke="#1a1002" stroke-width="1.2"/>
          <line x1="128" y1="40" x2="128" y2="58" stroke="#1a1002" stroke-width="1.2"/>
          <line x1="118" y1="66" x2="118" y2="86" stroke="#1a1002" stroke-width="1.2"/>
          <line x1="128" y1="66" x2="128" y2="86" stroke="#1a1002" stroke-width="1.2"/>
          <circle cx="109" cy="48" r="1.5" fill="#1a1002"/>
          <circle cx="109" cy="76" r="1.5" fill="#1a1002"/>
          <circle cx="135" cy="48" r="1.5" fill="#1a1002"/>
          <circle cx="135" cy="76" r="1.5" fill="#1a1002"/>

          <!-- ── 拇指 (UP, base 紧贴 palm top-right) ── -->
          <path d="M 80 32
                   C 80 18, 84 8, 92 8
                   C 100 8, 102 18, 100 30
                   C 100 34, 96 36, 92 36
                   C 88 36, 82 36, 80 32 Z"
                fill="url(#ctGtMain)"/>
          <!-- 拇指关节凹槽 -->
          <path d="M 82 22 Q 92 20, 100 22"
                stroke="#3a1a02" stroke-width="1.1" fill="none" opacity="0.7"/>
          <!-- 拇指高光 -->
          <path d="M 86 12 Q 92 9, 98 14"
                stroke="#fef3c7" stroke-width="1.1" fill="none" opacity="0.6"/>

          <!--
            ── 手背 palm (fist shape, 左侧 4 个 finger 接口微凹) ──
            视觉上像握拳, 左边轮廓有 4 个 indentation = 4 根 finger 的根部
          -->
          <path d="M 56 30
                   C 50 30, 48 34, 50 40
                   L 50 42
                   C 48 44, 48 46, 50 48
                   L 50 50
                   C 48 52, 48 54, 50 56
                   L 50 58
                   C 48 60, 48 62, 50 64
                   L 50 66
                   C 48 68, 48 70, 50 72
                   L 50 74
                   C 48 76, 48 78, 50 80
                   L 50 82
                   C 50 90, 56 94, 64 94
                   L 96 94
                   C 104 94, 108 90, 108 82
                   L 108 38
                   C 108 32, 104 28, 96 28
                   L 60 28
                   C 58 28, 56 28, 56 30 Z"
                fill="url(#ctGtMain)"/>
          <!-- 手背顶部高光 -->
          <path d="M 60 32 Q 84 30, 104 32"
                stroke="#fde68a" stroke-width="1.3" fill="none" opacity="0.55"/>
          <!-- 手背底部阴影 -->
          <path d="M 60 90 Q 84 93, 104 90"
                stroke="#3a1c02" stroke-width="1.1" fill="none" opacity="0.45"/>

          <!--
            ── 4 根手指 (LEFT, 从 palm 4 个凹口接出, taper from 14 → 10) ──
            每根 finger 用单一连续 path 画 root → middle → tip + 关节凹槽
          -->
          <!-- 食指 (top) -->
          <path d="M 50 36
                   C 40 35, 28 34, 20 36
                   C 14 37, 10 39, 10 44
                   C 10 48, 14 50, 20 50
                   C 30 51, 42 50, 50 49 Z"
                fill="url(#ctGtFinger)"/>
          <!-- 关节凹槽 (在指中段) -->
          <path d="M 28 36 Q 28 43, 28 50" stroke="#3a1a02" stroke-width="1" fill="none" opacity="0.7"/>
          <!-- 指尖高光 -->
          <path d="M 12 40 Q 22 39, 30 39" stroke="#fef3c7" stroke-width="0.8" fill="none" opacity="0.6"/>

          <!-- 中指 -->
          <path d="M 50 52
                   C 40 51, 26 50, 16 52
                   C 8 53, 4 56, 4 60
                   C 4 64, 10 66, 18 66
                   C 30 67, 42 66, 50 65 Z"
                fill="url(#ctGtFinger)"/>
          <path d="M 24 52 Q 24 59, 24 66" stroke="#3a1a02" stroke-width="1" fill="none" opacity="0.7"/>
          <path d="M 8 56 Q 18 55, 26 55" stroke="#fef3c7" stroke-width="0.8" fill="none" opacity="0.6"/>

          <!-- 无名指 -->
          <path d="M 50 68
                   C 40 67, 28 67, 18 69
                   C 12 70, 8 72, 8 76
                   C 8 80, 12 82, 20 82
                   C 30 82, 42 81, 50 81 Z"
                fill="url(#ctGtFinger)"/>
          <path d="M 26 68 Q 26 75, 26 82" stroke="#3a1a02" stroke-width="1" fill="none" opacity="0.7"/>
          <path d="M 12 72 Q 22 71, 30 71" stroke="#fef3c7" stroke-width="0.8" fill="none" opacity="0.6"/>

          <!-- 小指 (bottom, shorter, slightly higher up at tip) -->
          <path d="M 50 84
                   C 40 83, 30 84, 22 86
                   C 16 87, 14 90, 14 93
                   C 14 96, 18 97, 24 97
                   C 32 97, 42 96, 50 95 Z"
                fill="url(#ctGtFinger)"/>
          <path d="M 28 84 Q 28 90, 28 97" stroke="#3a1a02" stroke-width="1" fill="none" opacity="0.7"/>
          <path d="M 18 88 Q 26 87, 32 87" stroke="#fef3c7" stroke-width="0.8" fill="none" opacity="0.6"/>
        </g>

        <!-- ── 5 颗无限宝石 ── -->
        <g class="ct-gems" stroke="#2a1a02" stroke-linejoin="round">
          <!-- 食指根 Power 紫 -->
          <g class="ct-gem g1">
            <circle cx="50" cy="43" r="4" fill="url(#ctGtPlate)" stroke-width="1.2"/>
            <circle cx="50" cy="43" r="2.8" fill="#a855f7" stroke-width="0.7"/>
            <circle cx="49" cy="42" r="1.1" fill="#f0abfc" stroke="none"/>
          </g>
          <!-- 中指根 Reality 红 -->
          <g class="ct-gem g2">
            <circle cx="50" cy="59" r="4" fill="url(#ctGtPlate)" stroke-width="1.2"/>
            <circle cx="50" cy="59" r="2.8" fill="#dc2626" stroke-width="0.7"/>
            <circle cx="49" cy="58" r="1.1" fill="#fca5a5" stroke="none"/>
          </g>
          <!-- 无名指根 Space 蓝 -->
          <g class="ct-gem g3">
            <circle cx="50" cy="75" r="4" fill="url(#ctGtPlate)" stroke-width="1.2"/>
            <circle cx="50" cy="75" r="2.8" fill="#3b82f6" stroke-width="0.7"/>
            <circle cx="49" cy="74" r="1.1" fill="#93c5fd" stroke="none"/>
          </g>
          <!-- 小指根 Time 绿 -->
          <g class="ct-gem g4">
            <circle cx="50" cy="90" r="4" fill="url(#ctGtPlate)" stroke-width="1.2"/>
            <circle cx="50" cy="90" r="2.8" fill="#22c55e" stroke-width="0.7"/>
            <circle cx="49" cy="89" r="1.1" fill="#bbf7d0" stroke="none"/>
          </g>

          <!-- 手背中央 Soul 橙 (大) -->
          <g class="ct-gem g5">
            <circle cx="78" cy="62" r="12" fill="url(#ctGtPlate)" stroke-width="1.6"/>
            <circle cx="78" cy="62" r="9" fill="#3a1c02" stroke="#5a3a08" stroke-width="0.9"/>
            <!-- 6 prong claws -->
            <path d="M 78 50 L 76 54 L 80 54 Z
                     M 90 62 L 86 60 L 86 64 Z
                     M 78 74 L 80 70 L 76 70 Z
                     M 66 62 L 70 64 L 70 60 Z
                     M 87 53 L 84 56 L 88 56 Z
                     M 69 71 L 72 68 L 68 69 Z"
                  fill="url(#ctGtPlate)" stroke-width="0.7"/>
            <circle cx="78" cy="62" r="7" fill="url(#ctGemSoul)" stroke-width="0.9"/>
            <ellipse cx="75" cy="59" rx="2.2" ry="1.6" fill="#fef3c7" stroke="none" opacity="0.9"/>
          </g>
        </g>

        <!-- 宝石外圈 glow halo -->
        <g class="ct-gem-halo" filter="url(#ctGemBloom)">
          <circle cx="50" cy="43" r="3" fill="#a855f7" opacity="0.7"/>
          <circle cx="50" cy="59" r="3" fill="#dc2626" opacity="0.7"/>
          <circle cx="50" cy="75" r="3" fill="#3b82f6" opacity="0.7"/>
          <circle cx="50" cy="90" r="3" fill="#22c55e" opacity="0.7"/>
          <circle cx="78" cy="62" r="6" fill="#f97316" opacity="0.78"/>
        </g>
      </svg>
    </div>

    <svg class="ct-laurel" viewBox="0 0 230 230" aria-hidden="true" focusable="false">
      <defs>
        <linearGradient id="ctGold" x1="48" y1="31" x2="184" y2="202" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#fff4b8"/>
          <stop offset="0.48" stop-color="#eab308"/>
          <stop offset="1" stop-color="#92400e"/>
        </linearGradient>
      </defs>
      <path class="ct-laurel-stem ct-left-stem" d="M48 190 C15 158 15 96 43 52"/>
      <path class="ct-laurel-stem ct-right-stem" d="M182 190 C215 158 215 96 187 52"/>
      <g class="ct-leaves ct-left-leaves">
        <ellipse cx="43" cy="166" rx="5" ry="11" transform="rotate(-43 43 166)"/>
        <ellipse cx="32" cy="139" rx="5" ry="11" transform="rotate(-24 32 139)"/>
        <ellipse cx="31" cy="110" rx="5" ry="11" transform="rotate(-2 31 110)"/>
        <ellipse cx="38" cy="82" rx="5" ry="11" transform="rotate(22 38 82)"/>
      </g>
      <g class="ct-leaves ct-right-leaves">
        <ellipse cx="187" cy="166" rx="5" ry="11" transform="rotate(43 187 166)"/>
        <ellipse cx="198" cy="139" rx="5" ry="11" transform="rotate(24 198 139)"/>
        <ellipse cx="199" cy="110" rx="5" ry="11" transform="rotate(2 199 110)"/>
        <ellipse cx="192" cy="82" rx="5" ry="11" transform="rotate(-22 192 82)"/>
      </g>
    </svg>

    <svg class="ct-answer-sheet" viewBox="0 0 86 106" aria-hidden="true" focusable="false">
      <path d="M13 5 H58 L73 20 V97 H13 Z" fill="#fffaf0" stroke="#3f2a0b" stroke-width="4"/>
      <path d="M58 5 V21 H73" fill="#fde68a" stroke="#3f2a0b" stroke-width="4"/>
      <path d="M25 31 H59 M25 46 H59 M25 61 H50" stroke="#92400e" stroke-width="4" stroke-linecap="round"/>
      <path class="ct-check" d="M23 80 L34 91 L60 70" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="21" text-anchor="middle"
            fill="#111827"
            font-family="STKaiti, KaiTi, 'PingFang SC', 'Microsoft YaHei', 'Arial Black', sans-serif"
            font-size="14" font-weight="900">理综</text>
    </svg>

    <svg class="ct-pencil" viewBox="0 0 116 32" aria-hidden="true" focusable="false">
      <path d="M11 15 L88 4 L105 15 L88 28 Z" fill="#facc15" stroke="#3f2a0b" stroke-width="4" stroke-linejoin="round"/>
      <path d="M88 4 L105 15 L88 28 L82 16 Z" fill="#fef3c7" stroke="#3f2a0b" stroke-width="4" stroke-linejoin="round"/>
      <path d="M101 15 L112 11 L112 19 Z" fill="#111827"/>
      <path d="M14 15 L3 17 L4 8 Z" fill="#ef4444" stroke="#3f2a0b" stroke-width="3" stroke-linejoin="round"/>
      <path d="M27 13 L78 6" stroke="#fff7b8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    </svg>

    <div class="ct-honor" aria-hidden="true">
      <span>温&nbsp;州&nbsp;市</span>
      <b>高考状元</b>
    </div>

    <div class="ct-spark-layer" aria-hidden="true"></div>
  </div>
</div>

<style>
.ct-wrap {
  display: inline-block;
  cursor: pointer;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
}

.ct-wrap *,
.ct-wrap *::before,
.ct-wrap *::after {
  box-sizing: border-box;
}

.ct-stage {
  position: relative;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  overflow: visible;
}

.ct-avatar-frame {
  position: relative;
  z-index: 4;
  width: var(--avatar-size, 200px);
  height: var(--avatar-size, 200px);
  border-radius: 50%;
  overflow: hidden;
  background: transparent;
  transform: scale(var(--ct-avatar-scale, 1));
  transform-origin: 50% 50%;
  transition: transform 0.32s cubic-bezier(0.34, 1.3, 0.64, 1);
  will-change: transform;
}

.ct-avatar {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  transition: filter 0.32s ease;
}

.ct-wrap:hover {
  --ct-avatar-scale: 1.08;
}

.ct-wrap.ct-on {
  --ct-avatar-scale: 1.07;
}

.ct-wrap.ct-on:hover {
  --ct-avatar-scale: 1.12;
}

.ct-wrap:hover .ct-avatar,
.ct-wrap.ct-on .ct-avatar {
  filter: brightness(1.08) saturate(1.06);
}

.ct-photo-warmth,
.ct-cup-energy,
.ct-steam,
.ct-laurel,
.ct-answer-sheet,
.ct-pencil,
.ct-honor,
.ct-spark-layer {
  position: absolute;
  pointer-events: none;
}

.ct-photo-warmth {
  inset: 0;
  z-index: 1;
  border-radius: 50%;
  background:
    radial-gradient(circle at 66% 24%, rgba(255, 244, 184, 0.34), rgba(255, 244, 184, 0) 28%),
    radial-gradient(circle at 21% 48%, rgba(186, 230, 253, 0.16), rgba(186, 230, 253, 0) 32%);
  mix-blend-mode: screen;
  opacity: 0;
}

/*
 * V5: 灭霸手套 — 位置/大小/角度 全部由顶部 CSS 变量控制
 *   --gauntlet-left / --gauntlet-top / --gauntlet-w / --gauntlet-h / --gauntlet-rotate
 */
.ct-cup-energy {
  left:   var(--gauntlet-left, 60px);
  top:    var(--gauntlet-top, 30px);
  width:  var(--gauntlet-w, 140px);
  height: var(--gauntlet-h, 120px);
  z-index: 7;
  opacity: 0;
  overflow: visible;
  transform: rotate(var(--gauntlet-rotate, 0deg));
  transform-origin: 50% 50%;
  filter: drop-shadow(0 4px 5px rgba(0, 0, 0, 0.42));
}

/*
 * V2 灭霸手套 — 5 颗无限宝石 错时呼吸 + halo 脉冲
 */
.ct-gem {
  transform-box: fill-box;
  transform-origin: center;
}
.ct-gem-halo circle {
  transform-box: fill-box;
  transform-origin: center;
}

.ct-wrap.ct-on .ct-gem.g1 circle { animation: ct-gem-pulse 1.8s ease-in-out infinite alternate; }
.ct-wrap.ct-on .ct-gem.g2 circle { animation: ct-gem-pulse 1.6s ease-in-out infinite alternate; animation-delay: 0.25s; }
.ct-wrap.ct-on .ct-gem.g3 circle { animation: ct-gem-pulse 1.9s ease-in-out infinite alternate; animation-delay: 0.50s; }
.ct-wrap.ct-on .ct-gem.g4 circle { animation: ct-gem-pulse 1.7s ease-in-out infinite alternate; animation-delay: 0.75s; }
.ct-wrap.ct-on .ct-gem.g5 circle { animation: ct-gem-pulse 1.5s ease-in-out infinite alternate; animation-delay: 1.00s; }

.ct-wrap.ct-on .ct-gem-halo circle {
  animation: ct-gem-halo-pulse 1.8s ease-in-out infinite alternate;
}
.ct-wrap.ct-on .ct-gem-halo circle:nth-child(2) { animation-delay: 0.25s; }
.ct-wrap.ct-on .ct-gem-halo circle:nth-child(3) { animation-delay: 0.50s; }
.ct-wrap.ct-on .ct-gem-halo circle:nth-child(4) { animation-delay: 0.75s; }
.ct-wrap.ct-on .ct-gem-halo circle:nth-child(5) { animation-delay: 1.00s; }

@keyframes ct-gem-pulse {
  from { filter: brightness(0.92); }
  to   { filter: brightness(1.3); }
}
@keyframes ct-gem-halo-pulse {
  from { opacity: 0.4; transform: scale(0.85); }
  to   { opacity: 0.9; transform: scale(1.4); }
}

.ct-laurel {
  left: -15px;
  top: -15px;
  z-index: 2;
  width: 230px;
  height: 230px;
  opacity: 0;
  overflow: visible;
  filter: drop-shadow(0 4px 5px rgba(92, 50, 8, 0.18));
}

.ct-laurel-stem {
  fill: none;
  stroke: url(#ctGold);
  stroke-width: 2.1;
  stroke-dasharray: 8 8;
}

.ct-leaves {
  fill: url(#ctGold);
}

.ct-answer-sheet {
  left: -13px;
  bottom: -10px;
  z-index: 6;
  width: 64px;
  height: 79px;
  opacity: 0;
  transform: rotate(-10deg) translate(-16px, 12px) scale(0.72);
  filter: drop-shadow(4px 5px 0 rgba(63, 42, 11, 0.2));
}

.ct-check {
  stroke-dasharray: 56;
  stroke-dashoffset: 56;
}

.ct-pencil {
  right: -23px;
  bottom: 26px;
  z-index: 8;
  width: 102px;
  height: 29px;
  opacity: 0;
  transform-origin: 18px 50%;
  transform: rotate(-27deg) translate(20px, 12px) scale(0.78);
  filter: drop-shadow(4px 5px 0 rgba(63, 42, 11, 0.2));
}

.ct-honor {
  left: 57px;
  top: 177px;
  z-index: 9;
  min-width: 128px;
  padding: 7px 13px 8px;
  border: 2px solid #3f2a0b;
  border-radius: 8px;
  color: #111827;
  text-align: center;
  background: linear-gradient(145deg, #fffdf0, #facc15 66%, #d97706);
  box-shadow: 4px 5px 0 rgba(63, 42, 11, 0.24);
  opacity: 0;
  transform: rotate(-2deg) translateY(10px) scale(0.74);
}

.ct-honor::before,
.ct-honor::after {
  content: "";
  position: absolute;
  top: -13px;
  width: 30px;
  height: 17px;
  border: 2px solid #3f2a0b;
  background: #facc15;
}

.ct-honor::before {
  left: 16px;
  transform: skewX(-16deg);
}

.ct-honor::after {
  right: 16px;
  transform: skewX(16deg);
}

.ct-honor span,
.ct-honor b {
  position: relative;
  z-index: 1;
  display: block;
  letter-spacing: 0;
}

.ct-honor span {
  margin-bottom: 3px;
  color: #78350f;
  font: 900 9px/1 'STKaiti','KaiTi','PingFang SC','Microsoft YaHei',
                  Arial, sans-serif;
  letter-spacing: 0.04em;
}

.ct-honor b {
  /* 高考状元 — 用中文字体, 字号略放大让 4 个汉字 撑得起场面 */
  font: 900 18px/0.95 'STKaiti','KaiTi','SimHei','PingFang SC',
                       'Microsoft YaHei','Arial Black', sans-serif;
  letter-spacing: 0.06em;
}

.ct-spark-layer {
  inset: 0;
  z-index: 12;
  overflow: visible;
}

.ct-spark {
  position: absolute;
  left: var(--x);
  top: var(--y);
  width: var(--s, 6px);

}

  0% { opacity: 1; transform: translate(-50%, -50%) rotate(var(--r, 0deg)) scale(0.42); }
  100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(calc(var(--r, 0deg) + 130deg)) scale(1); }
}
</style>

<script>
(function () {
  document.querySelectorAll('.ct-wrap').forEach((wrap) => {
    if (wrap.dataset.ctReady === '1') return;
    wrap.dataset.ctReady = '1';
    const layer = wrap.querySelector('.ct-spark-layer');

    wrap.addEventListener('click', () => {
      const on = wrap.classList.toggle('ct-on');
      if (on) burstSparks(layer);
      else if (layer) layer.innerHTML = '';
    });
  });

  function burstSparks(layer) {
    if (!layer) return;
    layer.innerHTML = '';
    const colors = ['#facc15', '#fff7b8', '#fb923c', '#ffffff'];
    const anchors = [
      { x: 132, y: 58 },
      { x: 158, y: 102 },
      { x: 122, y: 168 },
      { x: 151, y: 181 }
    ];

    for (let i = 0; i < 24; i++) {
      const spark = document.createElement('span');
      const anchor = anchors[i % anchors.length];
      const angle = Math.random() * Math.PI * 2;
      const dist = 24 + Math.random() * 64;
      spark.className = 'ct-spark';
      spark.style.setProperty('--x', `${anchor.x}px`);
      spark.style.setProperty('--y', `${anchor.y}px`);
      spark.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      spark.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      spark.style.setProperty('--s', `${4 + Math.random() * 5}px`);
      spark.style.setProperty('--c', colors[i % colors.length]);
      spark.style.animationDelay = `${Math.random() * 0.18}s`;
      layer.appendChild(spark);
    }

    for (let i = 0; i < 10; i++) {
      const bean = document.createElement('span');
      const anchor = anchors[i % 2];
      const angle = -Math.PI * 0.72 + Math.random() * Math.PI * 0.88;
      const dist = 20 + Math.random() * 48;
      bean.className = 'ct-bean';
      bean.style.setProperty('--x', `${anchor.x}px`);
      bean.style.setProperty('--y', `${anchor.y}px`);
      bean.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      bean.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      bean.style.setProperty('--r', `${Math.random() * 180}deg`);
      bean.style.animationDelay = `${Math.random() * 0.16}s`;
      layer.appendChild(bean);
    }

    setTimeout(() => { layer.innerHTML = ''; }, 1200);
  }
})();
</script>
